l_simp_chinese:
 WAR_EXHAUSTION_FROM_CASUALTIES: "与最大军事规模#v [Multiply_int32(SCOPE.GetRootScope.GetCountry.GetNumBattalions,'(int32)1000')|kv]#!相比，已承受[SCOPE.sWar('war').GetCasualties(SCOPE.GetRootScope.GetCountry.Self)|Dv][SCOPE.GetRootScope.GetCountry.GetAdjective][concept_casualties]；[SCOPE.GetRootScope.GetCountry.GetName]已输掉[SCOPE.sWar('war').GetSizeWeightedLostBattlesFraction(SCOPE.GetRootScope.GetCountry.Self)|%1v]的战斗"
 WAR_EXHAUSTION_FROM_TURMOIL: "[SCOPE.GetRootScope.GetCountry.GetName]中的[concept_radical]人口（[SCOPE.GetRootScope.GetCountry.CalcTurmoil|%1v]）"
 WAR_EXHAUSTION_FROM_EVENTS: "其他"

 MARKER_COMBAT_UNITS_TYPE_AND_NUM: "[SelectLocalization(GreaterThan_int64(FormationMarker.CalcCurrentManpower, '(int64)100000'), 'MARKER_ARMY_BIG', 'MARKER_ARMY_SMALL')]"
 MARKER_ARMY_SMALL: "[FormationMarker.CalcCurrentManpower|0*v]"
 MARKER_ARMY_BIG: "[FormationMarker.CalcCurrentManpower|Dv]"
 ARTICLE_COUNTRY_WILL_NOT_COLONIZE: "[Country.GetName][ConcatIfNeitherEmpty(' ', AddLocalizationIf(Country.IsLocalPlayer, 'YOU'))][ConcatIfNeitherEmpty(' ', SelectLocalization(EqualTo_string(ArticleDraft.GetArticleType.GetNameNoFormatting, Localize('transfer_claims')), 'ARTICLE_COUNTRY_WILL_NOT_COLONIZE_FAKE', 'ARTICLE_COUNTRY_WILL_NOT_COLONIZE_REAL'))][StrategicRegion.GetName]"
 ARTICLE_COUNTRY_WILL_NOT_COLONIZE_REAL: "将#b 不会#![Concept('concept_colony', '$concept_colonize$')]"
 ARTICLE_COUNTRY_WILL_NOT_COLONIZE_FAKE: "将#b 转让宣称#!于"

 concept_war_support: "战争分数"
 concept_war_support_desc: "衡量一个国家在[concept_war]中维持作战行动的军事能力。当$concept_war_support$达到[GetDefine('NWar','AUTO_CAPITULATE_WAR_SUPPORT')|v0]时，$concept_country$会立即投降，使所有[Concept('concept_war_goal','$concept_war_goals$')]都能强加于其身上。"

 WAR_PANEL_WAR_SUPPORT_DESC:0 "#HEADER 战争分数#!（$COUNTRY_NAME$）\n当前值：#variable $SUPPORT|1+=$#!"
 WAR_PANEL_WAR_SUPPORT_DESC_INITIAL:1 "初始[concept_war_support]：#variable [GetDefine('NDiplomacy','BASE_WAR_SUPPORT')|+=1]#!"
 WAR_PANEL_WAR_SUPPORT_DESC_BATTLES:0 "\n来自战斗：#variable $BATTLES|1+=$#!"
 WAR_PANEL_WAR_SUPPORT_DESC_EXHAUSTION:0 "\n来自疲惫：#variable $EXHAUSTION|1+=$#!"
 WAR_PANEL_WAR_SUPPORT_DESC_SITUATIONS:1 "\n来自事件：#variable $SITUATIONS|1+=$#!"
 WAR_PANEL_WAR_SUPPORT_UNABLE_TO_CAPITULATE: ""

 WAR_SUPPORT_CANNOT_BE_NEGATIVE: "对方尚未将以下[Concept('concept_war_goal','$concept_war_goals$')]作为[Concept('concept_controlled_war_goal','$concept_controlled_war_goal_short$')]#b控制#!："