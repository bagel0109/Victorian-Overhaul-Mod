l_russian:
 war_stuff.1.t:0 "Оккупация [SCOPE.sCountry('war_stuff_enemy').GetCapital.GetCityHubName]"
 war_stuff.1.d:1 "Наши победоносные армии теперь занимают самое сердце [SCOPE.sCountry('war_stuff_enemy').GetName]. То, как мы обойдемся с завоеванной столицей, отзовется в истории и скажется на нашем праве на власть и на воле врага к сопротивлению."
 war_stuff.1.f:1 "«Эти люди знают, что их судьба зависит от нашей милости»."
 war_stuff.1.a:0 "Поддерживать порядок и уважать институты."
 war_stuff.1.b:0 "Позволить войскам взять свое."

 war_stuff.2.t:0 "Оккупация [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]"
 war_stuff.2.d:1 "К нашему изумлению, оккупационные [SCOPE.sCountry('war_stuff_enemy').GetAdjective] силы, несмотря на победу, поддерживают порядок и уважают наши институты."
 war_stuff.2.f:1 "«Захватчики патрулировали рынки без грабежей; я даже видел, как один вернул оброненный кошелек! Кто же завоевывает с такой... цивилизованностью?»"
 war_stuff.2.a:0 "Мы запомним их сдержанность."
 war_stuff.3.t:0 "Разграбление [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]"
 war_stuff.3.d:1 "[SCOPE.sCountry('war_stuff_enemy').GetAdjective] войска превратили [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] в дымящиеся руины, разграбив наши национальные сокровища и осквернив наше наследие."
 war_stuff.3.f:1 "«Века знания обратились в пепел. Они даже переплавили статуи на лом!»"
 war_stuff.3.a:0 "Они заплатят за это варварство!"

 war_stuff.4.t:0 "Беспорядки в [SCOPE.sState('war_stuff_state').GetName]"
 war_stuff.4.d:1 "По всему [SCOPE.sState('war_stuff_state').GetName] вспыхнули насильственные выступления: оккупированное население сопротивляется нашей власти. Улицы краснеют от непокорности; ответ надо выбрать немедленно."
 war_stuff.4.f:1 "«Они бросают булыжники, вырванные из тех самых улиц, которые мы мостили! Лейтенант спросил, стрелять ли в ответ. Что мне ему сказать?»"
 war_stuff.4.a:0 "Сокрушить этот мятеж максимальной силой."
 war_stuff.4.b:0 "Отвести патрули и дать напряжению остыть."

 war_stuff.5.t:0 "Барабаны войны"
 war_stuff.5.d:1 "Скоординированная пропагандистская кампания прошла по [SCOPE.sCountry('war_stuff_home').GetName], разожгла патриотический пыл и укрепила решимость общества продолжать борьбу."
 war_stuff.5.f:1 "«На каждой стене теперь рекрутские плакаты! Даже дети поют марши, прыгая через скакалку. Сердце нации бьется только ради победы»."
 war_stuff.5.a:0 "Наш народ един в этом деле!"

 war_stuff.6.t:0 "Расизм в [SCOPE.sState('war_stuff_state').GetName]"
 war_stuff.6.d:1 "Граждане [SCOPE.sCountry('war_stuff_home').GetName] в [SCOPE.sState('war_stuff_state').GetName] жестоко нападают на соседей [SCOPE.sCulture('war_stuff_culture').GetName] происхождения, обвиняя их в продолжающейся войне."
 war_stuff.6.f:1 "«„Убирайтесь домой!“, кричали они...»"
 war_stuff.6.a:0 "Пусть народ выплеснет свой праведный гнев."
 war_stuff.6.b:0 "Защитить всех граждан независимо от происхождения."

 war_stuff.7.t:0 "Зов единства"
 war_stuff.7.d:1 "Делегации из [SCOPE.sCountry('war_stuff_enemy').GetName] прибыли с предложением добровольного присоединения к [SCOPE.sCountry('war_stuff_home').GetName], ссылаясь на общую культуру и исторические связи."
 war_stuff.7.f:1 "«Мой дед воевал, чтобы разделить нас, а мои ученики теперь маршируют, распевая ваши гимны. Колесо истории поворачивается...»"
 war_stuff.7.a:0 "Приветствуем наших братьев в [SCOPE.sCountry('war_stuff_home').GetNameNoFlag]!"
 war_stuff.7.b:0 "Мы уважаем [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] независимость."

 war_stuff.8.t:0 "Отголоски аннексии"
 war_stuff.8.d:1 "До [SCOPE.GetRootScope.GetCountry.GetName] доходят вести, что [SCOPE.sCountry('war_stuff_home').GetName] поглотила [SCOPE.sCountry('war_stuff_enemy').GetName] путем дипломатической аннексии, поколебав европейский баланс сил."
 war_stuff.8.f:1 "«Сначала они пришли за австрийцами...»"
 war_stuff.8.a:0 "Свершившийся факт, который мы должны признать."

 war_stuff.9.t:0 "Предложить мир на условиях статус-кво с [SCOPE.sCountry('war_stuff_enemy').GetName]"
 war_stuff.9.d:1 "В [SCOPE.sWar('war_stuff_war').GetName] нет активных сухопутных фронтов, и наши военные советники рекомендуют добиваться мира на условиях статус-кво с [SCOPE.sCountry('war_stuff_enemy').GetName]. Это завершит конфликт без территориальных изменений, сохранив наши силы и казну от дальнейшего истощения в затянувшейся войне."
 war_stuff.9.f:1 ""
 war_stuff.9.a:0 "Отправить посланников с мирными условиями."
 war_stuff.9.b:0 "Продолжить войну несмотря на тупик."

 war_stuff.10.t:0 "Мирная инициатива от [SCOPE.sCountry('war_stuff_home').GetName]"
 war_stuff.10.d:1 "Дипломатические курьеры прибывают из штаба [SCOPE.sCountry('war_stuff_home').GetName] с официальным предложением завершить [SCOPE.sWar('war_stuff_war').GetName] возвращением к довоенным границам. В послании признается стратегический тупик и предлагается прекращение всех боевых действий."
 war_stuff.10.f:1 ""
 war_stuff.10.a:0 "Принять их предложение."
 war_stuff.10.b:0 "Отклонить их инициативу."

 war_stuff.11.t:0 "Мятеж изможденных"
 war_stuff.11.d:1 "Траншеи стали кладбищем, а люди дошли до предела. Сообщения с [SCOPE.sFront('war_stuff_front').GetName] описывают целые полки, отказывающиеся примкнуть штыки. Они утверждают, что удержат линию против наступления врага, но больше не будут участвовать в «самоубийственных» атаках ради правительства, будто забывшего цену их жизней."
 war_stuff.11.f:1 "«Мы не ударим по родине, но и не умрем за ложь. Если генералам нужен тот холм, пусть возьмут его сами»."
 war_stuff.11.a:0 "Восстановить порядок расстрельной командой."
 war_stuff.11.b:0 "Разобраться с жалобами и улучшить пайки."

 war_stuff.12.t:0 "Скандал с боеприпасами"
 war_stuff.12.d:1 "На свет вышел национальный позор: солдатам на фронте выдают бракованные снаряды; а то и вовсе ничего. Пока наши храбрецы встречают вражеский огонь, заводы в тылу тонут в неэффективности и растущих расходах. Пресса требует знать, почему «Арсенал [SCOPE.GetRootScope.GetCountry.GetName]» умолкает в час нужды."
 war_stuff.12.f:1 "«Солдат без пули лишь мишень. Тяжкое преступление, когда промышленность наживается, а наши винтовки щелкают впустую»."
 war_stuff.12.a:0 "Все равно принудить производство."
 war_stuff.12.b:0 "Отдать приоритет качеству и надежности снабжения."

 war_stuff.13.t:0 "План [SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]"
 war_stuff.13.d:1 "Карты в Главном штабе не менялись месяцами. На [SCOPE.sFront('war_stuff_front').GetName] каждая пядь земли, взятая утром, к ночи снова переходит из рук в руки. [SCOPE.sCharacter('war_stuff_general_offensive').GetFullName] прибыл с фронта со стопкой оперативных карт и мрачной решимостью. Он настаивает, что при достаточном упорстве и «последнем большом наступлении» сможет разбить [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] линии и вернуть войне движение."
 war_stuff.13.f:1 "«Да, люди устали, но еще больше они устали ждать смерти в грязи. Дайте мне снаряды, и я сломлю [SCOPE.sCountry('war_stuff_enemy').GetNameNoFormatting] раз и навсегда»."
 war_stuff.13.a:0 "Начать наступление [SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]."
 war_stuff.13.b:0 "Отклонить план и удерживать оборону."

 war_stuff.14.t:0 "Инициатива освобождения"
 war_stuff.14.d:1 "Линии на [SCOPE.sFront('war_stuff_front').GetName] застыли, оставив наших соотечественников томиться под [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] оккупацией. [SCOPE.sCharacter('war_stuff_general_liberation').GetFullName] представил Военному ведомству дерзкий оперативный план. Он утверждает, что, сосредоточив войска и взывая к желанию солдат вернуть родные очаги, мы сможем разбить [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] линии."
 war_stuff.14.f:1 "«Каждый день промедления означает еще один день страданий для наших братьев в [SCOPE.sState('war_stuff_liberation_state').GetNameNoFormatting]. Отдайте приказ, и мы отбросим [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFormatting] угрозу за границу»."
 war_stuff.14.a:0 "Разрешить наступление [SCOPE.sCharacter('war_stuff_general_liberation').GetLastName]."
 war_stuff.14.b:0 "Сохранять оборонительную позицию."

 waddle_modifier_brutal_discipline:0 "Жестокая дисциплина"
 
 waddle_modifier_war_concessions:0 "Фронтовые уступки"
 
 waddle_modifier_industrial_seizure:0 "Производство бракованных боеприпасов"
 
 waddle_modifier_careful_supply:0 "Контроль качественного снабжения"

 waddle_modifier_desperate_offensive:0 "Большое наступление"
 
 waddle_modifier_trench_attrition:0 "Траншейный тупик"

 waddle_modifier_liberation_drive:0 "Порыв освобождения"

 war_stuff.15.t: "Кризис призыва"
 war_stuff.15.d: "По мере затягивания войны новые наборы встречают открытое сопротивление. Местные чиновники сообщают о дезертирстве, спрятанных сыновьях и деревнях, не желающих дать еще одну партию мужчин."
 war_stuff.15.f: "«Если государство все еще голодно, пусть ест за другим столом»."
 war_stuff.15.a: "Квоты должны быть выполнены."
 war_stuff.15.b: "Предоставить ограниченные освобождения."
 war_stuff.16.t: "Беженцы из [SCOPE.sState('war_stuff_refugee_state').GetName]"
 war_stuff.16.d: "Бои в [SCOPE.sState('war_stuff_refugee_state').GetName] выгнали мирных жителей из домов. Дороги, станции и церкви за [SCOPE.sFront('war_stuff_front').GetName] переполнены бегущими от орудий."
 war_stuff.16.f: "Они взяли то, что могли унести. Остальное осталось в дыму."
 war_stuff.16.a: "Дать им кров."
 war_stuff.16.b: "Армия имеет первоочередное право."
 war_stuff.17.t: "Сообщения о зверствах"
 war_stuff.17.d: "За рубежом начали распространяться сообщения о грабежах, расправах и убийствах, совершенных нашими войсками. Чиновники уверяют, что истории преувеличены, но враждебные газеты в [SCOPE.sCountry('war_stuff_enemy').GetName] уже нашли свой заголовок."
 war_stuff.17.f: "На войне правда приходит поздно, оборванная и в сопровождении врагов."
 war_stuff.17.a: "Отрицать эти клеветы."
 war_stuff.17.b: "Показательно наказать виновных."
 war_stuff.18.t: "Братание на [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.18.d: "Месяцы тупика на [SCOPE.sFront('war_stuff_front').GetName] породили странную близость между противостоящими траншеями. Офицеры сообщают об обмене сигаретами, выкрикиваемых шутках и тревожном нежелании стрелять без приказа."
 war_stuff.18.f: "«Там не дьяволы. Там такие же бедолаги, как мы»."
 war_stuff.18.a: "Дать солдатам эту короткую передышку."
 war_stuff.18.b: "Дисциплину нужно восстановить."
 war_stuff.19.t: "Прорыв на [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.19.d: "Наступление на [SCOPE.sFront('war_stuff_front').GetName] прорвало фронт. Депеши от [SCOPE.sCharacter('war_stuff_general').GetFullName] говорят о брошенных позициях врага, движущихся резервах и дорогах, открывающихся за орудиями."
 war_stuff.19.f: "На этот раз карта двигалась быстрее списков потерь."
 war_stuff.19.a: "Развить преимущество."
 war_stuff.20.t: "Наступление провалилось на [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.20.d: "Обещанный прорыв на [SCOPE.sFront('war_stuff_front').GetName] не состоялся. Армия дорого заплатила за несколько разрушенных полей, и общество теперь спрашивает, кто приказал принести такую жертву."
 war_stuff.20.f: "Штаб говорил о давлении, импульсе и решимости. Солдаты говорили о грязи."
 war_stuff.20.a: "Генералы должны ответить за это."
 war_stuff.20.b: "Еще один рывок."
 war_stuff.21.t: "Освобождение на [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.21.d: "Наши силы освободили оккупированную территорию на [SCOPE.sFront('war_stuff_front').GetName], отбросив врага от земли, которую он считал своей добычей. Толпы приветствуют возвращающихся солдат как доказательство того, что войну еще можно выиграть."
 war_stuff.21.f: "Первый поднятый флаг был маленьким и рваным, но этого было достаточно."
 war_stuff.21.a: "Пусть звонят колокола."
 war_stuff.22.t: "Освобождение срывается на [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.22.d: "Попытка освободить оккупированную территорию на [SCOPE.sFront('war_stuff_front').GetName] провалилась. Те, кто все еще под властью врага, ждут напрасно, а остальная страна считает цену очередной неудачи."
 war_stuff.22.f: "Им велели слушать наши орудия. К зиме они слушали только сапоги у двери."
 war_stuff.22.a: "Мы должны выстоять."
 war_stuff.23.t: "Винтовки для [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.23.d: "Потребность армии в винтовках и запчастях напрягла рынок. [SCOPE.sCharacter('war_stuff_general').GetFullName] предупреждает, что формирования на [SCOPE.sFront('war_stuff_front').GetName] могут выйти на линию со старым оружием, без деталей или вовсе без него."
 war_stuff.23.f: "Солдат может идти голодным. Он не может удержать линию с пустыми руками."
 war_stuff.23.a: "Изъять запасы."
 war_stuff.23.b: "Рационировать то, что осталось."
 war_stuff.24.t: "Артиллерия для [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.24.d: "Недостаток артиллерии заставил армию осторожно выбирать обстрелы. Командиры на [SCOPE.sFront('war_stuff_front').GetName] требуют больше снарядов, чем фабрики и склады могут дать."
 war_stuff.24.f: "Люди не просили речей. Они спрашивали, когда ответят наши орудия."
 war_stuff.24.a: "Дать орудиям снаряды."
 war_stuff.24.b: "Беречь снаряды."
 war_stuff.25.t: "Нехватка взрывчатки"
 war_stuff.25.d: "Нехватка взрывчатки теперь угрожает снарядам, минам и военному производству. Армия требует чрезвычайных полномочий над химическими заводами, а промышленники предупреждают о разорительных перебоях."
 war_stuff.25.f: "Каждый счет теперь был вопросом жизни и смерти."
 war_stuff.25.a: "Реквизировать заводы."
 war_stuff.25.b: "Сберечь порох для решающего часа."
 war_stuff.26.t: "Пленные из [SCOPE.sCountry('war_stuff_enemy').GetName]"
 war_stuff.26.d: "Недавний успех на [SCOPE.sFront('war_stuff_front').GetName] против [SCOPE.sCountry('war_stuff_enemy').GetName] оставил нам колонны вражеских пленных. За обращением с ними будут следить наши солдаты, наши враги и правительства, все еще оценивающие характер этой войны."
 war_stuff.26.f: "Победа не закончилась на поле боя. Она шла дальше под охраной."
 war_stuff.26.a: "Обращаться с ними достойно."
 war_stuff.26.b: "Отправить их на работы."
 war_stuff.26.c: "Организовать обмен."
 waddle_modifier_forced_conscription: "Принудительный призыв"
 waddle_modifier_forced_conscription_desc: "Призывные квоты выполняются несмотря на растущее местное сопротивление."
 waddle_modifier_conscription_exemptions: "Освобождения от призыва"
 waddle_modifier_conscription_exemptions_desc: "Ограниченные освобождения снизили беспорядки, но ценой боевой готовности."
 waddle_modifier_refugee_relief: "Помощь беженцам"
 waddle_modifier_refugee_relief_desc: "Государство организует помощь мирным жителям, вытесненным фронтом."
 waddle_modifier_wartime_censorship: "Военная цензура"
 waddle_modifier_wartime_censorship_desc: "Сообщения с войны подавляются во имя порядка."
 waddle_modifier_frontline_fraternization: "Фронтовое братание"
 waddle_modifier_frontline_fraternization_desc: "Неформальные контакты с врагом смягчили дисциплину на фронте."
 waddle_modifier_breakthrough_momentum: "Импульс прорыва"
 waddle_modifier_breakthrough_momentum_desc: "Успешное наступление восстановило доверие к армии."
 waddle_modifier_offensive_exhaustion: "Наступательное истощение"
 waddle_modifier_offensive_exhaustion_desc: "Провалившаяся атака потрясла армию и встревожила общество."
 waddle_modifier_victorious_liberation: "Победоносное освобождение"
 waddle_modifier_victorious_liberation_desc: "Оккупированная территория освобождена, что подняло мораль по всей стране."
 waddle_modifier_shattered_liberation_drive: "Разбитый порыв освобождения"
 waddle_modifier_shattered_liberation_drive_desc: "Провальная попытка освобождения углубила отчаяние на оккупированной территории."
 waddle_modifier_small_arms_seizure: "Изъятое стрелковое оружие"
 waddle_modifier_small_arms_seizure_desc: "Частные и коммерческие запасы оружия взяты для военных нужд."
 waddle_modifier_small_arms_rationing: "Рационированные винтовки"
 waddle_modifier_small_arms_rationing_desc: "Винтовки и запчасти распределяются по нормам по всей армии."
 waddle_modifier_artillery_priority: "Приоритет артиллерии"
 waddle_modifier_artillery_priority_desc: "Промышленность и транспорт подчиняются нуждам орудий."
