l_russian:
  RADICALS_TOOLTIP:1 "#tooltip_header $RADICALS$#!\nВ [Country.GetName] насчитывается #v [Country.GetNumRadicals|D]#! $RADICALS$ при общей численности населения #v [Country.GetTotalPopulation|D]#! ([Country.MakeScope.ScriptValue('larp_radicals_percent')|%v1])\n$TOOLTIP_DELIMITER$\nКоличество $RADICALS$ изменилось на #v #tooltippable #tooltip:[Country.GetTooltipTag],RADICALS_CHANGE_TOOLTIP [Country.GetTotalNumRadicalsChange|D=-]#!#!#! с [Country.GetRadicalsLoyalistsChangeStartDate|v].\nНаибольшее влияние оказывают [Country.GetRadicalsChangeSummary]\n\n[Country.GetRadicalsSummaryDesc][ConcatIfNeitherEmpty('\n\n',SelectLocalization( GreaterThan_int32(Country.CalcNumStatesInTurmoil, '(int32)0'), 'STATES_IN_TURMOIL', '' ))][ConcatIfNeitherEmpty('\n\n',SelectLocalization( Country.HasIGApprovalFromRadicals, 'RADICALS_IG_APPROVAL', '' ))]"
  LOYALISTS_TOOLTIP:1 "#tooltip_header $LOYALISTS$#!\nВ [Country.GetName] насчитывается #v [Country.GetNumLoyalists|D]#! $LOYALISTS$ при общей численности населения #v [Country.GetTotalPopulation|D]#! ([Country.MakeScope.ScriptValue('larp_loyalists_percent')|%v1])\n$TOOLTIP_DELIMITER$\nКоличество $LOYALISTS$ изменилось на #v #tooltippable #tooltip:[Country.GetTooltipTag],LOYALISTS_CHANGE_TOOLTIP [Country.GetTotalNumLoyalistsChange|D=+]#!#!#! с [Country.GetRadicalsLoyalistsChangeStartDate|v]\nНаибольшее влияние оказывают [Country.GetLoyalistsChangeSummary]\n\n[Country.GetLoyalistsSummaryDesc][ConcatIfNeitherEmpty('\n\n',SelectLocalization( Country.HasIGApprovalFromLoyalists, 'LOYALISTS_IG_APPROVAL', '' ))]"
  NEUTRALS_TOOLTIP:1 "#tooltip_header $NEUTRALS$#!\nВ [Country.GetName] насчитывается #v [Country.GetNumNeutrals|*2]#! $NEUTRALS$ при общей численности населения #v [Country.GetTotalPopulation|*2]#! ([Country.MakeScope.ScriptValue('larp_neutrals_percent')|%v1])"
  POP_TOOLTIP:2 "#tooltip_header [Concept('concept_pop','$concept_population$')]#!\nТекущее значение: [Country.GetTotalPopulation|*2v] ([Country.GetPopulationRanking])\n[Country.GetPopGrowthDesc]$POP_TOOLTIP_DELAYED$\n$TOOLTIP_DELIMITER$\nНаселение [Country.GetAdjective] составляет [Country.MakeScope.ScriptValue('larp_global_pop_percent')|%v1] населения мира\nНаселение мира: [Country.MakeScope.ScriptValue('larp_global_pop')|*2v]"
  GDP_TOOLTIP:1 "#header [Country.GetAdjective] [concept_gdp]#! \n@money![Country.GetGDP|Dv] (#u #tooltippable #tooltip:[Country.GetTooltipTag],COUNTRY_GDP_OWNERSHIP_TOOLTIP [Country.GetDomesticallyOwnedGDPFraction|%1b]#!#!#!) $concept_gdp_short$ в отечественной собственности ([Country.GetGDPRanking])\n@money![Country.GetGDPPerCapita|2*v] [Concept('concept_gdp_per_capita', '$concept_gdp_per_capita_short$')] ([Country.GetGDPPerCapitaRanking])\n$GDPGR_growth_text$\n$TOOLTIP_DELIMITER$\n[Country.GetAdjective] $concept_gdp_short$ составляет [Country.MakeScope.ScriptValue('larp_global_gdp_percent')|%v2] от мирового ВВП\nМировой ВВП: @money![Country.MakeScope.ScriptValue('larp_global_gdp')|Dv]"
  CURRENT_GDP_STATE:2 "#header [State.GetOwner.GetAdjectiveNoFormatting] [concept_gdp] от [State.GetName]#!\n$TOOLTIP_DELIMITER$\nТекущий годовой вклад в ВВП: #variable @money![State.GetGDPContribution|K]#!\nВВП на душу населения в [State.GetName]: #variable @money![State.MakeScope.ScriptValue('get_state_gdp_per')|Dv]#!\nРазница ВВП на душу населения [State.GetName] относительно [State.GetOwner.GetAdjectiveNoFormatting]: #variable @money![State.MakeScope.ScriptValue('get_country_state_relative_value')|D2+=]#!\nРазница ВВП на душу населения [State.GetName] относительно мирового уровня: #variable @money![State.MakeScope.ScriptValue('get_global_state_relative_value')|D2+=]#!\n[State.GetName] обеспечивает #variable [State.GetGDPContributionPercentage|%1]#! от $GDP_SHORT$ [State.GetOwner.GetAdjectiveNoFormatting]\n\n[State.GetGDPGoodsContributionBreakdown]"
