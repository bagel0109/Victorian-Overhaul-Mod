l_french:
 war_stuff.1.t:0 "Occupation de [SCOPE.sCountry('war_stuff_enemy').GetCapital.GetCityHubName]"
 war_stuff.1.d:1 "Nos armées victorieuses occupent désormais le cœur même de [SCOPE.sCountry('war_stuff_enemy').GetName]. Le sort réservé à la capitale conquise résonnera dans l’histoire et pèsera sur notre légitimité comme sur la volonté de résistance de l’ennemi."
 war_stuff.1.f:1 "\"Ces gens savent que leur sort dépend de notre miséricorde.\""
 war_stuff.1.a:0 "Maintenir l’ordre et respecter les institutions."
 war_stuff.1.b:0 "Laisser les troupes prendre leur dû."

 war_stuff.2.t:0 "Occupation de [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]"
 war_stuff.2.d:1 "À notre grande surprise, les forces d’occupation [SCOPE.sCountry('war_stuff_enemy').GetAdjective] ont maintenu l’ordre et respecté nos institutions malgré leur victoire."
 war_stuff.2.f:1 "\"Les envahisseurs patrouillaient les marchés sans piller ; j’en ai même vu un rendre une bourse tombée ! Qui conquiert avec une telle... civilité ?\""
 war_stuff.2.a:0 "Nous prenons acte de leur retenue."
 war_stuff.3.t:0 "Mise à sac de [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]"
 war_stuff.3.d:1 "Les troupes [SCOPE.sCountry('war_stuff_enemy').GetAdjective] ont réduit [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] en ruines fumantes, pillant nos trésors nationaux et profanant notre héritage."
 war_stuff.3.f:1 "\"Des siècles de savoir réduits en cendres. Ils ont même fondu les statues pour en récupérer le métal !\""
 war_stuff.3.a:0 "Ils paieront cette barbarie !"

 war_stuff.4.t:0 "Troubles à [SCOPE.sState('war_stuff_state').GetName]"
 war_stuff.4.d:1 "Des flambées de violence ont éclaté dans tout [SCOPE.sState('war_stuff_state').GetName], les populations occupées résistant à notre autorité. Les rues rougissent de défi ; nous devons choisir notre réponse sans délai."
 war_stuff.4.f:1 "\"Ils lancent des pavés arrachés aux rues mêmes que nous avons pavées ! Mon lieutenant m’a demandé s’il fallait riposter. Que voulez-vous que je lui dise ?\""
 war_stuff.4.a:0 "Écraser cette rébellion avec une force maximale."
 war_stuff.4.b:0 "Retirer les patrouilles et laisser les tensions retomber."

 war_stuff.5.t:0 "Les tambours de guerre"
 war_stuff.5.d:1 "Une campagne de propagande coordonnée s’est répandue dans [SCOPE.sCountry('war_stuff_home').GetName], ravivant l’ardeur patriotique et affermissant la volonté publique de poursuivre la lutte."
 war_stuff.5.f:1 "\"Chaque mur porte maintenant des affiches de recrutement ! Même les enfants chantent des marches en sautant à la corde. Le cœur de la nation ne bat plus que pour la victoire.\""
 war_stuff.5.a:0 "Notre peuple est uni derrière la cause !"

 war_stuff.6.t:0 "Racisme à [SCOPE.sState('war_stuff_state').GetName]"
 war_stuff.6.d:1 "Des citoyens de [SCOPE.sCountry('war_stuff_home').GetName] à [SCOPE.sState('war_stuff_state').GetName] s’en prennent violemment à leurs voisins d’origine [SCOPE.sCulture('war_stuff_culture').GetName], les rendant responsables de la guerre en cours."
 war_stuff.6.f:1 "\"« Rentrez chez vous ! » criaient-ils...\""
 war_stuff.6.a:0 "Laisser le peuple évacuer sa juste colère."
 war_stuff.6.b:0 "Protéger tous les citoyens, quelle que soit leur origine."

 war_stuff.7.t:0 "L’appel de l’unité"
 war_stuff.7.d:1 "Des délégations venues de [SCOPE.sCountry('war_stuff_enemy').GetName] sont arrivées pour proposer une annexion volontaire à [SCOPE.sCountry('war_stuff_home').GetName], invoquant une culture commune et des liens historiques."
 war_stuff.7.f:1 "\"Mon grand-père s’est battu pour nous diviser, mais mes élèves marchent désormais en chantant vos hymnes. La roue de l’histoire tourne...\""
 war_stuff.7.a:0 "Accueillons nos frères au sein de [SCOPE.sCountry('war_stuff_home').GetNameNoFlag] !"
 war_stuff.7.b:0 "Nous respectons l’indépendance [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]."

 war_stuff.8.t:0 "Remous de l’annexion"
 war_stuff.8.d:1 "La nouvelle parvient à [SCOPE.GetRootScope.GetCountry.GetName] que [SCOPE.sCountry('war_stuff_home').GetName] a absorbé [SCOPE.sCountry('war_stuff_enemy').GetName] par annexion diplomatique, ébranlant l’équilibre des puissances en Europe."
 war_stuff.8.f:1 "\"Ils sont d’abord venus pour les Autrichiens...\""
 war_stuff.8.a:0 "Un fait accompli que nous devons reconnaître."

 war_stuff.9.t:0 "Proposer une paix blanche avec [SCOPE.sCountry('war_stuff_enemy').GetName]"
 war_stuff.9.d:1 "En l’absence de fronts terrestres actifs dans la [SCOPE.sWar('war_stuff_war').GetName], nos conseillers militaires recommandent de rechercher une paix blanche avec [SCOPE.sCountry('war_stuff_enemy').GetName]. Cela mettrait fin au conflit sans changements territoriaux, préservant nos forces et notre trésor d’un nouvel épuisement dans une guerre bloquée."
 war_stuff.9.f:1 ""
 war_stuff.9.a:0 "Envoyer des émissaires avec des conditions de paix."
 war_stuff.9.b:0 "Poursuivre la guerre malgré l’impasse."

 war_stuff.10.t:0 "Ouverture de paix de [SCOPE.sCountry('war_stuff_home').GetName]"
 war_stuff.10.d:1 "Des courriers diplomatiques arrivent du quartier général [SCOPE.sCountry('war_stuff_home').GetAdjective] avec une proposition officielle visant à mettre fin à la [SCOPE.sWar('war_stuff_war').GetName] par un retour aux frontières d’avant-guerre. Leur message reconnaît l’impasse stratégique et propose la cessation de toutes les hostilités."
 war_stuff.10.f:1 ""
 war_stuff.10.a:0 "Accepter leur proposition."
 war_stuff.10.b:0 "Rejeter leur ouverture."

 war_stuff.11.t:0 "La mutinerie des épuisés"
 war_stuff.11.d:1 "Les tranchées sont devenues un cimetière, et les hommes ont atteint leur point de rupture. Les rapports de la [SCOPE.sFront('war_stuff_front').GetName] décrivent des régiments entiers refusant de mettre baïonnette au canon. Ils affirment qu’ils tiendront la ligne contre une avancée ennemie, mais qu’ils ne participeront plus à des offensives « suicidaires » pour un gouvernement qui semble avoir oublié la valeur de leurs vies."
 war_stuff.11.f:1 "\"Nous ne frapperons pas contre la patrie, mais nous ne mourrons pas pour un mensonge. Si les généraux veulent cette colline, qu’ils la prennent eux-mêmes.\""
 war_stuff.11.a:0 "Rétablir l’ordre par le peloton d’exécution."
 war_stuff.11.b:0 "Répondre à leurs griefs et améliorer les rations."

 war_stuff.12.t:0 "Le scandale des munitions"
 war_stuff.12.d:1 "Une humiliation nationale éclate au grand jour : nos soldats au front reçoivent des obus défectueux ; ou pire, rien du tout. Tandis que nos braves affrontent le feu ennemi, les usines du pays s’enlisent dans l’inefficacité et l’explosion des coûts. La presse exige de savoir pourquoi l’« Arsenal de [SCOPE.GetRootScope.GetCountry.GetName] » se tait à l’heure du besoin."
 war_stuff.12.f:1 "\"Un soldat sans cartouche n’est qu’une cible. C’est un crime grave que notre industrie profite tandis que nos fusils claquent à vide.\""
 war_stuff.12.a:0 "Forcer la production malgré tout."
 war_stuff.12.b:0 "Privilégier la qualité et l’intégrité des lignes de ravitaillement."

 war_stuff.13.t:0 "Le plan [SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]"
 war_stuff.13.d:1 "Les cartes du Grand Quartier général n’ont pas changé depuis des mois. Sur la [SCOPE.sFront('war_stuff_front').GetName], chaque mètre gagné le matin est repris à la tombée de la nuit. [SCOPE.sCharacter('war_stuff_general_offensive').GetFullName] est arrivé du front avec une pile de cartes opérationnelles et une sombre détermination. Il affirme qu’avec assez de cran et « une dernière grande offensive », il peut briser les lignes [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] et rendre son mouvement à la guerre."
 war_stuff.13.f:1 "\"Les hommes sont fatigués, oui, mais ils sont plus fatigués encore d’attendre de mourir dans la boue. Donnez-moi les obus, et je briserai [SCOPE.sCountry('war_stuff_enemy').GetNameNoFormatting] une bonne fois pour toutes.\""
 war_stuff.13.a:0 "Lancer l’offensive [SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]."
 war_stuff.13.b:0 "Rejeter le plan et maintenir nos défenses."

 war_stuff.14.t:0 "L’initiative de libération"
 war_stuff.14.d:1 "Les lignes de la [SCOPE.sFront('war_stuff_front').GetName] se sont figées, laissant nos propres compatriotes languir sous l’occupation [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]. [SCOPE.sCharacter('war_stuff_general_liberation').GetFullName] a soumis au ministère de la Guerre un plan opérationnel audacieux. Il soutient qu’en concentrant nos troupes et en invoquant le désir des hommes de reprendre leurs foyers, nous pouvons briser les lignes [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]."
 war_stuff.14.f:1 "\"Chaque jour de retard est un jour de souffrance de plus pour nos frères de [SCOPE.sState('war_stuff_liberation_state').GetNameNoFormatting]. Donnez l’ordre, et nous repousserons la menace [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFormatting] au-delà de la frontière.\""
 war_stuff.14.a:0 "Autoriser l’offensive [SCOPE.sCharacter('war_stuff_general_liberation').GetLastName]."
 war_stuff.14.b:0 "Maintenir une posture défensive."

 waddle_modifier_brutal_discipline:0 "Discipline brutale"
 
 waddle_modifier_war_concessions:0 "Concessions au front"
 
 waddle_modifier_industrial_seizure:0 "Production de munitions défectueuses"
 
 waddle_modifier_careful_supply:0 "Contrôle qualitatif du ravitaillement"

 waddle_modifier_desperate_offensive:0 "La grande offensive"
 
 waddle_modifier_trench_attrition:0 "Impasse des tranchées"

 waddle_modifier_liberation_drive:0 "Élan de libération"

 war_stuff.15.t: "Crise de la conscription"
 war_stuff.15.d: "Alors que la guerre s’éternise, de nouvelles levées rencontrent une résistance ouverte. Les autorités locales signalent des désertions, des fils cachés et des villages refusant de fournir une nouvelle fournée d’hommes."
 war_stuff.15.f: "\"Si l’État a encore faim, qu’il mange à une autre table.\""
 war_stuff.15.a: "Les quotas doivent être atteints."
 war_stuff.15.b: "Accorder des exemptions limitées."
 war_stuff.16.t: "Réfugiés de [SCOPE.sState('war_stuff_refugee_state').GetName]"
 war_stuff.16.d: "Les combats à [SCOPE.sState('war_stuff_refugee_state').GetName] ont chassé les civils de leurs foyers. Les routes, gares et églises derrière la [SCOPE.sFront('war_stuff_front').GetName] sont encombrées de ceux qui fuient les canons."
 war_stuff.16.f: "Ils ont emporté ce qu’ils pouvaient porter. Le reste fut laissé à la fumée."
 war_stuff.16.a: "Qu’on leur trouve un abri."
 war_stuff.16.b: "L’armée est prioritaire."
 war_stuff.17.t: "Rapports d’atrocités"
 war_stuff.17.d: "Des rapports de pillages, de représailles et d’exécutions par nos troupes commencent à circuler à l’étranger. Les responsables assurent que ces récits sont exagérés, mais les journaux hostiles de [SCOPE.sCountry('war_stuff_enemy').GetName] tiennent déjà leur une."
 war_stuff.17.f: "En guerre, la vérité arrive tard, mal vêtue et accompagnée d’ennemis."
 war_stuff.17.a: "Nier ces calomnies."
 war_stuff.17.b: "Punir les coupables pour l’exemple."
 war_stuff.18.t: "Fraternisation sur la [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.18.d: "Des mois d’impasse sur la [SCOPE.sFront('war_stuff_front').GetName] ont fait naître une étrange familiarité entre tranchées opposées. Les officiers rapportent des cigarettes échangées, des plaisanteries criées et une réticence inquiétante à tirer sans ordre."
 war_stuff.18.f: "\"Ce ne sont pas des démons là-bas, écrivait un soldat, seulement de pauvres diables comme nous.\""
 war_stuff.18.a: "Accorder aux hommes cette trêve."
 war_stuff.18.b: "La discipline doit être rétablie."
 war_stuff.19.t: "Percée sur la [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.19.d: "L’offensive sur la [SCOPE.sFront('war_stuff_front').GetName] a percé. Les dépêches de [SCOPE.sCharacter('war_stuff_general').GetFullName] parlent de positions ennemies abandonnées, de réserves en mouvement et de routes qui s’ouvrent au-delà des canons."
 war_stuff.19.f: "Pour une fois, la carte avançait plus vite que les listes de pertes."
 war_stuff.19.a: "Exploiter l’avantage."
 war_stuff.20.t: "L’offensive échoue sur la [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.20.d: "La percée promise sur la [SCOPE.sFront('war_stuff_front').GetName] n’est pas venue. L’armée a payé très cher quelques champs ruinés, et le public demande désormais qui a ordonné un tel sacrifice."
 war_stuff.20.f: "L’état-major parlait de pression, d’élan et de résolution. Les soldats parlaient de boue."
 war_stuff.20.a: "Les généraux doivent répondre de cela."
 war_stuff.20.b: "Encore un assaut."
 war_stuff.21.t: "Libération sur la [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.21.d: "Nos forces ont libéré un territoire occupé sur la [SCOPE.sFront('war_stuff_front').GetName], repoussant l’ennemi hors de terres qu’il revendiquait comme son butin. Les foules acclament les soldats revenus comme la preuve que la guerre peut encore être gagnée."
 war_stuff.21.f: "Le premier drapeau hissé était petit et déchiré. Cela suffisait."
 war_stuff.21.a: "Que les cloches sonnent."
 war_stuff.22.t: "La libération vacille sur la [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.22.d: "La tentative de libérer le territoire occupé sur la [SCOPE.sFront('war_stuff_front').GetName] a échoué. Ceux qui restent sous contrôle ennemi attendent en vain, tandis que le reste du pays compte le coût d’un nouvel échec."
 war_stuff.22.f: "On leur avait dit d’écouter nos canons. À l’hiver, ils n’écoutaient plus que les bottes à la porte."
 war_stuff.22.a: "Nous devons tenir."
 war_stuff.23.t: "Des fusils pour la [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.23.d: "La demande de fusils et de pièces détachées de l’armée a tendu le marché. [SCOPE.sCharacter('war_stuff_general').GetFullName] avertit que les formations sur la [SCOPE.sFront('war_stuff_front').GetName] pourraient atteindre la ligne avec de vieilles armes, des pièces manquantes, voire rien du tout."
 war_stuff.23.f: "Un soldat peut marcher affamé. Il ne peut pas tenir une ligne les mains vides."
 war_stuff.23.a: "Saisir les stocks."
 war_stuff.23.b: "Rationner ce qui reste."
 war_stuff.24.t: "De l’artillerie pour la [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.24.d: "Les pénuries d’artillerie ont forcé l’armée à choisir ses barrages avec soin. Les commandants de la [SCOPE.sFront('war_stuff_front').GetName] demandent plus d’obus que les usines et dépôts ne peuvent fournir."
 war_stuff.24.f: "Les hommes n’ont pas demandé des discours. Ils ont demandé quand nos canons répondraient."
 war_stuff.24.a: "Approvisionner les canons."
 war_stuff.24.b: "Conserver les obus."
 war_stuff.25.t: "Pénurie d’explosifs"
 war_stuff.25.d: "Une pénurie d’explosifs menace désormais les obus, les mines et la production militaire. L’armée exige des pouvoirs d’urgence sur les usines chimiques, tandis que les industriels avertissent d’une perturbation ruineuse."
 war_stuff.25.f: "Désormais, chaque facture pesait comme une affaire de vie ou de mort."
 war_stuff.25.a: "Réquisitionner les usines."
 war_stuff.25.b: "Garder la poudre pour l’heure décisive."
 war_stuff.26.t: "Prisonniers de [SCOPE.sCountry('war_stuff_enemy').GetName]"
 war_stuff.26.d: "Un succès récent sur la [SCOPE.sFront('war_stuff_front').GetName] contre [SCOPE.sCountry('war_stuff_enemy').GetName] nous laisse des colonnes de prisonniers ennemis. Leur traitement sera observé par nos soldats, nos ennemis et les gouvernements qui jugent encore le caractère de cette guerre."
 war_stuff.26.f: "La victoire ne s’arrêta pas au champ de bataille. Elle continua sa marche sous escorte."
 war_stuff.26.a: "Les traiter avec honneur."
 war_stuff.26.b: "Les mettre au travail."
 war_stuff.26.c: "Organiser un échange."
 waddle_modifier_forced_conscription: "Conscription forcée"
 waddle_modifier_forced_conscription_desc: "Les quotas de recrutement sont imposés malgré une résistance locale croissante."
 waddle_modifier_conscription_exemptions: "Exemptions de conscription"
 waddle_modifier_conscription_exemptions_desc: "Des exemptions limitées ont apaisé les troubles, au prix de la préparation militaire."
 waddle_modifier_refugee_relief: "Secours aux réfugiés"
 waddle_modifier_refugee_relief_desc: "L’État organise l’aide aux civils déplacés par le front."
 waddle_modifier_wartime_censorship: "Censure de guerre"
 waddle_modifier_wartime_censorship_desc: "Les rapports du front sont supprimés au nom de l’ordre."
 waddle_modifier_frontline_fraternization: "Fraternisation au front"
 waddle_modifier_frontline_fraternization_desc: "Les contacts informels avec l’ennemi ont assoupli la discipline au front."
 waddle_modifier_breakthrough_momentum: "Élan de percée"
 waddle_modifier_breakthrough_momentum_desc: "Une offensive réussie a restauré la confiance dans l’armée."
 waddle_modifier_offensive_exhaustion: "Épuisement offensif"
 waddle_modifier_offensive_exhaustion_desc: "Une attaque ratée a ébranlé l’armée et rendu le public inquiet."
 waddle_modifier_victorious_liberation: "Libération victorieuse"
 waddle_modifier_victorious_liberation_desc: "Un territoire occupé a été délivré, relevant le moral dans tout le pays."
 waddle_modifier_shattered_liberation_drive: "Élan de libération brisé"
 waddle_modifier_shattered_liberation_drive_desc: "Une tentative de libération ratée a approfondi le désespoir en territoire occupé."
 waddle_modifier_small_arms_seizure: "Armes légères saisies"
 waddle_modifier_small_arms_seizure_desc: "Les stocks d’armes privés et commerciaux ont été saisis pour un usage militaire."
 waddle_modifier_small_arms_rationing: "Fusils rationnés"
 waddle_modifier_small_arms_rationing_desc: "Les fusils et pièces détachées sont rationnés dans toute l’armée."
 waddle_modifier_artillery_priority: "Priorité à l’artillerie"
 waddle_modifier_artillery_priority_desc: "L’industrie et les transports sont orientés vers les besoins des canons."
 waddle_modifier_artillery_conservation: "Conservation des obus"
 waddle_modifier_artillery_conservation_desc: "Les munitions d’artillerie sont conservées pour les actions les plus nécessaires."
 waddle_modifier_explosives_seizure: "Usines chimiques saisies"
 waddle_modifier_explosives_seizure_desc: "La production d’explosifs est placée sous contrôle de guerre."
 waddle_modifier_powder_conservation: "Conservation de la poudre"
 waddle_modifier_powder_conservation_desc: "Les explosifs sont réservés aux opérations décisives."
 waddle_modifier_pow_labor: "Travail des prisonniers"
 waddle_modifier_pow_labor_desc: "Les prisonniers ennemis sont utilisés pour soutenir l’économie de guerre."
