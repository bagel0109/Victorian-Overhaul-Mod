l_french:
  RADICALS_TOOLTIP:1 "#tooltip_header $RADICALS$#!\nIl y a #v [Country.GetNumRadicals|D]#! $RADICALS$ dans la population totale de #v [Country.GetTotalPopulation|D]#! ([Country.MakeScope.ScriptValue('larp_radicals_percent')|%v1]) en [Country.GetName]\n$TOOLTIP_DELIMITER$\nLe nombre de $RADICALS$ a change de #v #tooltippable #tooltip:[Country.GetTooltipTag],RADICALS_CHANGE_TOOLTIP [Country.GetTotalNumRadicalsChange|D=-]#!#!#! depuis le [Country.GetRadicalsLoyalistsChangeStartDate|v].\nLes facteurs les plus importants sont [Country.GetRadicalsChangeSummary]\n\n[Country.GetRadicalsSummaryDesc][ConcatIfNeitherEmpty('\n\n',SelectLocalization( GreaterThan_int32(Country.CalcNumStatesInTurmoil, '(int32)0'), 'STATES_IN_TURMOIL', '' ))][ConcatIfNeitherEmpty('\n\n',SelectLocalization( Country.HasIGApprovalFromRadicals, 'RADICALS_IG_APPROVAL', '' ))]"
  LOYALISTS_TOOLTIP:1 "#tooltip_header $LOYALISTS$#!\nIl y a #v [Country.GetNumLoyalists|D]#! $LOYALISTS$ dans la population totale de #v [Country.GetTotalPopulation|D]#! ([Country.MakeScope.ScriptValue('larp_loyalists_percent')|%v1]) en [Country.GetName]\n$TOOLTIP_DELIMITER$\nLe nombre de $LOYALISTS$ a change de #v #tooltippable #tooltip:[Country.GetTooltipTag],LOYALISTS_CHANGE_TOOLTIP [Country.GetTotalNumLoyalistsChange|D=+]#!#!#! depuis le [Country.GetRadicalsLoyalistsChangeStartDate|v]\nLes facteurs les plus importants sont [Country.GetLoyalistsChangeSummary]\n\n[Country.GetLoyalistsSummaryDesc][ConcatIfNeitherEmpty('\n\n',SelectLocalization( Country.HasIGApprovalFromLoyalists, 'LOYALISTS_IG_APPROVAL', '' ))]"
  NEUTRALS_TOOLTIP:1 "#tooltip_header $NEUTRALS$#!\nIl y a #v [Country.GetNumNeutrals|*2]#! $NEUTRALS$ dans la population totale de #v [Country.GetTotalPopulation|*2]#! ([Country.MakeScope.ScriptValue('larp_neutrals_percent')|%v1]) en [Country.GetName]"
  POP_TOOLTIP:2 "#tooltip_header [Concept('concept_pop','$concept_population$')]#!\nActuelle: [Country.GetTotalPopulation|*2v] ([Country.GetPopulationRanking])\n[Country.GetPopGrowthDesc]$POP_TOOLTIP_DELAYED$\n$TOOLTIP_DELIMITER$\nLa population [Country.GetAdjective] represente [Country.MakeScope.ScriptValue('larp_global_pop_percent')|%v1] de la population mondiale\nPopulation mondiale: [Country.MakeScope.ScriptValue('larp_global_pop')|*2v]"
  GDP_TOOLTIP:1 "#header [concept_gdp] [Country.GetAdjective]#! \n@money![Country.GetGDP|Dv] (#u #tooltippable #tooltip:[Country.GetTooltipTag],COUNTRY_GDP_OWNERSHIP_TOOLTIP [Country.GetDomesticallyOwnedGDPFraction|%1b]#!#!#!) $concept_gdp_short$ de propriété nationale ([Country.GetGDPRanking])\n@money![Country.GetGDPPerCapita|2*v] [Concept('concept_gdp_per_capita', '$concept_gdp_per_capita_short$')] ([Country.GetGDPPerCapitaRanking])\n$GDPGR_growth_text$\n$TOOLTIP_DELIMITER$\nLe $concept_gdp_short$ [Country.GetAdjective] représente [Country.MakeScope.ScriptValue('larp_global_gdp_percent')|%v2] du PIB mondial\nPIB mondial : @money![Country.MakeScope.ScriptValue('larp_global_gdp')|Dv]"
  CURRENT_GDP_STATE:2 "#header [State.GetOwner.GetAdjectiveNoFormatting] [concept_gdp] de [State.GetName]#!\n$TOOLTIP_DELIMITER$\nContribution annuelle actuelle au PIB: #variable @money![State.GetGDPContribution|K]#!\nLe PIB par habitant de [State.GetName] est de: #variable @money![State.MakeScope.ScriptValue('get_state_gdp_per')|Dv]#!\nEcart de PIB par habitant entre [State.GetName] et [State.GetOwner.GetAdjectiveNoFormatting]: #variable @money![State.MakeScope.ScriptValue('get_country_state_relative_value')|D2+=]#!\nEcart de PIB par habitant entre [State.GetName] et le niveau mondial: #variable @money![State.MakeScope.ScriptValue('get_global_state_relative_value')|D2+=]#!\n[State.GetName] contribue a hauteur de #variable [State.GetGDPContributionPercentage|%1]#! du $GDP_SHORT$ de [State.GetOwner.GetAdjectiveNoFormatting]\n\n[State.GetGDPGoodsContributionBreakdown]"
