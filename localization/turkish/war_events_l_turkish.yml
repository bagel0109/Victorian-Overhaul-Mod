l_turkish:
 war_stuff.1.t:0 "[SCOPE.sCountry('war_stuff_enemy').GetCapital.GetCityHubName] İşgal Edildi"
 war_stuff.1.d:1 "Muzaffer ordularımız şimdi [SCOPE.sCountry('war_stuff_enemy').GetName] ülkesinin kalbini işgal ediyor. Fethedilmiş başkente nasıl davranacağımız tarihte yankılanacak; meşruiyetimiz ve düşmanın direnme iradesi üzerinde ağırlık bırakacaktır."
 war_stuff.1.f:1 "\"Bu insanlar kaderlerinin bizim merhametimize bağlı olduğunu biliyor.\""
 war_stuff.1.a:0 "Düzeni koru ve kurumlara saygı göster."
 war_stuff.1.b:0 "Askerlerin hakkını almasına izin ver."

 war_stuff.2.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] İşgal Edildi"
 war_stuff.2.d:1 "Şaşkınlığımıza rağmen işgalci [SCOPE.sCountry('war_stuff_enemy').GetAdjective] kuvvetleri, zaferlerine karşın düzeni korudu ve kurumlarımıza saygı gösterdi."
 war_stuff.2.f:1 "\"İstilacılar pazarlarda yağma yapmadan devriye gezdi; hatta birinin düşen bir keseyi geri verdiğini gördüm! Kim böyle... medeni biçimde fetheder?\""
 war_stuff.2.a:0 "Bu ölçülülük not edilsin."
 war_stuff.3.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] Yağmalandı"
 war_stuff.3.d:1 "[SCOPE.sCountry('war_stuff_enemy').GetAdjective] birlikleri [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] kentini tüten harabelere çevirdi, ulusal hazinelerimizi yağmaladı ve mirasımızı kirletti."
 war_stuff.3.f:1 "\"Yüzyılların bilgisi küle döndü. Heykelleri bile hurda metal için erittiler!\""
 war_stuff.3.a:0 "Bu barbarlığın bedelini ödeyecekler!"

 war_stuff.4.t:0 "[SCOPE.sState('war_stuff_state').GetName] Eyaletinde Huzursuzluk"
 war_stuff.4.d:1 "İşgal altındaki halk otoritemize direnince [SCOPE.sState('war_stuff_state').GetName] boyunca şiddet patlak verdi. Sokaklar meydan okumanın kanıyla kızarıyor; derhal yanıtımızı seçmeliyiz."
 war_stuff.4.f:1 "\"Kendi döşediğimiz sokaklardan söktükleri kaldırım taşlarını atıyorlar! Teğmenim karşılık vermemiz gerekip gerekmediğini sordu. Ona ne dememi istersiniz?\""
 war_stuff.4.a:0 "Bu isyanı azami güçle ez."
 war_stuff.4.b:0 "Devriyeleri geri çek ve gerginliğin soğumasına izin ver."

 war_stuff.5.t:0 "Savaşın Davulları"
 war_stuff.5.d:1 "Eşgüdümlü bir propaganda kampanyası [SCOPE.sCountry('war_stuff_home').GetName] boyunca yayıldı; vatansever coşkuyu alevlendirdi ve halkın mücadeleyi sürdürme kararını pekiştirdi."
 war_stuff.5.f:1 "\"Her duvarda artık asker toplama afişleri var! Çocuklar bile ip atlarken marş söylüyor. Ulusun kalbi yalnız zafer için atıyor.\""
 war_stuff.5.a:0 "Halkımız dava arkasında birleşti!"

 war_stuff.6.t:0 "[SCOPE.sState('war_stuff_state').GetName] Eyaletinde Irkçılık"
 war_stuff.6.d:1 "[SCOPE.sState('war_stuff_state').GetName] içindeki [SCOPE.sCountry('war_stuff_home').GetName] vatandaşları, süren savaştan sorumlu tutarak [SCOPE.sCulture('war_stuff_culture').GetName] kökenli komşularını şiddetle hedef alıyor."
 war_stuff.6.f:1 "\"'Evinize dönün!' diye bağırıyorlardı...\""
 war_stuff.6.a:0 "Halk haklı öfkesini dışa vursun."
 war_stuff.6.b:0 "Kökenine bakmaksızın tüm vatandaşları koru."

 war_stuff.7.t:0 "Birlik Çağrısı"
 war_stuff.7.d:1 "[SCOPE.sCountry('war_stuff_enemy').GetName] ülkesinden delegasyonlar, ortak kültür ve tarihsel bağları gerekçe göstererek [SCOPE.sCountry('war_stuff_home').GetName] içine gönüllü ilhak önerisiyle geldi."
 war_stuff.7.f:1 "\"Büyükbabam bizi ayırmak için savaştı, ama öğrencilerim artık sizin marşlarınızı söyleyerek yürüyor. Tarihin çarkı dönüyor...\""
 war_stuff.7.a:0 "Kardeşlerimizi [SCOPE.sCountry('war_stuff_home').GetNameNoFlag] içine kabul edelim!"
 war_stuff.7.b:0 "[SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] bağımsızlığına saygı duyuyoruz."

 war_stuff.8.t:0 "İlhakın Dalgaları"
 war_stuff.8.d:1 "[SCOPE.GetRootScope.GetCountry.GetName], [SCOPE.sCountry('war_stuff_home').GetName] ülkesinin diplomatik ilhakla [SCOPE.sCountry('war_stuff_enemy').GetName] ülkesini içine aldığını ve Avrupa güç dengesini sarstığını öğreniyor."
 war_stuff.8.f:1 "\"Önce Avusturyalılar için geldiler...\""
 war_stuff.8.a:0 "Kabul etmemiz gereken bir oldubitti."

 war_stuff.9.t:0 "[SCOPE.sCountry('war_stuff_enemy').GetName] ile Statüko Barışı Öner"
 war_stuff.9.d:1 "[SCOPE.sWar('war_stuff_war').GetName] içinde aktif kara cepheleri olmadığından askeri danışmanlarımız [SCOPE.sCountry('war_stuff_enemy').GetName] ile statüko barışı aramamızı tavsiye ediyor. Bu, çatışmayı toprak değişikliği olmadan bitirecek ve çıkmaza girmiş savaşta kuvvetlerimizi ve hazinemizi daha fazla tükenmekten koruyacaktır."
 war_stuff.9.f:1 ""
 war_stuff.9.a:0 "Barış şartlarıyla elçiler gönder."
 war_stuff.9.b:0 "Çıkmaza rağmen savaşı sürdür."

 war_stuff.10.t:0 "[SCOPE.sCountry('war_stuff_home').GetName] Tarafından Barış Yoklaması"
 war_stuff.10.d:1 "Diplomatik kuryeler, [SCOPE.sCountry('war_stuff_home').GetAdjective] karargâhından [SCOPE.sWar('war_stuff_war').GetName] savaşını savaş öncesi sınırlara dönüşle bitirmeye yönelik resmi bir teklif getirdi. Mesajları stratejik kilitlenmeyi kabul ediyor ve tüm düşmanlıkların sona ermesini öneriyor."
 war_stuff.10.f:1 ""
 war_stuff.10.a:0 "Tekliflerini kabul et."
 war_stuff.10.b:0 "Yoklamalarını reddet."

 war_stuff.11.t:0 "Bitkinlerin İsyanı"
 war_stuff.11.d:1 "Siperler mezarlığa döndü ve askerler kırılma noktasına ulaştı. [SCOPE.sFront('war_stuff_front').GetName] cephesinden gelen raporlar, tüm alayların süngü takmayı reddettiğini anlatıyor. Düşman ilerlemesine karşı hattı tutacaklarını, fakat hayatlarının değerini unutmuş görünen bir hükümet için artık 'intihar' hücumlarına katılmayacaklarını söylüyorlar."
 war_stuff.11.f:1 "\"Vatana saldırmayacağız, ama bir yalan uğruna ölmeyeceğiz. Generaller o tepeyi istiyorsa, gidip kendileri alsın.\""
 war_stuff.11.a:0 "İdam mangasıyla düzeni sağla."
 war_stuff.11.b:0 "Şikâyetlerini ele al ve erzakı iyileştir."

 war_stuff.12.t:0 "Mühimmat Skandalı"
 war_stuff.12.d:1 "Ulusal bir utanç ortaya çıktı: cephedeki askerlerimize kusurlu mermiler veriliyor; hatta daha kötüsü, hiç verilmiyor. Cesur askerlerimiz düşman ateşiyle yüzleşirken, yurttaki fabrikalar verimsizliğe ve yükselen maliyetlere saplanmış durumda. Basın, ihtiyaç saatimizde '[SCOPE.GetRootScope.GetCountry.GetName] Cephaneliği'nin neden sustuğunu soruyor."
 war_stuff.12.f:1 "\"Mermisiz asker yalnızca hedeftir. Tüfeklerimiz boş tıkırdarken sanayinin kâr etmesi ağır bir suçtur.\""
 war_stuff.12.a:0 "Yine de üretimi zorla."
 war_stuff.12.b:0 "Kaliteyi ve ikmal hattı bütünlüğünü öncele."

 war_stuff.13.t:0 "[SCOPE.sCharacter('war_stuff_general_offensive').GetLastName] Planı"
 war_stuff.13.d:1 "Genel Karargâhın haritaları aylardır değişmedi. [SCOPE.sFront('war_stuff_front').GetName] cephesinde sabah kazanılan her karış toprak gece geri alınıyor. [SCOPE.sCharacter('war_stuff_general_offensive').GetFullName], ön cepheden bir yığın harekât haritası ve kasvetli bir kararlılıkla geldi. Yeterince metanet ve 'son bir büyük taarruz' ile [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] hatlarını parçalayabileceğini ve savaşa hareket kazandırabileceğini savunuyor."
 war_stuff.13.f:1 "\"Askerler yorgun, evet; ama çamurda ölümü beklemekten daha da yorgunlar. Bana mermileri verin, [SCOPE.sCountry('war_stuff_enemy').GetNameNoFormatting] ülkesini kesin olarak kırayım.\""
 war_stuff.13.a:0 "[SCOPE.sCharacter('war_stuff_general_offensive').GetLastName] Taarruzu'nu başlat."
 war_stuff.13.b:0 "Planı reddet ve savunmamızı koru."

 war_stuff.14.t:0 "Kurtuluş Girişimi"
 war_stuff.14.d:1 "[SCOPE.sFront('war_stuff_front').GetName] üzerindeki hatlar durgunlaştı ve kendi yurttaşlarımız [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] işgali altında eziliyor. [SCOPE.sCharacter('war_stuff_general_liberation').GetFullName], Harbiye Nezareti'ne cüretkâr bir harekât planı sundu. Askerlerimizi yoğunlaştırıp erkeklerin kendi ocaklarını geri alma arzusuna seslenerek [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] hatlarını parçalayabileceğimizi savunuyor."
 war_stuff.14.f:1 "\"Geciktiğimiz her gün, [SCOPE.sState('war_stuff_liberation_state').GetNameNoFormatting] içindeki kardeşlerimiz için bir gün daha acı demektir. Emri verin, [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFormatting] tehdidini sınırın ötesine süreceğiz.\""
 war_stuff.14.a:0 "[SCOPE.sCharacter('war_stuff_general_liberation').GetLastName] Taarruzu'na izin ver."
 war_stuff.14.b:0 "Savunma tutumunu koru."

 waddle_modifier_brutal_discipline:0 "Acımasız Disiplin"
 
 waddle_modifier_war_concessions:0 "Cephe Tavizleri"
 
 waddle_modifier_industrial_seizure:0 "Kusurlu Mühimmat Üretimi"
 
 waddle_modifier_careful_supply:0 "Kaliteli İkmal Denetimi"

 waddle_modifier_desperate_offensive:0 "Büyük Taarruz"
 
 waddle_modifier_trench_attrition:0 "Siper Kilitlenmesi"

 waddle_modifier_liberation_drive:0 "Kurtuluş Hamlesi"

 war_stuff.15.t: "Zorunlu Askerlik Krizi"
 war_stuff.15.d: "Savaş uzadıkça yeni celpler açık direnişle karşılaşıyor. Yerel yetkililer firarları, saklanan oğulları ve bir tur daha erkek vermek istemeyen köyleri bildiriyor."
 war_stuff.15.f: "\"Devlet hâlâ açsa, başka bir sofradan yesin.\""
 war_stuff.15.a: "Kotalar yerine getirilmeli."
 war_stuff.15.b: "Sınırlı muafiyetler ver."
 war_stuff.16.t: "[SCOPE.sState('war_stuff_refugee_state').GetName] Mültecileri"
 war_stuff.16.d: "[SCOPE.sState('war_stuff_refugee_state').GetName] içindeki çatışmalar sivilleri evlerinden etti. [SCOPE.sFront('war_stuff_front').GetName] gerisindeki yollar, istasyonlar ve kiliseler toplardan kaçanlarla dolu."
 war_stuff.16.f: "Taşıyabildiklerini getirdiler. Geri kalanı dumanlara bırakıldı."
 war_stuff.16.a: "Onlara barınak bulun."
 war_stuff.16.b: "İlk hak orduya aittir."
 war_stuff.17.t: "Vahşet Raporları"
 war_stuff.17.d: "Birliklerimizin yağma, misilleme ve öldürmelerine dair haberler yurtdışında dolaşmaya başladı. Yetkililer anlatıların abartılı olduğunu söylüyor, ancak [SCOPE.sCountry('war_stuff_enemy').GetName] içindeki düşman gazeteleri başlıklarını çoktan buldu."
 war_stuff.17.f: "Savaşta hakikat geç gelir; kötü giyinmiştir ve yanında düşmanlar vardır."
 war_stuff.17.a: "Bu iftiraları reddet."
 war_stuff.17.b: "Suçluları ibret olsun diye cezalandır."
 war_stuff.18.t: "[SCOPE.sFront('war_stuff_front').GetName] Cephesinde Kardeşleşme"
 war_stuff.18.d: "[SCOPE.sFront('war_stuff_front').GetName] cephesindeki aylar süren çıkmaz, karşılıklı siperler arasında tuhaf bir aşinalık doğurdu. Subaylar takas edilen sigaralar, bağırılan şakalar ve emir olmadan ateş etmeye karşı rahatsız edici bir isteksizlik bildiriyor."
 war_stuff.18.f: "\"Karşıdakiler şeytan değil,\" diye yazdı bir er, \"bizim gibi zavallılar.\""
 war_stuff.18.a: "Askerlere bu kısa sükûneti tanı."
 war_stuff.18.b: "Disiplin yeniden sağlanmalı."
 war_stuff.19.t: "[SCOPE.sFront('war_stuff_front').GetName] Cephesinde Yarma"
 war_stuff.19.d: "[SCOPE.sFront('war_stuff_front').GetName] cephesindeki taarruz düşman hatlarını yardı. [SCOPE.sCharacter('war_stuff_general').GetFullName] tarafından gelen raporlar terk edilmiş düşman mevzilerinden, hareket eden ihtiyatlardan ve topların ötesinde açılan yollardan söz ediyor."
 war_stuff.19.f: "İlk kez harita, zayiat listelerinden hızlı ilerledi."
 war_stuff.19.a: "Üstünlüğü sürdür."
 war_stuff.20.t: "[SCOPE.sFront('war_stuff_front').GetName] Cephesinde Taarruz Başarısız"
 war_stuff.20.d: "[SCOPE.sFront('war_stuff_front').GetName] cephesinde vaat edilen yarma gelmedi. Ordu birkaç harap tarla için ağır bedel ödedi ve halk şimdi böyle bir fedakârlığı kimin emrettiğini soruyor."
 war_stuff.20.f: "Kurmaylar baskıdan, ivmeden ve kararlılıktan söz etti. Askerler çamurdan söz etti."
 war_stuff.20.a: "Generaller bunun hesabını vermeli."
 war_stuff.20.b: "Bir hamle daha."
 war_stuff.21.t: "[SCOPE.sFront('war_stuff_front').GetName] Cephesinde Kurtuluş"
 war_stuff.21.d: "Kuvvetlerimiz [SCOPE.sFront('war_stuff_front').GetName] cephesinde işgal altındaki toprağı kurtardı ve düşmanı ganimet saydığı yerlerden geri sürdü. Kalabalıklar dönen askerleri savaşın hâlâ kazanılabileceğinin kanıtı olarak alkışlıyor."
 war_stuff.21.f: "İlk göndere çekilen bayrak küçüktü, yırtıktı ve yeterliydi."
 war_stuff.21.a: "Çanlar çalsın."
 war_stuff.22.t: "[SCOPE.sFront('war_stuff_front').GetName] Cephesinde Kurtuluş Aksıyor"
 war_stuff.22.d: "[SCOPE.sFront('war_stuff_front').GetName] cephesinde işgal altındaki toprağı kurtarma girişimi başarısız oldu. Hâlâ düşman kontrolündekiler boşuna beklerken, ülkenin geri kalanı bir başka başarısız çabanın bedelini sayıyor."
 war_stuff.22.f: "Onlara toplarımızı dinlemeleri söylenmişti. Kış geldiğinde yalnız kapıdaki çizmeleri dinliyorlardı."
 war_stuff.22.a: "Dayanmalıyız."
 war_stuff.23.t: "[SCOPE.sFront('war_stuff_front').GetName] İçin Tüfekler"
 war_stuff.23.d: "Ordunun tüfek ve yedek parça talebi piyasayı zorladı. [SCOPE.sCharacter('war_stuff_general').GetFullName], [SCOPE.sFront('war_stuff_front').GetName] cephesindeki birliklerin hatta eski silahlarla, eksik parçalarla veya hiçbir şeysiz ulaşabileceği konusunda uyarıyor."
 war_stuff.23.f: "Asker aç yürüyebilir. Eli boş hat tutamaz."
 war_stuff.23.a: "Stoklara el koy."
 war_stuff.23.b: "Kalanı karneye bağla."
 war_stuff.24.t: "[SCOPE.sFront('war_stuff_front').GetName] İçin Topçu"
 war_stuff.24.d: "Topçu kıtlığı, orduyu bombardımanlarını dikkatle seçmeye zorladı. [SCOPE.sFront('war_stuff_front').GetName] cephesindeki komutanlar fabrikalar ve depoların sağlayabileceğinden daha fazla mermi istiyor."
 war_stuff.24.f: "Askerler nutuk istemedi. Toplarımızın ne zaman cevap vereceğini sordular."
 war_stuff.24.a: "Toplara mühimmat yetiştir."
 war_stuff.24.b: "Mermileri koru."
 war_stuff.25.t: "Patlayıcı Kıtlığı"
 war_stuff.25.d: "Patlayıcı kıtlığı artık mermileri, mayınları ve askeri üretimi tehdit ediyor. Ordu kimya tesisleri üzerinde acil yetkiler talep ederken sanayiciler yıkıcı aksaklıklar konusunda uyarıyor."
 war_stuff.25.f: "Her fatura artık ölüm kalım ağırlığı taşıyordu."
 war_stuff.25.a: "Tesislere el koy."
 war_stuff.25.b: "Barutu karar saatine sakla."
 war_stuff.26.t: "[SCOPE.sCountry('war_stuff_enemy').GetName] Esirleri"
 war_stuff.26.d: "[SCOPE.sFront('war_stuff_front').GetName] cephesinde [SCOPE.sCountry('war_stuff_enemy').GetName] karşısında son başarı, bize düşman esir sütunları bıraktı. Onlara nasıl davranılacağı askerlerimiz, düşmanlarımız ve bu savaşın niteliğini hâlâ tartan hükümetler tarafından izlenecek."
 war_stuff.26.f: "Zafer savaş alanında bitmedi. Nöbet altında yürümeye devam etti."
 war_stuff.26.a: "Onlara onurlu davran."
 war_stuff.26.b: "Onları çalıştır."
 war_stuff.26.c: "Bir değişim ayarla."
 waddle_modifier_forced_conscription: "Zorla Askere Alma"
 waddle_modifier_forced_conscription_desc: "Askere alma kotaları, büyüyen yerel direnişe rağmen uygulanıyor."
 waddle_modifier_conscription_exemptions: "Askere Alma Muafiyetleri"
 waddle_modifier_conscription_exemptions_desc: "Sınırlı muafiyetler huzursuzluğu azalttı, ancak askeri hazırlık pahasına."
 waddle_modifier_refugee_relief: "Mülteci Yardımı"
 waddle_modifier_refugee_relief_desc: "Devlet, cephe tarafından yerinden edilen siviller için yardım örgütlüyor."
 waddle_modifier_wartime_censorship: "Savaş Sansürü"
 waddle_modifier_wartime_censorship_desc: "Savaştan gelen raporlar düzen adına bastırılıyor."
 waddle_modifier_frontline_fraternization: "Cephe Kardeşleşmesi"
 waddle_modifier_frontline_fraternization_desc: "Düşmanla gayriresmî temas cephede disiplini yumuşattı."
 waddle_modifier_breakthrough_momentum: "Yarma İvmesi"
 waddle_modifier_breakthrough_momentum_desc: "Başarılı bir taarruz orduya güveni yeniden kazandırdı."
 waddle_modifier_offensive_exhaustion: "Taarruz Yorgunluğu"
 waddle_modifier_offensive_exhaustion_desc: "Başarısız bir saldırı orduyu sarstı ve halkı huzursuz etti."
 waddle_modifier_victorious_liberation: "Muzaffer Kurtuluş"
 waddle_modifier_victorious_liberation_desc: "İşgal altındaki bölge kurtarıldı ve ülke genelinde morali yükseltti."
 waddle_modifier_shattered_liberation_drive: "Kırılmış Kurtuluş Hamlesi"
 waddle_modifier_shattered_liberation_drive_desc: "Başarısız bir kurtuluş girişimi işgal altındaki topraklarda umutsuzluğu derinleştirdi."
 waddle_modifier_small_arms_seizure: "El Konulan Hafif Silahlar"
 waddle_modifier_small_arms_seizure_desc: "Özel ve ticari silah stokları askeri kullanım için alındı."
 waddle_modifier_small_arms_rationing: "Karneye Bağlı Tüfekler"
 waddle_modifier_small_arms_rationing_desc: "Tüfekler ve yedek parçalar ordu genelinde karneye bağlanıyor."
 waddle_modifier_artillery_priority: "Topçu Önceliği"
 waddle_modifier_artillery_priority_desc: "Sanayi ve ulaşım topçu ihtiyaçlarına göre yeniden yönlendiriliyor."
 waddle_modifier_artillery_conservation: "Mermi Tasarrufu"
 waddle_modifier_artillery_conservation_desc: "Topçu mühimmatı en gerekli eylemler için korunuyor."
 waddle_modifier_explosives_seizure: "El Konulan Kimya Tesisleri"
 waddle_modifier_explosives_seizure_desc: "Patlayıcı üretimi savaş zamanı denetimine alındı."
 waddle_modifier_powder_conservation: "Barut Tasarrufu"
 waddle_modifier_powder_conservation_desc: "Patlayıcılar belirleyici harekâtlar için ayrılıyor."
 waddle_modifier_pow_labor: "Esir İşgücü"
 waddle_modifier_pow_labor_desc: "Düşman esirler savaş ekonomisini desteklemek için kullanılıyor."
