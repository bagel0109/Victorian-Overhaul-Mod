l_turkish:
  # ============================================================================ #
  # 1. KISIM: ARAYÜZ OVERRIDES (LARP Interfaces & GDP)
  # ============================================================================ #
  RADICALS_TOOLTIP:1 "#tooltip_header $RADICALS$#!\n[Country.GetName] ülkesinde, toplam #v [Country.GetTotalPopulation|D]#! nüfusun içinde #v [Country.GetNumRadicals|D]#! adet $RADICALS$ bulunmaktadır ([Country.MakeScope.ScriptValue('larp_radicals_percent')|%v1])\n$TOOLTIP_DELIMITER$\n$RADICALS$ sayısı [Country.GetRadicalsLoyalistsChangeStartDate|v] tarihinden bu yana #v #tooltippable #tooltip:[Country.GetTooltipTag],RADICALS_CHANGE_TOOLTIP [Country.GetTotalNumRadicalsChange|D=-]#!#!#! değişti.\nEn etkili faktörler: [Country.GetRadicalsChangeSummary]\n\n[Country.GetRadicalsSummaryDesc][ConcatIfNeitherEmpty('\n\n',SelectLocalization( GreaterThan_int32(Country.CalcNumStatesInTurmoil, '(int32)0'), 'STATES_IN_TURMOIL', '' ))][ConcatIfNeitherEmpty('\n\n',SelectLocalization( Country.HasIGApprovalFromRadicals, 'RADICALS_IG_APPROVAL', '' ))]"
  LOYALISTS_TOOLTIP:1 "#tooltip_header $LOYALISTS$#!\n[Country.GetName] ülkesinde, toplam #v [Country.GetTotalPopulation|D]#! nüfusun içinde #v [Country.GetNumLoyalists|D]#! adet $LOYALISTS$ bulunmaktadır ([Country.MakeScope.ScriptValue('larp_loyalists_percent')|%v1])\n$TOOLTIP_DELIMITER$\n$LOYALISTS$ sayısı [Country.GetRadicalsLoyalistsChangeStartDate|v] tarihinden bu yana #v #tooltippable #tooltip:[Country.GetTooltipTag],LOYALISTS_CHANGE_TOOLTIP [Country.GetTotalNumLoyalistsChange|D=+]#!#!#! değişti\nEn etkili faktörler: [Country.GetLoyalistsChangeSummary]\n\n[Country.GetLoyalistsSummaryDesc][ConcatIfNeitherEmpty('\n\n',SelectLocalization( Country.HasIGApprovalFromLoyalists, 'LOYALISTS_IG_APPROVAL', '' ))]"
  NEUTRALS_TOOLTIP:1 "#tooltip_header $NEUTRALS$#!\n[Country.GetName] ülkesinde, toplam #v [Country.GetTotalPopulation|*2]#! nüfusun içinde #v [Country.GetNumNeutrals|*2]#! adet $NEUTRALS$ bulunmaktadır ([Country.MakeScope.ScriptValue('larp_neutrals_percent')|%v1])"
  POP_TOOLTIP:2 "#tooltip_header [Concept('concept_pop','$concept_population$')]#!\nMevcut: [Country.GetTotalPopulation|*2v] ([Country.GetPopulationRanking])\n[Country.GetPopGrowthDesc]$POP_TOOLTIP_DELAYED$\n$TOOLTIP_DELIMITER$\n[Country.GetAdjective] nüfusu, dünya nüfusunun [Country.MakeScope.ScriptValue('larp_global_pop_percent')|%v1] kadarını oluşturur\nDünya Nüfusu: [Country.MakeScope.ScriptValue('larp_global_pop')|*2v]"
  GDP_TOOLTIP:1 "#header [Country.GetAdjective] [concept_gdp]#! \n@money![Country.GetGDP|Dv] (#u #tooltippable #tooltip:[Country.GetTooltipTag],COUNTRY_GDP_OWNERSHIP_TOOLTIP [Country.GetDomesticallyOwnedGDPFraction|%1b]#!#!#!) ülke içi sahip olunan $concept_gdp_short$ ([Country.GetGDPRanking])\n@money![Country.GetGDPPerCapita|2*v] [Concept('concept_gdp_per_capita', '$concept_gdp_per_capita_short$')] ([Country.GetGDPPerCapitaRanking])\n$GDPGR_growth_text$\n$TOOLTIP_DELIMITER$\n[Country.GetAdjective] $concept_gdp_short$'sı küresel GSYİH'nın [Country.MakeScope.ScriptValue('larp_global_gdp_percent')|%v2]'idir.\nKüresel GSYİH: @money![Country.MakeScope.ScriptValue('larp_global_gdp')|Dv]"
  
  # ============================================================================ #
  # 2. KISIM: EYALET EKRANI GSYİH (StatePer Interfaces)
  # ============================================================================ #
  CURRENT_GDP_STATE:2 "#header [State.GetName] kaynaklı [State.GetOwner.GetAdjectiveNoFormatting] [concept_gdp]#!\n$TOOLTIP_DELIMITER$\nMevcut yıllık GSYİH katkısı: #variable @money![State.GetGDPContribution|K]#!\n[State.GetName] eyaletinin kişi başına GSYİH'si: #variable @money![State.MakeScope.ScriptValue('get_state_gdp_per')|Dv]#!\n[State.GetName] ile [State.GetOwner.GetAdjectiveNoFormatting] arasındaki kişi başına GSYİH farkı: #variable @money![State.MakeScope.ScriptValue('get_country_state_relative_value')|D2+=]#!\n[State.GetName] ile küresel ortalama arasındaki kişi başına GSYİH farkı: #variable @money![State.MakeScope.ScriptValue('get_global_state_relative_value')|D2+=]#!\n[State.GetName], [State.GetOwner.GetAdjectiveNoFormatting] $GDP_SHORT$ değerinin #variable [State.GetGDPContributionPercentage|%1]#! kadarını sağlar\n\n[State.GetGDPGoodsContributionBreakdown]"