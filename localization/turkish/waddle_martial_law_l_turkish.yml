 WADDLE_MARTIAL_LAW_EXTRA: "Diğer etkenler"
 WADDLE_MARTIAL_LAW_OCCUPATION: "[concept_occupation]"

 # Journal Entry
 je_waddle_martial_law: "#Bold Sıkıyönetim#!"
 je_waddle_martial_law_reason: "Ulus çetin bir düşmanla karşı karşıyayken hükümet olağan sivil idareyi askıya alıp doğrudan askeri otoriteye başvurdu. $je_waddle_martial_law$ uygulaması sürekli dikkat gerektirir. Denetimsiz bırakılırsa bu düzenek çatlar, bastırdığı halkı radikalleştirir ve korumak için kurulduğu savaş çabasını zayıflatır."

 # Button
 waddle_end_martial_law_button: "$je_waddle_martial_law$ Kaldır"
 waddle_end_martial_law_button_desc: "Sivil idareyi geri getirir ve $je_waddle_martial_law$ aygıtını dağıtır. Düzenin nasıl korunduğu, halkın bu dönemi nasıl hatırlayacağını şekillendirecektir."
 waddle_martial_law_cooldown: "$je_waddle_martial_law$ ilanından bu yana #Bold Bir Aydan#! fazla zaman geçti"

 # Tooltips
 waddle_martial_law_end_tt_desc: "$je_waddle_martial_law$ kaldırılacak. Süresi boyunca korunmuş Kontrol düzeyine bağlı olarak sivil yönetime dönüş sorunsuz olabilir veya halk arasında kalıcı kırgınlık bırakabilir."
 waddle_martial_law_ended_tt: "$je_waddle_martial_law$ kaldırıldı."

 # Actual modifiers
 base_martial_law_modifier: "$je_waddle_martial_law$ Etkileri"
 base_martial_law_modifier_scaled_half: "Muhalefet Baskısının Etkileri"
 base_martial_law_modifier_scaled_full: "$je_martial_law_progress_bar$ Etkileri"
 base_martial_law_modifier_scaled_time: "Zamanın Etkileri"
