 # Martial Law Control - Modifiers
 WADDLE_MARTIAL_LAW_BASE: "#Bold Sıkıyönetim#! İlan Edildi"
 WADDLE_MARTIAL_LAW_MILITARY_PRESENCE: "Askeri [concept_military_formation] Varlığı"
 WADDLE_MARTIAL_LAW_BUREAUCRACY: "[Concept('concept_institution', '$concept_institutions$')]"
 WADDLE_MARTIAL_LAW_LOYALISTS: "[concept_loyalist] Nüfus"
 WADDLE_MARTIAL_LAW_GOVERNMENT_CLOUT: "[concept_government] [concept_clout]"
 WADDLE_MARTIAL_LAW_REPRESSIVE_LAWS: "Baskıcı [Concept('concept_law','$concept_laws$')]"
 WADDLE_MARTIAL_LAW_TURMOIL: "Sivil [concept_turmoil]"
 WADDLE_MARTIAL_LAW_RADICALS: "[concept_radical] [Concept('concept_pop', '$concept_population$')]"
