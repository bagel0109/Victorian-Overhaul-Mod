l_spanish:
  RADICALS_TOOLTIP:1 "#tooltip_header $RADICALS$#!\nHay #v [Country.GetNumRadicals|D]#! $RADICALS$ en la poblacion total de #v [Country.GetTotalPopulation|D]#! ([Country.MakeScope.ScriptValue('larp_radicals_percent')|%v1]) en [Country.GetName]\n$TOOLTIP_DELIMITER$\nLa cantidad de $RADICALS$ cambio en #v #tooltippable #tooltip:[Country.GetTooltipTag],RADICALS_CHANGE_TOOLTIP [Country.GetTotalNumRadicalsChange|D=-]#!#!#! desde [Country.GetRadicalsLoyalistsChangeStartDate|v].\nLos factores mas influyentes son [Country.GetRadicalsChangeSummary]\n\n[Country.GetRadicalsSummaryDesc][ConcatIfNeitherEmpty('\n\n',SelectLocalization( GreaterThan_int32(Country.CalcNumStatesInTurmoil, '(int32)0'), 'STATES_IN_TURMOIL', '' ))][ConcatIfNeitherEmpty('\n\n',SelectLocalization( Country.HasIGApprovalFromRadicals, 'RADICALS_IG_APPROVAL', '' ))]"
  LOYALISTS_TOOLTIP:1 "#tooltip_header $LOYALISTS$#!\nHay #v [Country.GetNumLoyalists|D]#! $LOYALISTS$ en la poblacion total de #v [Country.GetTotalPopulation|D]#! ([Country.MakeScope.ScriptValue('larp_loyalists_percent')|%v1]) en [Country.GetName]\n$TOOLTIP_DELIMITER$\nLa cantidad de $LOYALISTS$ cambio en #v #tooltippable #tooltip:[Country.GetTooltipTag],LOYALISTS_CHANGE_TOOLTIP [Country.GetTotalNumLoyalistsChange|D=+]#!#!#! desde [Country.GetRadicalsLoyalistsChangeStartDate|v]\nLos factores mas influyentes son [Country.GetLoyalistsChangeSummary]\n\n[Country.GetLoyalistsSummaryDesc][ConcatIfNeitherEmpty('\n\n',SelectLocalization( Country.HasIGApprovalFromLoyalists, 'LOYALISTS_IG_APPROVAL', '' ))]"
  NEUTRALS_TOOLTIP:1 "#tooltip_header $NEUTRALS$#!\nHay #v [Country.GetNumNeutrals|*2]#! $NEUTRALS$ en la poblacion total de #v [Country.GetTotalPopulation|*2]#! ([Country.MakeScope.ScriptValue('larp_neutrals_percent')|%v1]) en [Country.GetName]"
  POP_TOOLTIP:2 "#tooltip_header [Concept('concept_pop','$concept_population$')]#!\nActual: [Country.GetTotalPopulation|*2v] ([Country.GetPopulationRanking])\n[Country.GetPopGrowthDesc]$POP_TOOLTIP_DELAYED$\n$TOOLTIP_DELIMITER$\nLa poblacion [Country.GetAdjective] representa [Country.MakeScope.ScriptValue('larp_global_pop_percent')|%v1] de la poblacion mundial\nPoblacion mundial: [Country.MakeScope.ScriptValue('larp_global_pop')|*2v]"
  GDP_TOOLTIP:1 "#header [concept_gdp] [Country.GetAdjective]#! \n@money![Country.GetGDP|Dv] (#u #tooltippable #tooltip:[Country.GetTooltipTag],COUNTRY_GDP_OWNERSHIP_TOOLTIP [Country.GetDomesticallyOwnedGDPFraction|%1b]#!#!#!) $concept_gdp_short$ de propiedad nacional ([Country.GetGDPRanking])\n@money![Country.GetGDPPerCapita|2*v] [Concept('concept_gdp_per_capita', '$concept_gdp_per_capita_short$')] ([Country.GetGDPPerCapitaRanking])\n$GDPGR_growth_text$\n$TOOLTIP_DELIMITER$\nEl $concept_gdp_short$ [Country.GetAdjective] representa el [Country.MakeScope.ScriptValue('larp_global_gdp_percent')|%v2] del PIB mundial\nPIB mundial: @money![Country.MakeScope.ScriptValue('larp_global_gdp')|Dv]"
  CURRENT_GDP_STATE:2 "#header [State.GetOwner.GetAdjectiveNoFormatting] [concept_gdp] de [State.GetName]#!\n$TOOLTIP_DELIMITER$\nContribucion anual actual al PIB: #variable @money![State.GetGDPContribution|K]#!\nEl PIB per capita de [State.GetName] es: #variable @money![State.MakeScope.ScriptValue('get_state_gdp_per')|Dv]#!\nBrecha del PIB per capita de [State.GetName] respecto a [State.GetOwner.GetAdjectiveNoFormatting]: #variable @money![State.MakeScope.ScriptValue('get_country_state_relative_value')|D2+=]#!\nBrecha del PIB per capita de [State.GetName] respecto al promedio mundial: #variable @money![State.MakeScope.ScriptValue('get_global_state_relative_value')|D2+=]#!\n[State.GetName] aporta #variable [State.GetGDPContributionPercentage|%1]#! del $GDP_SHORT$ de [State.GetOwner.GetAdjectiveNoFormatting]\n\n[State.GetGDPGoodsContributionBreakdown]"
