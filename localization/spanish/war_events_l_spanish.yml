l_spanish:
 war_stuff.1.t:0 "Ocupación de [SCOPE.sCountry('war_stuff_enemy').GetCapital.GetCityHubName]"
 war_stuff.1.d:1 "Nuestros ejércitos victoriosos ocupan ahora el corazón mismo de [SCOPE.sCountry('war_stuff_enemy').GetName]. El trato que demos a la capital conquistada resonará en la historia y pesará sobre nuestra legitimidad y sobre la voluntad del enemigo de resistir."
 war_stuff.1.f:1 "\"Estas personas saben que su destino descansa en nuestra misericordia.\""
 war_stuff.1.a:0 "Mantener el orden y respetar las instituciones."
 war_stuff.1.b:0 "Dejar que las tropas tomen lo que les corresponde."

 war_stuff.2.t:0 "Ocupación de [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]"
 war_stuff.2.d:1 "Para nuestro asombro, las fuerzas ocupantes [SCOPE.sCountry('war_stuff_enemy').GetAdjective] han mantenido el orden y respetado nuestras instituciones pese a su victoria."
 war_stuff.2.f:1 "\"Los invasores patrullaban los mercados sin saquear; ¡incluso vi a uno devolver un monedero caído! ¿Quién conquista con tanta... civilidad?\""
 war_stuff.2.a:0 "Tomamos nota de su contención."
 war_stuff.3.t:0 "Saqueo de [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]"
 war_stuff.3.d:1 "Las tropas [SCOPE.sCountry('war_stuff_enemy').GetAdjective] han reducido [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] a ruinas humeantes, saqueando nuestros tesoros nacionales y profanando nuestro patrimonio."
 war_stuff.3.f:1 "\"Siglos de conocimiento convertidos en ceniza. ¡Hasta fundieron las estatuas para sacar metal!\""
 war_stuff.3.a:0 "¡Pagarán por esta barbarie!"

 war_stuff.4.t:0 "Disturbios en [SCOPE.sState('war_stuff_state').GetName]"
 war_stuff.4.d:1 "Han estallado brotes violentos por toda [SCOPE.sState('war_stuff_state').GetName] mientras las poblaciones ocupadas resisten nuestra autoridad. Las calles se tiñen de desafío; debemos escoger nuestra respuesta de inmediato."
 war_stuff.4.f:1 "\"¡Están lanzando adoquines arrancados de las mismas calles que pavimentamos! Mi teniente preguntó si debíamos devolver el fuego. ¿Qué quiere que le diga?\""
 war_stuff.4.a:0 "Aplastar esta rebelión con la máxima fuerza."
 war_stuff.4.b:0 "Retirar las patrullas y dejar que se enfríen las tensiones."

 war_stuff.5.t:0 "Los tambores de guerra"
 war_stuff.5.d:1 "Una campaña propagandística coordinada se ha extendido por [SCOPE.sCountry('war_stuff_home').GetName], avivando el fervor patriótico y afirmando la decisión pública de continuar la lucha."
 war_stuff.5.f:1 "\"¡Cada pared luce ahora carteles de reclutamiento! Hasta los niños cantan marchas mientras saltan a la comba. El corazón de la nación late solo por la victoria.\""
 war_stuff.5.a:0 "¡Nuestro pueblo está unido tras la causa!"

 war_stuff.6.t:0 "Racismo en [SCOPE.sState('war_stuff_state').GetName]"
 war_stuff.6.d:1 "Ciudadanos de [SCOPE.sCountry('war_stuff_home').GetName] en [SCOPE.sState('war_stuff_state').GetName] atacan violentamente a vecinos de herencia [SCOPE.sCulture('war_stuff_culture').GetName], culpándolos de la guerra en curso."
 war_stuff.6.f:1 "\"'¡Volved a casa!', gritaban...\""
 war_stuff.6.a:0 "Dejar que el pueblo desahogue su justa ira."
 war_stuff.6.b:0 "Proteger a todos los ciudadanos sin importar su origen."

 war_stuff.7.t:0 "La llamada de la unidad"
 war_stuff.7.d:1 "Delegaciones de [SCOPE.sCountry('war_stuff_enemy').GetName] han llegado proponiendo la anexión voluntaria a [SCOPE.sCountry('war_stuff_home').GetName], citando cultura compartida y lazos históricos."
 war_stuff.7.f:1 "\"Mi abuelo luchó para dividirnos, pero mis alumnos ahora marchan cantando vuestros himnos. La rueda de la historia gira...\""
 war_stuff.7.a:0 "¡Demos la bienvenida a nuestros hermanos a [SCOPE.sCountry('war_stuff_home').GetNameNoFlag]!"
 war_stuff.7.b:0 "Respetamos la independencia [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]."

 war_stuff.8.t:0 "Ecos de la anexión"
 war_stuff.8.d:1 "Llegan noticias a [SCOPE.GetRootScope.GetCountry.GetName] de que [SCOPE.sCountry('war_stuff_home').GetName] ha absorbido a [SCOPE.sCountry('war_stuff_enemy').GetName] mediante anexión diplomática, trastocando el equilibrio de poder europeo."
 war_stuff.8.f:1 "\"Primero fueron a por los austríacos...\""
 war_stuff.8.a:0 "Un hecho consumado que debemos reconocer."

 war_stuff.9.t:0 "Proponer paz blanca con [SCOPE.sCountry('war_stuff_enemy').GetName]"
 war_stuff.9.d:1 "Sin frentes terrestres activos en la [SCOPE.sWar('war_stuff_war').GetName], nuestros asesores militares recomiendan buscar una paz blanca con [SCOPE.sCountry('war_stuff_enemy').GetName]. Esto terminaría el conflicto sin cambios territoriales, preservando nuestras fuerzas y nuestra hacienda de un mayor agotamiento en una guerra estancada."
 war_stuff.9.f:1 ""
 war_stuff.9.a:0 "Enviar emisarios con términos de paz."
 war_stuff.9.b:0 "Continuar la guerra pese al impasse."

 war_stuff.10.t:0 "Oferta de paz de [SCOPE.sCountry('war_stuff_home').GetName]"
 war_stuff.10.d:1 "Correos diplomáticos llegan del cuartel general [SCOPE.sCountry('war_stuff_home').GetAdjective] con una propuesta formal para poner fin a la [SCOPE.sWar('war_stuff_war').GetName] y volver a las fronteras anteriores a la guerra. Su mensaje reconoce el bloqueo estratégico y ofrece el cese de todas las hostilidades."
 war_stuff.10.f:1 ""
 war_stuff.10.a:0 "Aceptar su propuesta."
 war_stuff.10.b:0 "Rechazar su oferta."

 war_stuff.11.t:0 "El motín de los exhaustos"
 war_stuff.11.d:1 "Las trincheras se han convertido en un cementerio, y los hombres han llegado al límite. Informes de la [SCOPE.sFront('war_stuff_front').GetName] describen regimientos enteros negándose a calar bayonetas. Afirman que mantendrán la línea ante un avance enemigo, pero ya no participarán en ofensivas 'suicidas' por un gobierno que parece haber olvidado el valor de sus vidas."
 war_stuff.11.f:1 "\"No golpearemos contra la patria, pero no moriremos por una mentira. Si los generales quieren esa colina, que la tomen ellos mismos.\""
 war_stuff.11.a:0 "Restaurar el orden con el pelotón de fusilamiento."
 war_stuff.11.b:0 "Atender sus quejas y mejorar las raciones."

 war_stuff.12.t:0 "El escándalo de las municiones"
 war_stuff.12.d:1 "Ha salido a la luz una vergüenza nacional: a nuestros soldados en el frente se les entregan proyectiles defectuosos; o peor, ninguno. Mientras nuestros valientes hombres se enfrentan al fuego enemigo, las fábricas en casa se hunden en la ineficiencia y los costes crecientes. La prensa exige saber por qué el 'Arsenal de [SCOPE.GetRootScope.GetCountry.GetName]' enmudece en nuestra hora de necesidad."
 war_stuff.12.f:1 "\"Un soldado sin bala no es más que un blanco. Es delito mayor que nuestra industria se lucre mientras nuestros fusiles suenan en vacío.\""
 war_stuff.12.a:0 "Forzar la producción de todos modos."
 war_stuff.12.b:0 "Priorizar la calidad y la integridad de las líneas de suministro."

 war_stuff.13.t:0 "El plan [SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]"
 war_stuff.13.d:1 "Los mapas del Gran Cuartel General no han cambiado en meses. En la [SCOPE.sFront('war_stuff_front').GetName], cada palmo de tierra ganada por la mañana se pierde al anochecer. [SCOPE.sCharacter('war_stuff_general_offensive').GetFullName] ha llegado del frente con un fajo de mapas de operaciones y una determinación sombría. Insiste en que, con suficiente temple y 'una última gran ofensiva', puede destrozar las líneas [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] y devolver el movimiento a la guerra."
 war_stuff.13.f:1 "\"Los hombres están cansados, sí, pero están más cansados de esperar a morir en el barro. Dadme los proyectiles, y quebraré a [SCOPE.sCountry('war_stuff_enemy').GetNameNoFormatting] de una vez por todas.\""
 war_stuff.13.a:0 "Comenzar la ofensiva [SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]."
 war_stuff.13.b:0 "Rechazar el plan y mantener nuestras defensas."

 war_stuff.14.t:0 "La iniciativa de liberación"
 war_stuff.14.d:1 "Las líneas en la [SCOPE.sFront('war_stuff_front').GetName] se han estancado, dejando a nuestros compatriotas languidecer bajo ocupación [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]. [SCOPE.sCharacter('war_stuff_general_liberation').GetFullName] ha presentado al Ministerio de Guerra un audaz plan operativo. Sostiene que, concentrando nuestras tropas y apelando al deseo de los hombres de recuperar sus hogares, podemos quebrar las líneas [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]."
 war_stuff.14.f:1 "\"Cada día que tardamos es otro día de sufrimiento para nuestros hermanos en [SCOPE.sState('war_stuff_liberation_state').GetNameNoFormatting]. Dad la orden, y empujaremos la amenaza [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFormatting] de vuelta al otro lado de la frontera.\""
 war_stuff.14.a:0 "Autorizar la ofensiva [SCOPE.sCharacter('war_stuff_general_liberation').GetLastName]."
 war_stuff.14.b:0 "Mantener una postura defensiva."

 waddle_modifier_brutal_discipline:0 "Disciplina brutal"
 
 waddle_modifier_war_concessions:0 "Concesiones en el frente"
 
 waddle_modifier_industrial_seizure:0 "Producción defectuosa de municiones"
 
 waddle_modifier_careful_supply:0 "Supervisión de suministros de calidad"

 waddle_modifier_desperate_offensive:0 "La gran ofensiva"
 
 waddle_modifier_trench_attrition:0 "Bloqueo de trincheras"

 waddle_modifier_liberation_drive:0 "Impulso de liberación"

 war_stuff.15.t: "Crisis de conscripción"
 war_stuff.15.d: "A medida que la guerra se prolonga, las nuevas levas encuentran resistencia abierta. Las autoridades locales informan de deserciones, hijos escondidos y aldeas que se niegan a entregar otra remesa de hombres."
 war_stuff.15.f: "\"Si el Estado todavía tiene hambre, que coma en otra mesa.\""
 war_stuff.15.a: "Las cuotas deben cumplirse."
 war_stuff.15.b: "Conceder exenciones limitadas."
 war_stuff.16.t: "Refugiados de [SCOPE.sState('war_stuff_refugee_state').GetName]"
 war_stuff.16.d: "Los combates en [SCOPE.sState('war_stuff_refugee_state').GetName] han expulsado a civiles de sus hogares. Carreteras, estaciones e iglesias tras la [SCOPE.sFront('war_stuff_front').GetName] están llenas de quienes huyen de los cañones."
 war_stuff.16.f: "Trajeron lo que podían cargar. El resto quedó para el humo."
 war_stuff.16.a: "Que se les dé refugio."
 war_stuff.16.b: "El ejército tiene prioridad."
 war_stuff.17.t: "Informes de atrocidades"
 war_stuff.17.d: "Han empezado a circular en el extranjero informes de saqueos, represalias y asesinatos cometidos por nuestras tropas. Los funcionarios insisten en que los relatos son exagerados, pero los periódicos hostiles de [SCOPE.sCountry('war_stuff_enemy').GetName] ya tienen su titular."
 war_stuff.17.f: "En la guerra, la verdad llega tarde, mal vestida y acompañada de enemigos."
 war_stuff.17.a: "Negar estas calumnias."
 war_stuff.17.b: "Hacer un ejemplo de los culpables."
 war_stuff.18.t: "Fraternización en la [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.18.d: "Meses de estancamiento en la [SCOPE.sFront('war_stuff_front').GetName] han creado una extraña familiaridad entre trincheras opuestas. Los oficiales informan de cigarrillos intercambiados, bromas a gritos y una inquietante reticencia a disparar sin órdenes."
 war_stuff.18.f: "\"No son demonios ahí enfrente\", escribió un soldado, \"solo pobres diablos como nosotros.\""
 war_stuff.18.a: "Conceded a los hombres esa tregua."
 war_stuff.18.b: "Debe restaurarse la disciplina."
 war_stuff.19.t: "Ruptura en la [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.19.d: "La ofensiva en la [SCOPE.sFront('war_stuff_front').GetName] ha roto las líneas. Los despachos de [SCOPE.sCharacter('war_stuff_general').GetFullName] hablan de posiciones enemigas abandonadas, reservas en movimiento y caminos que se abren más allá de los cañones."
 war_stuff.19.f: "Por una vez, el mapa se movió más deprisa que las listas de bajas."
 war_stuff.19.a: "Aprovechar la ventaja."
 war_stuff.20.t: "La ofensiva fracasa en la [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.20.d: "La ruptura prometida en la [SCOPE.sFront('war_stuff_front').GetName] no ha llegado. El ejército ha pagado caro por unos cuantos campos arruinados, y el público pregunta ahora quién ordenó tal sacrificio."
 war_stuff.20.f: "El estado mayor hablaba de presión, impulso y resolución. Los soldados hablaban de barro."
 war_stuff.20.a: "Los generales deben responder por esto."
 war_stuff.20.b: "Un empuje más."
 war_stuff.21.t: "Liberación en la [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.21.d: "Nuestras fuerzas han liberado territorio ocupado en la [SCOPE.sFront('war_stuff_front').GetName], empujando al enemigo fuera de tierras que había reclamado como premio. Las multitudes vitorean a los soldados que regresan como prueba de que la guerra aún puede ganarse."
 war_stuff.21.f: "La primera bandera izada era pequeña y estaba rasgada. Bastó."
 war_stuff.21.a: "Que repiquen las campanas."
 war_stuff.22.t: "La liberación flaquea en la [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.22.d: "El intento de liberar territorio ocupado en la [SCOPE.sFront('war_stuff_front').GetName] ha fracasado. Quienes siguen bajo control enemigo esperan en vano, mientras el resto del país cuenta el coste de otro esfuerzo fallido."
 war_stuff.22.f: "Les habían dicho que escucharan nuestros cañones. Para el invierno, solo escuchaban botas en la puerta."
 war_stuff.22.a: "Debemos resistir."
 war_stuff.23.t: "Fusiles para la [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.23.d: "La demanda de fusiles y piezas de repuesto del ejército ha tensado el mercado. [SCOPE.sCharacter('war_stuff_general').GetFullName] advierte que las formaciones en la [SCOPE.sFront('war_stuff_front').GetName] podrían llegar a la línea con armas viejas, piezas faltantes o sin nada."
 war_stuff.23.f: "Un soldado puede marchar hambriento. No puede sostener una línea con las manos vacías."
 war_stuff.23.a: "Incautar los arsenales."
 war_stuff.23.b: "Racionar lo que queda."
 war_stuff.24.t: "Artillería para la [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.24.d: "La escasez de artillería ha obligado al ejército a escoger cuidadosamente sus bombardeos. Los mandos en la [SCOPE.sFront('war_stuff_front').GetName] piden más proyectiles de los que fábricas y depósitos pueden proporcionar."
 war_stuff.24.f: "Los hombres no pidieron discursos. Preguntaron cuándo responderían nuestros cañones."
 war_stuff.24.a: "Alimentar los cañones."
 war_stuff.24.b: "Conservar los proyectiles."
 war_stuff.25.t: "Escasez de explosivos"
 war_stuff.25.d: "Una escasez de explosivos amenaza ahora proyectiles, minas y producción militar. El ejército exige poderes de emergencia sobre las fábricas químicas, mientras los industriales advierten de una interrupción ruinosa."
 war_stuff.25.f: "Cada factura pesaba ya como un asunto de vida o muerte."
 war_stuff.25.a: "Requisar las fábricas."
 war_stuff.25.b: "Guardar la pólvora para la hora decisiva."
 war_stuff.26.t: "Prisioneros de [SCOPE.sCountry('war_stuff_enemy').GetName]"
 war_stuff.26.d: "El reciente éxito en la [SCOPE.sFront('war_stuff_front').GetName] contra [SCOPE.sCountry('war_stuff_enemy').GetName] nos ha dejado columnas de prisioneros enemigos. Su trato será observado por nuestros soldados, nuestros enemigos y los gobiernos que aún sopesan el carácter de esta guerra."
 war_stuff.26.f: "La victoria no terminó en el campo. Siguió marchando bajo guardia."
 war_stuff.26.a: "Darles un trato honorable."
 war_stuff.26.b: "Ponerlos a trabajar."
 war_stuff.26.c: "Organizar un intercambio."
 waddle_modifier_forced_conscription: "Conscripción forzosa"
 waddle_modifier_forced_conscription_desc: "Las cuotas de reclutamiento se imponen pese a la creciente resistencia local."
 waddle_modifier_conscription_exemptions: "Exenciones de conscripción"
 waddle_modifier_conscription_exemptions_desc: "Exenciones limitadas han aliviado los disturbios, a costa de la preparación militar."
 waddle_modifier_refugee_relief: "Auxilio a refugiados"
 waddle_modifier_refugee_relief_desc: "El Estado organiza ayuda para civiles desplazados por el frente."
 waddle_modifier_wartime_censorship: "Censura de guerra"
 waddle_modifier_wartime_censorship_desc: "Los informes de la guerra se suprimen en nombre del orden."
 waddle_modifier_frontline_fraternization: "Fraternización en el frente"
 waddle_modifier_frontline_fraternization_desc: "El contacto informal con el enemigo ha suavizado la disciplina en el frente."
 waddle_modifier_breakthrough_momentum: "Impulso de ruptura"
 waddle_modifier_breakthrough_momentum_desc: "Una ofensiva exitosa ha restaurado la confianza en el ejército."
 waddle_modifier_offensive_exhaustion: "Agotamiento ofensivo"
 waddle_modifier_offensive_exhaustion_desc: "Un ataque fallido ha dejado al ejército conmocionado y al público inquieto."
 waddle_modifier_victorious_liberation: "Liberación victoriosa"
 waddle_modifier_victorious_liberation_desc: "Se ha liberado territorio ocupado, elevando la moral en todo el país."
 waddle_modifier_shattered_liberation_drive: "Impulso de liberación quebrado"
 waddle_modifier_shattered_liberation_drive_desc: "Un intento fallido de liberación ha profundizado la desesperación en el territorio ocupado."
 waddle_modifier_small_arms_seizure: "Armas ligeras incautadas"
 waddle_modifier_small_arms_seizure_desc: "Existencias privadas y comerciales de armas se han tomado para uso militar."
 waddle_modifier_small_arms_rationing: "Fusiles racionados"
 waddle_modifier_small_arms_rationing_desc: "Los fusiles y las piezas de repuesto se racionan en todo el ejército."
 waddle_modifier_artillery_priority: "Prioridad de artillería"
 waddle_modifier_artillery_priority_desc: "La industria y el transporte se orientan a las necesidades de los cañones."
 waddle_modifier_artillery_conservation: "Conservación de proyectiles"
 waddle_modifier_artillery_conservation_desc: "La munición de artillería se conserva para las acciones más necesarias."
 waddle_modifier_explosives_seizure: "Fábricas químicas incautadas"
 waddle_modifier_explosives_seizure_desc: "La producción de explosivos ha quedado bajo control de guerra."
 waddle_modifier_powder_conservation: "Conservación de pólvora"
 waddle_modifier_powder_conservation_desc: "Los explosivos se reservan para operaciones decisivas."
 waddle_modifier_pow_labor: "Trabajo de prisioneros"
 waddle_modifier_pow_labor_desc: "Se está usando a prisioneros enemigos para apoyar la economía de guerra."
