l_simp_chinese:
  RADICALS_TOOLTIP:1 "#tooltip_header $RADICALS$#!\n[Country.GetName]总人口为#v [Country.GetTotalPopulation|D]#!，其中有#v [Country.GetNumRadicals|D]#!名$RADICALS$（[Country.MakeScope.ScriptValue('larp_radicals_percent')|%v1]）\n$TOOLTIP_DELIMITER$\n自[Country.GetRadicalsLoyalistsChangeStartDate|v]以来，$RADICALS$数量变化了#v #tooltippable #tooltip:[Country.GetTooltipTag],RADICALS_CHANGE_TOOLTIP [Country.GetTotalNumRadicalsChange|D=-]#!#!#!。\n影响最大的因素是[Country.GetRadicalsChangeSummary]\n\n[Country.GetRadicalsSummaryDesc][ConcatIfNeitherEmpty('\n\n',SelectLocalization( GreaterThan_int32(Country.CalcNumStatesInTurmoil, '(int32)0'), 'STATES_IN_TURMOIL', '' ))][ConcatIfNeitherEmpty('\n\n',SelectLocalization( Country.HasIGApprovalFromRadicals, 'RADICALS_IG_APPROVAL', '' ))]"
  LOYALISTS_TOOLTIP:1 "#tooltip_header $LOYALISTS$#!\n[Country.GetName]总人口为#v [Country.GetTotalPopulation|D]#!，其中有#v [Country.GetNumLoyalists|D]#!名$LOYALISTS$（[Country.MakeScope.ScriptValue('larp_loyalists_percent')|%v1]）\n$TOOLTIP_DELIMITER$\n自[Country.GetRadicalsLoyalistsChangeStartDate|v]以来，$LOYALISTS$数量变化了#v #tooltippable #tooltip:[Country.GetTooltipTag],LOYALISTS_CHANGE_TOOLTIP [Country.GetTotalNumLoyalistsChange|D=+]#!#!#!\n影响最大的因素是[Country.GetLoyalistsChangeSummary]\n\n[Country.GetLoyalistsSummaryDesc][ConcatIfNeitherEmpty('\n\n',SelectLocalization( Country.HasIGApprovalFromLoyalists, 'LOYALISTS_IG_APPROVAL', '' ))]"
  NEUTRALS_TOOLTIP:1 "#tooltip_header $NEUTRALS$#!\n[Country.GetName]总人口为#v [Country.GetTotalPopulation|*2]#!，其中有#v [Country.GetNumNeutrals|*2]#!名$NEUTRALS$（[Country.MakeScope.ScriptValue('larp_neutrals_percent')|%v1]）"
  POP_TOOLTIP:2 "#tooltip_header [Concept('concept_pop','$concept_population$')]#!\n当前: [Country.GetTotalPopulation|*2v] ([Country.GetPopulationRanking])\n[Country.GetPopGrowthDesc]$POP_TOOLTIP_DELAYED$\n$TOOLTIP_DELIMITER$\n[Country.GetAdjective]人口占全球人口的[Country.MakeScope.ScriptValue('larp_global_pop_percent')|%v1]\n全球人口: [Country.MakeScope.ScriptValue('larp_global_pop')|*2v]"
  GDP_TOOLTIP:1 "#header [Country.GetAdjective][concept_gdp]#! \n@money![Country.GetGDP|Dv] (#u #tooltippable #tooltip:[Country.GetTooltipTag],COUNTRY_GDP_OWNERSHIP_TOOLTIP [Country.GetDomesticallyOwnedGDPFraction|%1b]#!#!#!) 国内所有的$concept_gdp_short$ ([Country.GetGDPRanking])\n@money![Country.GetGDPPerCapita|2*v] [Concept('concept_gdp_per_capita', '$concept_gdp_per_capita_short$')] ([Country.GetGDPPerCapitaRanking])\n$GDPGR_growth_text$\n$TOOLTIP_DELIMITER$\n[Country.GetAdjective]$concept_gdp_short$占全球GDP的[Country.MakeScope.ScriptValue('larp_global_gdp_percent')|%v2]\n全球GDP：@money![Country.MakeScope.ScriptValue('larp_global_gdp')|Dv]"
  CURRENT_GDP_STATE:2 "#header [State.GetOwner.GetAdjectiveNoFormatting]来自[State.GetName]的[concept_gdp]#!\n$TOOLTIP_DELIMITER$\n当前年度GDP贡献: #variable @money![State.GetGDPContribution|K]#!\n[State.GetName]的人均GDP为: #variable @money![State.MakeScope.ScriptValue('get_state_gdp_per')|Dv]#!\n[State.GetName]与[State.GetOwner.GetAdjectiveNoFormatting]的人均GDP差距: #variable @money![State.MakeScope.ScriptValue('get_country_state_relative_value')|D2+=]#!\n[State.GetName]与全球水平的人均GDP差距: #variable @money![State.MakeScope.ScriptValue('get_global_state_relative_value')|D2+=]#!\n[State.GetName]贡献了[State.GetOwner.GetAdjectiveNoFormatting]$GDP_SHORT$的#variable [State.GetGDPContributionPercentage|%1]#!\n\n[State.GetGDPGoodsContributionBreakdown]"
