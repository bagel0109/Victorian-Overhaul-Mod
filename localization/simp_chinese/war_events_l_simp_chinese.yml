l_simp_chinese:
 war_stuff.1.t:0 "[SCOPE.sCountry('war_stuff_enemy').GetCapital.GetCityHubName]被占领"
 war_stuff.1.d:1 "我军凯旋，如今占领了[SCOPE.sCountry('war_stuff_enemy').GetName]的心脏。如何处置这座被征服的首都，将留在史册之中，牵动我们的正统性，也牵动敌人的抵抗意志。"
 war_stuff.1.f:1 "“他们知道，自己的命运全系于我们的仁慈。”"
 war_stuff.1.a:0 "维持秩序并尊重制度。"
 war_stuff.1.b:0 "让士兵拿走他们应得的东西。"

 war_stuff.2.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]被占领"
 war_stuff.2.d:1 "令我们惊讶的是，占领的[SCOPE.sCountry('war_stuff_enemy').GetAdjective]军队虽已获胜，却仍维持秩序并尊重我们的制度。"
 war_stuff.2.f:1 "“入侵者巡逻市场却不抢掠，我甚至看到有人把掉在地上的钱包还了回去！哪有这样文明的征服者？”"
 war_stuff.2.a:0 "他们的克制值得记下。"
 war_stuff.3.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]遭洗劫"
 war_stuff.3.d:1 "[SCOPE.sCountry('war_stuff_enemy').GetAdjective]军队已将[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]化为冒烟废墟，劫掠我们的国宝，亵渎我们的遗产。"
 war_stuff.3.f:1 "“数百年的知识化为灰烬。他们甚至把雕像熔成废金属！”"
 war_stuff.3.a:0 "他们会为这种野蛮付出代价！"

 war_stuff.4.t:0 "[SCOPE.sState('war_stuff_state').GetName]的动乱"
 war_stuff.4.d:1 "被占领民众反抗我们的权威，[SCOPE.sState('war_stuff_state').GetName]各地爆发暴力事件。街巷已被抗争染红，我们必须立刻回应。"
 war_stuff.4.f:1 "“他们在扔从我们铺好的街上撬下来的鹅卵石！我的中尉问要不要还击。您要我怎么答复？”"
 war_stuff.4.a:0 "以最大武力粉碎这场叛乱。"
 war_stuff.4.b:0 "撤回巡逻队，让紧张冷却。"

 war_stuff.5.t:0 "战争鼓声"
 war_stuff.5.d:1 "一场协调的宣传攻势传遍[SCOPE.sCountry('war_stuff_home').GetName]，点燃爱国热情，也使民众继续作战的意志更加坚硬。"
 war_stuff.5.f:1 "“每面墙上都贴满了征兵海报！连孩子跳绳时都唱着进行曲。国家的心只为胜利跳动。”"
 war_stuff.5.a:0 "我们的人民为此团结如一！"

 war_stuff.6.t:0 "[SCOPE.sState('war_stuff_state').GetName]的种族主义"
 war_stuff.6.d:1 "[SCOPE.sState('war_stuff_state').GetName]的[SCOPE.sCountry('war_stuff_home').GetName]公民正暴力袭击[SCOPE.sCulture('war_stuff_culture').GetName]血统的邻人，将正在进行的战争归咎于他们。"
 war_stuff.6.f:1 "“‘滚回家去！’他们喊道……”"
 war_stuff.6.a:0 "让民众宣泄他们正义的怒火。"
 war_stuff.6.b:0 "保护所有公民，不论出身。"

 war_stuff.7.t:0 "统一的呼唤"
 war_stuff.7.d:1 "来自[SCOPE.sCountry('war_stuff_enemy').GetName]的代表团抵达，提出自愿并入[SCOPE.sCountry('war_stuff_home').GetName]，理由是共同文化与历史纽带。"
 war_stuff.7.f:1 "“我的祖父曾为分裂我们而战，但我的学生如今唱着你们的国歌行进。历史的车轮正在转动……”"
 war_stuff.7.a:0 "欢迎我们的兄弟加入[SCOPE.sCountry('war_stuff_home').GetNameNoFlag]！"
 war_stuff.7.b:0 "我们尊重[SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]的独立。"

 war_stuff.8.t:0 "吞并的涟漪"
 war_stuff.8.d:1 "消息传至[SCOPE.GetRootScope.GetCountry.GetName]：[SCOPE.sCountry('war_stuff_home').GetName]以外交吞并吸收了[SCOPE.sCountry('war_stuff_enemy').GetName]，欧洲的力量均势因之震动。"
 war_stuff.8.f:1 "“他们先把手伸向了奥地利人……”"
 war_stuff.8.a:0 "这是我们必须承认的既成事实。"

 war_stuff.9.t:0 "向[SCOPE.sCountry('war_stuff_enemy').GetName]提议维持现状和平"
 war_stuff.9.d:1 "[SCOPE.sWar('war_stuff_war').GetName]没有活跃陆上战线，我方军事顾问建议与[SCOPE.sCountry('war_stuff_enemy').GetName]寻求维持现状和平。这将不改变领土而结束冲突，在僵持战争中保存我军与国库免于进一步消耗。"
 war_stuff.9.f:1 ""
 war_stuff.9.a:0 "派遣使节递交和平条件。"
 war_stuff.9.b:0 "尽管陷入僵局，仍继续战争。"

 war_stuff.10.t:0 "来自[SCOPE.sCountry('war_stuff_home').GetName]的和平试探"
 war_stuff.10.d:1 "外交信使自[SCOPE.sCountry('war_stuff_home').GetAdjective]总部抵达，带来正式提议：让[SCOPE.sWar('war_stuff_war').GetName]回到战前边界并结束战争。其信息承认战略僵局，并提出停止一切敌对行动。"
 war_stuff.10.f:1 ""
 war_stuff.10.a:0 "接受他们的提议。"
 war_stuff.10.b:0 "拒绝他们的试探。"

 war_stuff.11.t:0 "疲惫者的兵变"
 war_stuff.11.d:1 "战壕已成墓地，士兵也到了崩溃边缘。来自[SCOPE.sFront('war_stuff_front').GetName]的报告称，整个团拒绝上刺刀。他们表示会抵挡敌军推进，但不再为一个似乎忘记他们生命价值的政府参加“自杀式”进攻。"
 war_stuff.11.f:1 "“我们不会攻击祖国，但也不会为谎言而死。将军们若想要那座山，就让他们自己去拿。”"
 war_stuff.11.a:0 "用行刑队恢复秩序。"
 war_stuff.11.b:0 "回应他们的不满并改善口粮。"

 war_stuff.12.t:0 "军火丑闻"
 war_stuff.12.d:1 "一场国家丑闻浮出水面：前线士兵领到的是劣质炮弹；更糟时，甚至什么都没有。当勇士们面对敌火，国内工厂却陷于低效与成本飙升。新闻界要求知道，为何“[SCOPE.GetRootScope.GetCountry.GetName]兵工厂”在我们最需要时沉默。"
 war_stuff.12.f:1 "“没有子弹的士兵只是靶子。步枪空响之时，工业却仍在牟利，此罪甚重。”"
 war_stuff.12.a:0 "无论如何强行生产。"
 war_stuff.12.b:0 "优先保证质量与补给线完整。"

 war_stuff.13.t:0 "[SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]计划"
 war_stuff.13.d:1 "总司令部的地图数月未变。在[SCOPE.sFront('war_stuff_front').GetName]，清晨夺取的每一寸土地，入夜又被夺回。[SCOPE.sCharacter('war_stuff_general_offensive').GetFullName]从前线归来，带着一叠作战地图和阴沉的决心。他坚持认为，只要胆气尚在，再来一次大攻势，便能粉碎[SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]防线，让战争重新动起来。"
 war_stuff.13.f:1 "“士兵们累了，是的，但他们更厌倦了在泥中等待死亡。给我炮弹，我会彻底打垮[SCOPE.sCountry('war_stuff_enemy').GetNameNoFormatting]。”"
 war_stuff.13.a:0 "开始[SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]攻势。"
 war_stuff.13.b:0 "拒绝该计划并维持防御。"

 war_stuff.14.t:0 "解放倡议"
 war_stuff.14.d:1 "[SCOPE.sFront('war_stuff_front').GetName]的战线陷入停滞，使我们的同胞在[SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]占领下受苦。[SCOPE.sCharacter('war_stuff_general_liberation').GetFullName]向战争部提交了一项大胆作战计划。他认为，集中兵力并唤起士兵夺回家园的愿望，便能粉碎[SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]防线。"
 war_stuff.14.f:1 "“我们每拖延一天，[SCOPE.sState('war_stuff_liberation_state').GetNameNoFormatting]的兄弟就多受一天苦。下令吧，我们将把[SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFormatting]威胁赶回边境之外。”"
 war_stuff.14.a:0 "批准[SCOPE.sCharacter('war_stuff_general_liberation').GetLastName]攻势。"
 war_stuff.14.b:0 "保持防御姿态。"

 waddle_modifier_brutal_discipline:0 "残酷纪律"
 
 waddle_modifier_war_concessions:0 "前线让步"
 
 waddle_modifier_industrial_seizure:0 "劣质军火生产"
 
 waddle_modifier_careful_supply:0 "优质补给监管"

 waddle_modifier_desperate_offensive:0 "大攻势"
 
 waddle_modifier_trench_attrition:0 "战壕僵局"

 waddle_modifier_liberation_drive:0 "解放推动"

 war_stuff.15.t: "征兵危机"
 war_stuff.15.d: "随着战争拖延，新的征召遭遇公开抵抗。地方官报告逃兵、被藏起来的儿子，以及不愿再交出一批男人的村庄。"
 war_stuff.15.f: "“如果国家还饿，就让它去别的桌上吃。”"
 war_stuff.15.a: "必须完成配额。"
 war_stuff.15.b: "给予有限豁免。"
 war_stuff.16.t: "来自[SCOPE.sState('war_stuff_refugee_state').GetName]的难民"
 war_stuff.16.d: "[SCOPE.sState('war_stuff_refugee_state').GetName]的战斗迫使平民离开家园。[SCOPE.sFront('war_stuff_front').GetName]后方的道路、车站和教堂挤满了逃离炮火的人。"
 war_stuff.16.f: "他们带来了能带走的一切。其余都留给烟尘。"
 war_stuff.16.a: "安排收容。"
 war_stuff.16.b: "军队拥有优先权。"
 war_stuff.17.t: "暴行报告"
 war_stuff.17.d: "有关我军抢掠、报复和杀戮的报告开始在国外流传。官员坚持称这些传闻夸大其词，但[SCOPE.sCountry('war_stuff_enemy').GetName]的敌对报纸已经找到了头条。"
 war_stuff.17.f: "战争中，真相总是迟到，衣衫褴褛，还被敌人一路押送而来。"
 war_stuff.17.a: "否认这些诽谤。"
 war_stuff.17.b: "惩一儆百。"
 war_stuff.18.t: "[SCOPE.sFront('war_stuff_front').GetName]上的私下往来"
 war_stuff.18.d: "[SCOPE.sFront('war_stuff_front').GetName]数月僵持，使对峙战壕之间产生了奇怪的熟悉感。军官报告称，双方交换香烟、隔空开玩笑，并出现了令人担忧的无令不愿开火现象。"
 war_stuff.18.f: "“那边的不是魔鬼，”一名列兵写道，“只是和我们一样的可怜人。”"
 war_stuff.18.a: "给士兵片刻安宁。"
 war_stuff.18.b: "必须恢复纪律。"
 war_stuff.19.t: "[SCOPE.sFront('war_stuff_front').GetName]取得突破"
 war_stuff.19.d: "[SCOPE.sFront('war_stuff_front').GetName]的攻势已经突破。[SCOPE.sCharacter('war_stuff_general').GetFullName]的急报称敌军阵地被弃、预备队正在移动，炮火之外的道路已经打开。"
 war_stuff.19.f: "这一回，地图上的线比伤亡名单走得更快。"
 war_stuff.19.a: "扩大战果。"
 war_stuff.20.t: "[SCOPE.sFront('war_stuff_front').GetName]攻势失败"
 war_stuff.20.d: "[SCOPE.sFront('war_stuff_front').GetName]承诺中的突破并未到来。军队为几片荒废田地付出惨重代价，公众如今追问是谁下令作出这种牺牲。"
 war_stuff.20.f: "参谋们谈论压力、势头和决心。士兵们谈论泥泞。"
 war_stuff.20.a: "将军们必须对此负责。"
 war_stuff.20.b: "再推进一次。"
 war_stuff.21.t: "[SCOPE.sFront('war_stuff_front').GetName]获得解放"
 war_stuff.21.d: "我军在[SCOPE.sFront('war_stuff_front').GetName]解救了被占领土地，将敌人从他们视为战利品的土地上赶回。人群欢呼归来的士兵，视其为战争仍可获胜的证明。"
 war_stuff.21.f: "第一面升起的旗帜很小、破损，却已经足够。"
 war_stuff.21.a: "让钟声响起。"
 war_stuff.22.t: "[SCOPE.sFront('war_stuff_front').GetName]解放受挫"
 war_stuff.22.d: "在[SCOPE.sFront('war_stuff_front').GetName]解放占领区的尝试失败了。仍在敌人控制下的人徒然等待，而国家其余部分则计算又一次失败努力的代价。"
 war_stuff.22.f: "他们曾被告知要倾听我方炮声。到了冬天，他们只听门口的靴声。"
 war_stuff.22.a: "我们必须忍耐。"
 war_stuff.23.t: "给[SCOPE.sFront('war_stuff_front').GetName]的步枪"
 war_stuff.23.d: "军队对步枪和备件的需求压迫了市场。[SCOPE.sCharacter('war_stuff_general').GetFullName]警告，[SCOPE.sFront('war_stuff_front').GetName]的部队可能带着旧武器、缺失零件，甚至两手空空抵达战线。"
 war_stuff.23.f: "士兵可以饿着行军，却不能空手守住战线。"
 war_stuff.23.a: "没收库存。"
 war_stuff.23.b: "配给仅存的物资。"
 war_stuff.24.t: "给[SCOPE.sFront('war_stuff_front').GetName]的火炮"
 war_stuff.24.d: "火炮短缺迫使军队谨慎选择炮击。[SCOPE.sFront('war_stuff_front').GetName]的指挥官要求更多炮弹，超过工厂和仓库能够提供的数量。"
 war_stuff.24.f: "士兵们要的不是演说，而是我方炮声何时作答。"
 war_stuff.24.a: "把炮弹送上炮膛。"
 war_stuff.24.b: "节省炮弹。"
 war_stuff.25.t: "炸药短缺"
 war_stuff.25.d: "炸药短缺如今威胁炮弹、地雷和军事生产。军队要求对化工厂实行紧急权力，而工业家警告这将造成严重的生产混乱。"
 war_stuff.25.f: "每一张账单，如今都有生死的分量。"
 war_stuff.25.a: "征用工厂。"
 war_stuff.25.b: "把火药留到决定性时刻。"
 war_stuff.26.t: "来自[SCOPE.sCountry('war_stuff_enemy').GetName]的俘虏"
 war_stuff.26.d: "最近在[SCOPE.sFront('war_stuff_front').GetName]对[SCOPE.sCountry('war_stuff_enemy').GetName]的胜利，使我们获得了成列的敌军俘虏。如何对待他们，将被我军、敌人以及仍在衡量这场战争性质的各国政府注视。"
 war_stuff.26.f: "胜利并未止于战场。它仍在看守的目光下前行。"
 war_stuff.26.a: "体面地对待他们。"
 war_stuff.26.b: "让他们工作。"
 war_stuff.26.c: "安排交换。"
 waddle_modifier_forced_conscription: "强制征兵"
 waddle_modifier_forced_conscription_desc: "尽管地方抵抗日益增长，征兵配额仍在强制执行。"
 waddle_modifier_conscription_exemptions: "征兵豁免"
 waddle_modifier_conscription_exemptions_desc: "有限豁免缓和了动乱，但牺牲了军事准备度。"
 waddle_modifier_refugee_relief: "难民救济"
 waddle_modifier_refugee_relief_desc: "国家正在为被前线驱离的平民组织援助。"
 waddle_modifier_wartime_censorship: "战时审查"
 waddle_modifier_wartime_censorship_desc: "以秩序之名，战争报道正被压制。"
 waddle_modifier_frontline_fraternization: "前线私下往来"
 waddle_modifier_frontline_fraternization_desc: "与敌人的私下接触削弱了前线纪律。"
 waddle_modifier_breakthrough_momentum: "突破势头"
 waddle_modifier_breakthrough_momentum_desc: "一次成功攻势恢复了军队信心。"
 waddle_modifier_offensive_exhaustion: "进攻疲惫"
 waddle_modifier_offensive_exhaustion_desc: "一次失败进攻使军队动摇，公众不安。"
 waddle_modifier_victorious_liberation: "胜利解放"
 waddle_modifier_victorious_liberation_desc: "占领区得到解救，提升全国士气。"
 waddle_modifier_shattered_liberation_drive: "破碎的解放推动"
 waddle_modifier_shattered_liberation_drive_desc: "失败的解放尝试加深了占领区的绝望。"
 waddle_modifier_small_arms_seizure: "没收小型武器"
 waddle_modifier_small_arms_seizure_desc: "私人和商业武器库存已被征作军用。"
 waddle_modifier_small_arms_rationing: "步枪配给"
 waddle_modifier_small_arms_rationing_desc: "步枪和备件正在全军配给。"
 waddle_modifier_artillery_priority: "火炮优先"
 waddle_modifier_artillery_priority_desc: "工业和运输正被迫服务于火炮需求。"
 waddle_modifier_artillery_conservation: "炮弹节约"
 waddle_modifier_artillery_conservation_desc: "火炮弹药被保留给最必要的行动。"
 waddle_modifier_explosives_seizure: "没收化工厂"
 waddle_modifier_explosives_seizure_desc: "炸药生产已置于战时控制。"
 waddle_modifier_powder_conservation: "火药节约"
 waddle_modifier_powder_conservation_desc: "炸药被保留用于决定性行动。"
 waddle_modifier_pow_labor: "俘虏劳工"
 waddle_modifier_pow_labor_desc: "敌军俘虏正被用于支持战争经济。"
