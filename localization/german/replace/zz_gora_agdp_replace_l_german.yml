l_german:
  RADICALS_TOOLTIP:1 "#tooltip_header $RADICALS$#!\nEs gibt #v [Country.GetNumRadicals|D]#! $RADICALS$ in der Gesamtbevoelkerung von #v [Country.GetTotalPopulation|D]#! ([Country.MakeScope.ScriptValue('larp_radicals_percent')|%v1]) in [Country.GetName]\n$TOOLTIP_DELIMITER$\nDie Zahl der $RADICALS$ hat sich seit [Country.GetRadicalsLoyalistsChangeStartDate|v] um #v #tooltippable #tooltip:[Country.GetTooltipTag],RADICALS_CHANGE_TOOLTIP [Country.GetTotalNumRadicalsChange|D=-]#!#!#! geaendert.\nDie wichtigsten Faktoren sind [Country.GetRadicalsChangeSummary]\n\n[Country.GetRadicalsSummaryDesc][ConcatIfNeitherEmpty('\n\n',SelectLocalization( GreaterThan_int32(Country.CalcNumStatesInTurmoil, '(int32)0'), 'STATES_IN_TURMOIL', '' ))][ConcatIfNeitherEmpty('\n\n',SelectLocalization( Country.HasIGApprovalFromRadicals, 'RADICALS_IG_APPROVAL', '' ))]"
  LOYALISTS_TOOLTIP:1 "#tooltip_header $LOYALISTS$#!\nEs gibt #v [Country.GetNumLoyalists|D]#! $LOYALISTS$ in der Gesamtbevoelkerung von #v [Country.GetTotalPopulation|D]#! ([Country.MakeScope.ScriptValue('larp_loyalists_percent')|%v1]) in [Country.GetName]\n$TOOLTIP_DELIMITER$\nDie Zahl der $LOYALISTS$ hat sich seit [Country.GetRadicalsLoyalistsChangeStartDate|v] um #v #tooltippable #tooltip:[Country.GetTooltipTag],LOYALISTS_CHANGE_TOOLTIP [Country.GetTotalNumLoyalistsChange|D=+]#!#!#! geaendert.\nDie wichtigsten Faktoren sind [Country.GetLoyalistsChangeSummary]\n\n[Country.GetLoyalistsSummaryDesc][ConcatIfNeitherEmpty('\n\n',SelectLocalization( Country.HasIGApprovalFromLoyalists, 'LOYALISTS_IG_APPROVAL', '' ))]"
  NEUTRALS_TOOLTIP:1 "#tooltip_header $NEUTRALS$#!\nEs gibt #v [Country.GetNumNeutrals|*2]#! $NEUTRALS$ in der Gesamtbevoelkerung von #v [Country.GetTotalPopulation|*2]#! ([Country.MakeScope.ScriptValue('larp_neutrals_percent')|%v1]) in [Country.GetName]"
  POP_TOOLTIP:2 "#tooltip_header [Concept('concept_pop','$concept_population$')]#!\nAktuell: [Country.GetTotalPopulation|*2v] ([Country.GetPopulationRanking])\n[Country.GetPopGrowthDesc]$POP_TOOLTIP_DELAYED$\n$TOOLTIP_DELIMITER$\nDie [Country.GetAdjective] Bevoelkerung entspricht [Country.MakeScope.ScriptValue('larp_global_pop_percent')|%v1] der Weltbevoelkerung\nWeltbevoelkerung: [Country.MakeScope.ScriptValue('larp_global_pop')|*2v]"
  GDP_TOOLTIP:1 "#header [Country.GetAdjective] [concept_gdp]#! \n@money![Country.GetGDP|Dv] (#u #tooltippable #tooltip:[Country.GetTooltipTag],COUNTRY_GDP_OWNERSHIP_TOOLTIP [Country.GetDomesticallyOwnedGDPFraction|%1b]#!#!#!) in inländischem Besitz $concept_gdp_short$ ([Country.GetGDPRanking])\n@money![Country.GetGDPPerCapita|2*v] [Concept('concept_gdp_per_capita', '$concept_gdp_per_capita_short$')] ([Country.GetGDPPerCapitaRanking])\n$GDPGR_growth_text$\n$TOOLTIP_DELIMITER$\n[Country.GetAdjective] $concept_gdp_short$ macht [Country.MakeScope.ScriptValue('larp_global_gdp_percent')|%v2] des globalen BIP aus\nGlobales BIP: @money![Country.MakeScope.ScriptValue('larp_global_gdp')|Dv]"
  CURRENT_GDP_STATE:2 "#header [State.GetOwner.GetAdjectiveNoFormatting] [concept_gdp] aus [State.GetName]#!\n$TOOLTIP_DELIMITER$\nAktueller jaehrlicher BIP-Beitrag: #variable @money![State.GetGDPContribution|K]#!\nDas BIP pro Kopf von [State.GetName] betraegt: #variable @money![State.MakeScope.ScriptValue('get_state_gdp_per')|Dv]#!\nBIP-pro-Kopf-Abstand von [State.GetName] zu [State.GetOwner.GetAdjectiveNoFormatting]: #variable @money![State.MakeScope.ScriptValue('get_country_state_relative_value')|D2+=]#!\nBIP-pro-Kopf-Abstand von [State.GetName] zum Weltwert: #variable @money![State.MakeScope.ScriptValue('get_global_state_relative_value')|D2+=]#!\n[State.GetName] traegt #variable [State.GetGDPContributionPercentage|%1]#! zum $GDP_SHORT$ von [State.GetOwner.GetAdjectiveNoFormatting] bei\n\n[State.GetGDPGoodsContributionBreakdown]"
