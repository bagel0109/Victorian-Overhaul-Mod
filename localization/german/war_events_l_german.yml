l_german:
 war_stuff.1.t:0 "[SCOPE.sCountry('war_stuff_enemy').GetCapital.GetCityHubName] besetzt"
 war_stuff.1.d:1 "Unsere siegreichen Armeen besetzen nun das Herz von [SCOPE.sCountry('war_stuff_enemy').GetName]. Wie wir die eroberte Hauptstadt behandeln, wird in der Geschichte nachhallen und über unsere Legitimität wie auch über den Widerstandswillen des Feindes mitentscheiden."
 war_stuff.1.f:1 "\"Diese Menschen wissen, dass ihr Schicksal von unserer Gnade abhängt.\""
 war_stuff.1.a:0 "Ordnung wahren und Institutionen respektieren."
 war_stuff.1.b:0 "Die Truppen nehmen lassen, was ihnen zusteht."

 war_stuff.2.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] besetzt"
 war_stuff.2.d:1 "Zu unserem Erstaunen haben die [SCOPE.sCountry('war_stuff_enemy').GetAdjective] Besatzungstruppen trotz ihres Sieges Ordnung gehalten und unsere Institutionen respektiert."
 war_stuff.2.f:1 "\"Die Eindringlinge patrouillierten auf den Märkten, ohne zu plündern; ich sah sogar, wie einer eine verlorene Geldbörse zurückgab! Wer erobert mit solcher... Zivilität?\""
 war_stuff.2.a:0 "Wir nehmen ihre Zurückhaltung zur Kenntnis."
 war_stuff.3.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] geplündert"
 war_stuff.3.d:1 "[SCOPE.sCountry('war_stuff_enemy').GetAdjective] Truppen haben [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] in qualmende Ruinen verwandelt, unsere nationalen Schätze geplündert und unser Erbe geschändet."
 war_stuff.3.f:1 "\"Jahrhunderte des Wissens wurden zu Asche. Sie haben sogar die Statuen zu Schrott eingeschmolzen!\""
 war_stuff.3.a:0 "Sie werden für diese Barbarei bezahlen!"

 war_stuff.4.t:0 "Unruhen in [SCOPE.sState('war_stuff_state').GetName]"
 war_stuff.4.d:1 "In ganz [SCOPE.sState('war_stuff_state').GetName] sind Gewaltausbrüche entstanden, während die besetzte Bevölkerung unserer Autorität widersteht. Die Straßen färben sich rot vor Trotz; wir müssen sofort reagieren."
 war_stuff.4.f:1 "\"Sie werfen Pflastersteine, die sie aus genau den Straßen reißen, die wir gepflastert haben! Mein Leutnant fragte, ob wir zurückschießen sollen. Was soll ich ihm sagen?\""
 war_stuff.4.a:0 "Diese Rebellion mit maximaler Gewalt zerschlagen."
 war_stuff.4.b:0 "Patrouillen abziehen und die Spannungen abkühlen lassen."

 war_stuff.5.t:0 "Die Trommeln des Krieges"
 war_stuff.5.d:1 "Eine koordinierte Propagandakampagne hat sich in [SCOPE.sCountry('war_stuff_home').GetName] entfaltet, patriotischen Eifer geweckt und den öffentlichen Willen gestärkt, den Kampf fortzusetzen."
 war_stuff.5.f:1 "\"Jede Wand trägt nun Rekrutierungsplakate! Selbst Kinder singen Marschlieder beim Seilspringen. Das Herz der Nation schlägt nur noch für den Sieg.\""
 war_stuff.5.a:0 "Unser Volk steht geschlossen hinter der Sache!"

 war_stuff.6.t:0 "Rassismus in [SCOPE.sState('war_stuff_state').GetName]"
 war_stuff.6.d:1 "Bürger von [SCOPE.sCountry('war_stuff_home').GetName] in [SCOPE.sState('war_stuff_state').GetName] greifen gewaltsam Nachbarn an, die der Kultur [SCOPE.sCulture('war_stuff_culture').GetName] zugerechnet werden, und geben ihnen die Schuld am andauernden Krieg."
 war_stuff.6.f:1 "\"'Geht nach Hause!', riefen sie...\""
 war_stuff.6.a:0 "Das Volk seinen gerechten Zorn abreagieren lassen."
 war_stuff.6.b:0 "Alle Bürger ungeachtet ihrer Herkunft schützen."

 war_stuff.7.t:0 "Der Ruf der Einheit"
 war_stuff.7.d:1 "Delegationen aus [SCOPE.sCountry('war_stuff_enemy').GetName] sind eingetroffen und schlagen eine freiwillige Annexion durch [SCOPE.sCountry('war_stuff_home').GetName] vor, mit Verweis auf gemeinsame Kultur und historische Bande."
 war_stuff.7.f:1 "\"Mein Großvater kämpfte, um uns zu trennen, doch meine Schüler marschieren nun und singen eure Hymnen. Das Rad der Geschichte dreht sich...\""
 war_stuff.7.a:0 "Heißen wir unsere Brüder in [SCOPE.sCountry('war_stuff_home').GetNameNoFlag] willkommen!"
 war_stuff.7.b:0 "Wir respektieren die [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] Unabhängigkeit."

 war_stuff.8.t:0 "Wellen der Annexion"
 war_stuff.8.d:1 "[SCOPE.GetRootScope.GetCountry.GetName] erhält die Nachricht, dass [SCOPE.sCountry('war_stuff_home').GetName] [SCOPE.sCountry('war_stuff_enemy').GetName] durch diplomatische Annexion aufgenommen hat und damit das europäische Machtgleichgewicht ins Wanken bringt."
 war_stuff.8.f:1 "\"Zuerst kamen sie wegen der Österreicher...\""
 war_stuff.8.a:0 "Eine vollendete Tatsache, die wir anerkennen müssen."

 war_stuff.9.t:0 "Weißen Frieden mit [SCOPE.sCountry('war_stuff_enemy').GetName] vorschlagen"
 war_stuff.9.d:1 "Da es im [SCOPE.sWar('war_stuff_war').GetName] keine aktiven Landfronten gibt, empfehlen unsere Militärberater, mit [SCOPE.sCountry('war_stuff_enemy').GetName] einen weißen Frieden anzustreben. Dies würde den Konflikt ohne territoriale Änderungen beenden und unsere Streitkräfte sowie die Staatskasse vor weiterer Erschöpfung in einem festgefahrenen Krieg bewahren."
 war_stuff.9.f:1 ""
 war_stuff.9.a:0 "Gesandte mit Friedensbedingungen entsenden."
 war_stuff.9.b:0 "Den Krieg trotz der Pattsituation fortsetzen."

 war_stuff.10.t:0 "Friedensangebot von [SCOPE.sCountry('war_stuff_home').GetName]"
 war_stuff.10.d:1 "Diplomatische Kuriere treffen aus dem Hauptquartier von [SCOPE.sCountry('war_stuff_home').GetName] ein und überbringen einen formellen Vorschlag, den [SCOPE.sWar('war_stuff_war').GetName] mit einer Rückkehr zu den Vorkriegsgrenzen zu beenden. Ihre Botschaft erkennt die strategische Blockade an und bietet die Einstellung aller Feindseligkeiten an."
 war_stuff.10.f:1 ""
 war_stuff.10.a:0 "Ihren Vorschlag annehmen."
 war_stuff.10.b:0 "Ihr Angebot zurückweisen."

 war_stuff.11.t:0 "Die Meuterei der Erschöpften"
 war_stuff.11.d:1 "Die Schützengräben sind zu einem Friedhof geworden, und die Männer sind am Ende. Berichte von der [SCOPE.sFront('war_stuff_front').GetName] beschreiben ganze Regimenter, die sich weigern, Bajonette aufzupflanzen. Sie behaupten, sie würden die Linie gegen einen feindlichen Angriff halten, aber nicht länger an 'selbstmörderischen' Offensiven für eine Regierung teilnehmen, die den Wert ihres Lebens vergessen zu haben scheint."
 war_stuff.11.f:1 "\"Wir werden nicht gegen das Vaterland schlagen, aber wir werden nicht für eine Lüge sterben. Wenn die Generäle diesen Hügel wollen, sollen sie ihn selbst nehmen.\""
 war_stuff.11.a:0 "Ordnung durch das Erschießungskommando wiederherstellen."
 war_stuff.11.b:0 "Ihre Beschwerden anhören und die Rationen verbessern."

 war_stuff.12.t:0 "Der Munitionsskandal"
 war_stuff.12.d:1 "Eine nationale Blamage ist ans Licht gekommen: Unsere Soldaten an der Front erhalten fehlerhafte Granaten; oder schlimmer, gar keine. Während unsere tapferen Männer dem feindlichen Feuer ausgesetzt sind, stecken die Fabriken daheim in Ineffizienz und steigenden Kosten fest. Die Presse verlangt zu wissen, warum das 'Arsenal von [SCOPE.GetRootScope.GetCountry.GetName]' in unserer Stunde der Not verstummt."
 war_stuff.12.f:1 "\"Ein Soldat ohne Kugel ist nur noch ein Ziel. Es ist ein schweres Verbrechen, wenn unsere Industrie Gewinne macht, während unsere Gewehre nur leer klicken.\""
 war_stuff.12.a:0 "Die Produktion trotzdem erzwingen."
 war_stuff.12.b:0 "Qualität und Integrität der Versorgungslinien priorisieren."

 war_stuff.13.t:0 "Der [SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]-Plan"
 war_stuff.13.d:1 "Die Karten im Großen Hauptquartier haben sich seit Monaten nicht verändert. An der [SCOPE.sFront('war_stuff_front').GetName] wird jeder Meter Erde, der am Morgen gewonnen wird, bei Einbruch der Nacht zurückerobert. [SCOPE.sCharacter('war_stuff_general_offensive').GetFullName] ist mit einem Stapel Operationskarten und grimmiger Entschlossenheit von der Front eingetroffen. Er besteht darauf, dass er mit genug Zähigkeit und 'einer letzten großen Offensive' die [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] Linien zerschlagen und dem Krieg wieder Bewegung verleihen kann."
 war_stuff.13.f:1 "\"Die Männer sind müde, ja, aber noch müder sind sie davon, im Schlamm auf den Tod zu warten. Gebt mir die Granaten, und ich werde [SCOPE.sCountry('war_stuff_enemy').GetNameNoFormatting] ein für alle Mal brechen.\""
 war_stuff.13.a:0 "Die [SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]-Offensive beginnen."
 war_stuff.13.b:0 "Den Plan ablehnen und unsere Verteidigung aufrechterhalten."

 war_stuff.14.t:0 "Die Befreiungsinitiative"
 war_stuff.14.d:1 "Die Linien an der [SCOPE.sFront('war_stuff_front').GetName] sind erstarrt und lassen unsere eigenen Landsleute unter [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] Besatzung schmachten. [SCOPE.sCharacter('war_stuff_general_liberation').GetFullName] hat dem Kriegsministerium einen kühnen Operationsplan vorgelegt. Er argumentiert, dass wir durch die Konzentration unserer Truppen und den Wunsch der Männer, ihre eigenen Herdstätten zurückzugewinnen, die [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] Linien zerschlagen können."
 war_stuff.14.f:1 "\"Jeder Tag, den wir zögern, ist ein weiterer Tag des Leidens für unsere Brüder in [SCOPE.sState('war_stuff_liberation_state').GetNameNoFormatting]. Gebt den Befehl, und wir treiben die [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFormatting] Bedrohung über die Grenze zurück.\""
 war_stuff.14.a:0 "Die [SCOPE.sCharacter('war_stuff_general_liberation').GetLastName]-Offensive genehmigen."
 war_stuff.14.b:0 "Eine defensive Haltung beibehalten."

 waddle_modifier_brutal_discipline:0 "Brutale Disziplin"
 
 waddle_modifier_war_concessions:0 "Frontzugeständnisse"
 
 waddle_modifier_industrial_seizure:0 "Fehlerhafte Munitionsproduktion"
 
 waddle_modifier_careful_supply:0 "Sorgfältige Versorgungskontrolle"

 waddle_modifier_desperate_offensive:0 "Die große Offensive"
 
 waddle_modifier_trench_attrition:0 "Grabentoter Punkt"

 waddle_modifier_liberation_drive:0 "Befreiungsdrang"

 war_stuff.15.t: "Einberufungskrise"
 war_stuff.15.d: "Je länger sich der Krieg hinzieht, desto offener stoßen neue Aushebungen auf Widerstand. Lokale Beamte berichten von Desertionen, versteckten Söhnen und Dörfern, die keine weitere Runde Männer stellen wollen."
 war_stuff.15.f: "\"Wenn der Staat noch hungrig ist, soll er an einem anderen Tisch essen.\""
 war_stuff.15.a: "Die Quoten müssen erfüllt werden."
 war_stuff.15.b: "Begrenzte Ausnahmen gewähren."
 war_stuff.16.t: "Flüchtlinge aus [SCOPE.sState('war_stuff_refugee_state').GetName]"
 war_stuff.16.d: "Die Kämpfe in [SCOPE.sState('war_stuff_refugee_state').GetName] haben Zivilisten aus ihren Häusern getrieben. Straßen, Bahnhöfe und Kirchen hinter der [SCOPE.sFront('war_stuff_front').GetName] sind voller Menschen, die vor den Geschützen fliehen."
 war_stuff.16.f: "Sie brachten mit, was sie tragen konnten. Der Rest blieb dem Rauch überlassen."
 war_stuff.16.a: "Gebt ihnen ein Dach über dem Kopf."
 war_stuff.16.b: "Die Armee hat Vorrang."
 war_stuff.17.t: "Berichte über Gräueltaten"
 war_stuff.17.d: "Berichte über Plünderungen, Vergeltungsmaßnahmen und Tötungen durch unsere Truppen beginnen im Ausland zu kursieren. Beamte betonen, die Geschichten seien übertrieben, doch feindliche Zeitungen in [SCOPE.sCountry('war_stuff_enemy').GetName] haben bereits ihre Schlagzeile gefunden."
 war_stuff.17.f: "Im Krieg kommt die Wahrheit spät, schlecht gekleidet und in Begleitung von Feinden."
 war_stuff.17.a: "Diese Verleumdungen bestreiten."
 war_stuff.17.b: "An den Schuldigen ein Exempel statuieren."
 war_stuff.18.t: "Verbrüderung an der [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.18.d: "Monate des Stillstands an der [SCOPE.sFront('war_stuff_front').GetName] haben eine seltsame Vertrautheit zwischen den gegnerischen Gräben erzeugt. Offiziere berichten von getauschten Zigaretten, zugerufenen Witzen und einer beunruhigenden Zurückhaltung, ohne Befehl zu feuern."
 war_stuff.18.f: "\"Dort drüben sind keine Teufel\", schrieb ein Gefreiter, \"nur arme Teufel wie wir.\""
 war_stuff.18.a: "Den Männern diese kurze Ruhe lassen."
 war_stuff.18.b: "Die Disziplin muss wiederhergestellt werden."
 war_stuff.19.t: "Durchbruch an der [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.19.d: "Die Offensive an der [SCOPE.sFront('war_stuff_front').GetName] hat den Durchbruch geschafft. Depeschen von [SCOPE.sCharacter('war_stuff_general').GetFullName] sprechen von verlassenen feindlichen Stellungen, bewegten Reserven und Straßen, die sich jenseits der Geschütze öffnen."
 war_stuff.19.f: "Zur Abwechslung bewegte sich die Karte schneller als die Verlustlisten."
 war_stuff.19.a: "Den Vorteil ausnutzen."
 war_stuff.20.t: "Offensive scheitert an der [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.20.d: "Der versprochene Durchbruch an der [SCOPE.sFront('war_stuff_front').GetName] ist ausgeblieben. Die Armee hat teuer für ein paar verwüstete Felder bezahlt, und die Öffentlichkeit fragt nun, wer ein solches Opfer befohlen hat."
 war_stuff.20.f: "Der Stab sprach von Druck, Schwung und Entschlossenheit. Die Soldaten sprachen von Schlamm."
 war_stuff.20.a: "Die Generäle müssen dafür geradestehen."
 war_stuff.20.b: "Noch ein Stoß."
 war_stuff.21.t: "Befreiung an der [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.21.d: "Unsere Streitkräfte haben besetztes Gebiet an der [SCOPE.sFront('war_stuff_front').GetName] befreit und den Feind aus Land zurückgedrängt, das er als Preis beansprucht hatte. Menschenmengen bejubeln die zurückkehrenden Soldaten als Beweis, dass der Krieg noch gewonnen werden kann."
 war_stuff.21.f: "Die erste gehisste Flagge war klein und zerrissen, aber sie genügte."
 war_stuff.21.a: "Lasst die Glocken läuten."
 war_stuff.22.t: "Befreiung stockt an der [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.22.d: "Der Versuch, besetztes Gebiet an der [SCOPE.sFront('war_stuff_front').GetName] zu befreien, ist gescheitert. Jene, die noch unter feindlicher Kontrolle stehen, warten vergeblich, während der Rest des Landes die Kosten eines weiteren Fehlschlags zählt."
 war_stuff.22.f: "Man hatte ihnen gesagt, sie sollten auf unsere Geschütze lauschen. Im Winter lauschten sie nur noch auf Stiefel an der Tür."
 war_stuff.22.a: "Wir müssen durchhalten."
 war_stuff.23.t: "Gewehre für die [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.23.d: "Der Bedarf der Armee an Gewehren und Ersatzteilen hat den Markt belastet. [SCOPE.sCharacter('war_stuff_general').GetFullName] warnt, dass Verbände an der [SCOPE.sFront('war_stuff_front').GetName] mit alten Waffen, fehlenden Teilen oder ganz ohne an die Linie gelangen könnten."
 war_stuff.23.f: "Ein Soldat mag hungrig marschieren. Mit leeren Händen kann er keine Linie halten."
 war_stuff.23.a: "Die Vorräte beschlagnahmen."
 war_stuff.23.b: "Rationieren, was übrig ist."
 war_stuff.24.t: "Artillerie für die [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.24.d: "Artillerieknappheit hat die Armee gezwungen, ihre Sperrfeuer sorgfältig zu wählen. Befehlshaber an der [SCOPE.sFront('war_stuff_front').GetName] verlangen mehr Granaten, als Fabriken und Depots liefern können."
 war_stuff.24.f: "Die Männer baten nicht um Reden. Sie fragten, wann unsere Geschütze antworten würden."
 war_stuff.24.a: "Die Geschütze mit Munition versorgen."
 war_stuff.24.b: "Die Granaten schonen."
 war_stuff.25.t: "Explosivstoffmangel"
 war_stuff.25.d: "Ein Mangel an Sprengstoffen bedroht nun Granaten, Minen und militärische Produktion. Die Armee fordert Notvollmachten über die Chemiewerke, während Industrielle vor ruinösen Störungen warnen."
 war_stuff.25.f: "Jede Rechnung wog nun wie eine Frage von Leben und Tod."
 war_stuff.25.a: "Die Werke beschlagnahmen."
 war_stuff.25.b: "Pulver für die entscheidende Stunde aufsparen."
 war_stuff.26.t: "Gefangene aus [SCOPE.sCountry('war_stuff_enemy').GetName]"
 war_stuff.26.d: "Jüngste Erfolge an der [SCOPE.sFront('war_stuff_front').GetName] gegen [SCOPE.sCountry('war_stuff_enemy').GetName] haben uns Kolonnen feindlicher Gefangener eingebracht. Ihre Behandlung wird von unseren Soldaten, unseren Feinden und den Regierungen beobachtet werden, die den Charakter dieses Krieges noch abwägen."
 war_stuff.26.f: "Der Sieg endete nicht auf dem Feld. Er marschierte unter Bewachung weiter."
 war_stuff.26.a: "Sie ehrenhaft behandeln."
 war_stuff.26.b: "Sie zur Arbeit einsetzen."
 war_stuff.26.c: "Einen Austausch arrangieren."
 waddle_modifier_forced_conscription: "Zwangseinberufung"
 waddle_modifier_forced_conscription_desc: "Einberufungsquoten werden trotz wachsendem lokalem Widerstand durchgesetzt."
 waddle_modifier_conscription_exemptions: "Einberufungsausnahmen"
 waddle_modifier_conscription_exemptions_desc: "Begrenzte Ausnahmen haben die Unruhe gemildert, auf Kosten der militärischen Bereitschaft."
 waddle_modifier_refugee_relief: "Flüchtlingshilfe"
 waddle_modifier_refugee_relief_desc: "Der Staat organisiert Hilfe für durch die Front vertriebene Zivilisten."
 waddle_modifier_wartime_censorship: "Kriegszensur"
 waddle_modifier_wartime_censorship_desc: "Berichte aus dem Krieg werden im Namen der Ordnung unterdrückt."
 waddle_modifier_frontline_fraternization: "Frontverbrüderung"
 waddle_modifier_frontline_fraternization_desc: "Informeller Kontakt mit dem Feind hat die Disziplin an der Front aufgeweicht."
 waddle_modifier_breakthrough_momentum: "Durchbruchsschwung"
 waddle_modifier_breakthrough_momentum_desc: "Eine erfolgreiche Offensive hat das Vertrauen in die Armee wiederhergestellt."
 waddle_modifier_offensive_exhaustion: "Offensive Erschöpfung"
 waddle_modifier_offensive_exhaustion_desc: "Ein gescheiterter Angriff hat die Armee erschüttert und die Öffentlichkeit beunruhigt."
 waddle_modifier_victorious_liberation: "Siegreiche Befreiung"
 waddle_modifier_victorious_liberation_desc: "Besetztes Gebiet wurde befreit, was die Moral im ganzen Land hebt."
 waddle_modifier_shattered_liberation_drive: "Zerschlagener Befreiungsdrang"
 waddle_modifier_shattered_liberation_drive_desc: "Ein gescheiterter Befreiungsversuch hat die Verzweiflung im besetzten Gebiet vertieft."
 waddle_modifier_small_arms_seizure: "Handwaffen beschlagnahmt"
 waddle_modifier_small_arms_seizure_desc: "Private und gewerbliche Waffenbestände wurden für militärische Zwecke eingezogen."
 waddle_modifier_small_arms_rationing: "Gewehre rationiert"
 waddle_modifier_small_arms_rationing_desc: "Gewehre und Ersatzteile werden in der gesamten Armee rationiert."
 waddle_modifier_artillery_priority: "Artilleriepriorität"
 waddle_modifier_artillery_priority_desc: "Industrie und Transport werden auf die Bedürfnisse der Artillerie ausgerichtet."
 waddle_modifier_artillery_conservation: "Granatenschonung"
 waddle_modifier_artillery_conservation_desc: "Artilleriemunition wird für die notwendigsten Einsätze aufgespart."
 waddle_modifier_explosives_seizure: "Chemiewerke beschlagnahmt"
 waddle_modifier_explosives_seizure_desc: "Die Explosivstoffproduktion wurde unter Kriegsaufsicht gestellt."
 waddle_modifier_powder_conservation: "Pulverschonung"
 waddle_modifier_powder_conservation_desc: "Explosivstoffe werden für entscheidende Operationen reserviert."
 waddle_modifier_pow_labor: "Gefangenenarbeit"
 waddle_modifier_pow_labor_desc: "Feindliche Gefangene werden zur Unterstützung der Kriegswirtschaft eingesetzt."
