l_japanese:
 war_stuff.1.t:0 "[SCOPE.sCountry('war_stuff_enemy').GetCapital.GetCityHubName]の占領"
 war_stuff.1.d:1 "勝利した我が軍はいま、[SCOPE.sCountry('war_stuff_enemy').GetName]の中枢を占領している。征服した首都をどう扱うかは後世に残り、我々の正統性と敵の抵抗意志を左右するだろう。"
 war_stuff.1.f:1 "「この人々は、自分たちの運命が我々の慈悲にかかっていると知っている。」"
 war_stuff.1.a:0 "秩序を保ち、諸制度を尊重せよ。"
 war_stuff.1.b:0 "兵士たちに相応の取り分を取らせよ。"

 war_stuff.2.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]の占領"
 war_stuff.2.d:1 "驚くべきことに、占領中の[SCOPE.sCountry('war_stuff_enemy').GetAdjective]軍は勝利したにもかかわらず、秩序を保ち我々の制度を尊重している。"
 war_stuff.2.f:1 "「侵略者たちは市場を巡回しても略奪しなかった。落とし物の財布を返す者まで見た！ こんなに……礼節ある征服などあるのか？」"
 war_stuff.2.a:0 "その自制は覚えておこう。"
 war_stuff.3.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]の略奪"
 war_stuff.3.d:1 "[SCOPE.sCountry('war_stuff_enemy').GetAdjective]軍は[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]をくすぶる廃墟に変え、国の宝を奪い、我々の遺産を汚した。"
 war_stuff.3.f:1 "「何世紀もの知識が灰になった。奴らは像まで溶かして金属くずにしたのだ！」"
 war_stuff.3.a:0 "この蛮行の報いを受けさせる！"

 war_stuff.4.t:0 "[SCOPE.sState('war_stuff_state').GetName]の騒乱"
 war_stuff.4.d:1 "占領された住民が我々の権威に抵抗し、[SCOPE.sState('war_stuff_state').GetName]全域で暴力が噴出している。街路は反抗の血で染まりつつあり、ただちに対応を選ばねばならない。"
 war_stuff.4.f:1 "「彼らは、我々が舗装した通りから剥がした石畳を投げているのです！ 中尉は撃ち返すべきかと聞きました。何と答えればよいのですか？」"
 war_stuff.4.a:0 "最大限の武力で反乱を粉砕せよ。"
 war_stuff.4.b:0 "哨戒を撤退させ、緊張が冷めるのを待て。"

 war_stuff.5.t:0 "戦争の太鼓"
 war_stuff.5.d:1 "組織的な宣伝運動が[SCOPE.sCountry('war_stuff_home').GetName]に広がり、愛国の熱を呼び起こし、戦いを続ける国民の決意を固めている。"
 war_stuff.5.f:1 "「どの壁にも募兵ポスターが貼られています！ 縄跳びをする子供まで行進歌を歌う。今や国中が勝利だけを願っているのです。」"
 war_stuff.5.a:0 "国民は大義の下に団結している！"

 war_stuff.6.t:0 "[SCOPE.sState('war_stuff_state').GetName]の人種主義"
 war_stuff.6.d:1 "[SCOPE.sState('war_stuff_state').GetName]の[SCOPE.sCountry('war_stuff_home').GetName]市民が、進行中の戦争の責任を負わせて[SCOPE.sCulture('war_stuff_culture').GetName]系の隣人を暴力的に襲っている。"
 war_stuff.6.f:1 "「『帰れ！』彼らはそう叫んでいた……」"
 war_stuff.6.a:0 "民衆に正当な怒りを吐き出させよ。"
 war_stuff.6.b:0 "出自を問わず、すべての市民を守れ。"

 war_stuff.7.t:0 "統一の呼び声"
 war_stuff.7.d:1 "[SCOPE.sCountry('war_stuff_enemy').GetName]からの代表団が、共通の文化と歴史的絆を理由に、[SCOPE.sCountry('war_stuff_home').GetName]への自発的併合を提案して到着した。"
 war_stuff.7.f:1 "「祖父は我々を分けるために戦いました。だが今、私の生徒たちはあなた方の賛歌を歌いながら行進しています。歴史の輪は回るのです……」"
 war_stuff.7.a:0 "兄弟たちを[SCOPE.sCountry('war_stuff_home').GetNameNoFlag]に迎え入れよう！"
 war_stuff.7.b:0 "[SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]の独立を尊重する。"

 war_stuff.8.t:0 "併合の波紋"
 war_stuff.8.d:1 "[SCOPE.sCountry('war_stuff_home').GetName]が外交的併合によって[SCOPE.sCountry('war_stuff_enemy').GetName]を吸収し、欧州の勢力均衡を揺るがしたとの知らせが[SCOPE.GetRootScope.GetCountry.GetName]に届いた。"
 war_stuff.8.f:1 "「彼らが最初に手を伸ばしたのは、オーストリア人であった……」"
 war_stuff.8.a:0 "認めざるを得ない既成事実だ。"

 war_stuff.9.t:0 "[SCOPE.sCountry('war_stuff_enemy').GetName]との現状維持和平を提案"
 war_stuff.9.d:1 "[SCOPE.sWar('war_stuff_war').GetName]に活動中の陸上戦線がないため、軍事顧問は[SCOPE.sCountry('war_stuff_enemy').GetName]との現状維持和平を求めるよう勧告している。これにより領土変更なしで紛争を終結させ、膠着した戦争でこれ以上軍と国庫を消耗せずに済む。"
 war_stuff.9.f:1 ""
 war_stuff.9.a:0 "和平条件を携えた使節を派遣せよ。"
 war_stuff.9.b:0 "行き詰まりにもかかわらず戦争を継続せよ。"

 war_stuff.10.t:0 "[SCOPE.sCountry('war_stuff_home').GetName]からの和平提案"
 war_stuff.10.d:1 "[SCOPE.sCountry('war_stuff_home').GetAdjective]司令部から外交使者が到着し、[SCOPE.sWar('war_stuff_war').GetName]を戦前国境への復帰で終わらせる正式提案を携えてきた。その文書は戦略的膠着を認め、すべての敵対行為の停止を申し出ている。"
 war_stuff.10.f:1 ""
 war_stuff.10.a:0 "彼らの提案を受け入れる。"
 war_stuff.10.b:0 "彼らの申し出を拒否する。"

 war_stuff.11.t:0 "疲弊した兵士たちの反乱"
 war_stuff.11.d:1 "塹壕は墓場となり、兵士たちは限界に達した。[SCOPE.sFront('war_stuff_front').GetName]からの報告によれば、連隊全体が銃剣装着を拒んでいる。敵の前進に対して戦線は保持すると言うが、自分たちの命の価値を忘れたかのような政府のために「自殺的」攻勢にはもはや参加しないという。"
 war_stuff.11.f:1 "「我々は祖国を撃ちはしない。だが嘘のために死にもせぬ。将軍たちがあの丘を望むなら、自分で取りに行けばいい。」"
 war_stuff.11.a:0 "銃殺隊で秩序を回復せよ。"
 war_stuff.11.b:0 "不満に対応し、糧食を改善せよ。"

 war_stuff.12.t:0 "軍需品スキャンダル"
 war_stuff.12.d:1 "国家的な恥が明るみに出た。前線の兵士たちには不良砲弾が支給されている。さらに悪いことには、何も届かない場合すらある。勇敢な兵士たちが敵火にさらされる一方、国内の工場は非効率と高騰する費用に沈んでいる。新聞は、「[SCOPE.GetRootScope.GetCountry.GetName]の兵器廠」がなぜ必要な時に沈黙しているのかを問うている。"
 war_stuff.12.f:1 "「弾のない兵士は標的にすぎない。我々の小銃が空しく鳴る傍らで産業が利を得るなど、重罪である。」"
 war_stuff.12.a:0 "それでも生産を強制せよ。"
 war_stuff.12.b:0 "品質と補給線の健全性を優先せよ。"

 war_stuff.13.t:0 "[SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]計画"
 war_stuff.13.d:1 "総司令部の地図は何か月も変わっていない。[SCOPE.sFront('war_stuff_front').GetName]では、朝に得た土地が夜には奪い返される。[SCOPE.sCharacter('war_stuff_general_offensive').GetFullName]は作戦地図の束と暗い決意を携えて前線から戻った。十分な胆力と「最後の大攻勢」さえあれば、[SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]の戦線を砕き、戦争に再び機動をもたらせると彼は主張する。"
 war_stuff.13.f:1 "「兵は疲れている。だが泥の中で死を待つことにはもっと疲れている。砲弾をくれれば、[SCOPE.sCountry('war_stuff_enemy').GetNameNoFormatting]を今度こそ打ち砕いてみせる。」"
 war_stuff.13.a:0 "[SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]攻勢を開始せよ。"
 war_stuff.13.b:0 "計画を却下し、防御を維持せよ。"

 war_stuff.14.t:0 "解放構想"
 war_stuff.14.d:1 "[SCOPE.sFront('war_stuff_front').GetName]の戦線は停滞し、同胞たちは[SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]の占領下で苦しんでいる。[SCOPE.sCharacter('war_stuff_general_liberation').GetFullName]は陸軍省に大胆な作戦計画を提出した。兵力を集中し、自らの故郷を取り戻したいという兵士たちの思いに訴えれば、[SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]の戦線を砕けると彼は説く。"
 war_stuff.14.f:1 "「遅れる一日ごとに、[SCOPE.sState('war_stuff_liberation_state').GetNameNoFormatting]の兄弟たちの苦しみは一日延びるのです。命令をくだされば、[SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFormatting]の脅威を国境の向こうへ押し返してみせます。」"
 war_stuff.14.a:0 "[SCOPE.sCharacter('war_stuff_general_liberation').GetLastName]攻勢を承認せよ。"
 war_stuff.14.b:0 "防御姿勢を維持する。"

 waddle_modifier_brutal_discipline:0 "苛烈な軍紀"
 
 waddle_modifier_war_concessions:0 "前線への譲歩"
 
 waddle_modifier_industrial_seizure:0 "欠陥軍需品の生産"
 
 waddle_modifier_careful_supply:0 "品質重視の補給監督"

 waddle_modifier_desperate_offensive:0 "大攻勢"
 
 waddle_modifier_trench_attrition:0 "塹壕の膠着"

 waddle_modifier_liberation_drive:0 "解放への推進力"

 war_stuff.15.t: "徴兵危機"
 war_stuff.15.d: "戦争が長引くにつれ、新たな徴募は公然たる抵抗に遭っている。地方官は脱走、隠された息子たち、そして次の兵員供出を拒む村々を報告している。"
 war_stuff.15.f: "「国家がまだ飢えているなら、別の食卓で食わせればよい。」"
 war_stuff.15.a: "割当は満たされねばならない。"
 war_stuff.15.b: "限定的な免除を認める。"
 war_stuff.16.t: "[SCOPE.sState('war_stuff_refugee_state').GetName]からの難民"
 war_stuff.16.d: "[SCOPE.sState('war_stuff_refugee_state').GetName]での戦闘により、民間人は住居を追われた。[SCOPE.sFront('war_stuff_front').GetName]の後方にある道路、駅、教会は砲火から逃れる人々であふれている。"
 war_stuff.16.f: "彼らは持てるものだけを持ってきた。残りは煙に置き去りにされた。"
 war_stuff.16.a: "避難場所を用意せよ。"
 war_stuff.16.b: "軍が最優先だ。"
 war_stuff.17.t: "残虐行為の報告"
 war_stuff.17.d: "我が軍による略奪、報復、殺害の報告が国外で広まり始めている。当局は話が誇張されていると主張するが、[SCOPE.sCountry('war_stuff_enemy').GetName]の敵対的新聞はすでに見出しを見つけている。"
 war_stuff.17.f: "戦争において、真実は遅れて、みすぼらしい姿で、敵を伴ってやって来る。"
 war_stuff.17.a: "この中傷を否定せよ。"
 war_stuff.17.b: "罪人を見せしめにせよ。"
 war_stuff.18.t: "[SCOPE.sFront('war_stuff_front').GetName]での敵兵との私的交流"
 war_stuff.18.d: "[SCOPE.sFront('war_stuff_front').GetName]での数か月に及ぶ膠着は、対峙する塹壕の間に奇妙な親しみを生んだ。将校たちは交換される煙草、叫び交わされる冗談、そして命令なしには撃ちたがらない憂慮すべき態度を報告している。"
 war_stuff.18.f: "「あちらにいるのは悪魔ではない」と一兵卒は書いた。「我々と同じ哀れな人間にすぎない。」"
 war_stuff.18.a: "兵たちに束の間の静けさを許せ。"
 war_stuff.18.b: "軍紀を回復せねばならない。"
 war_stuff.19.t: "[SCOPE.sFront('war_stuff_front').GetName]での突破"
 war_stuff.19.d: "[SCOPE.sFront('war_stuff_front').GetName]での攻勢は突破に成功した。[SCOPE.sCharacter('war_stuff_general').GetFullName]からの急報は、放棄された敵陣、動き出す予備兵、そして砲火の先に開ける道路について伝えている。"
 war_stuff.19.f: "この時ばかりは、地図の線が死傷者名簿よりも速く進んだ。"
 war_stuff.19.a: "優位を押し広げよ。"
 war_stuff.20.t: "[SCOPE.sFront('war_stuff_front').GetName]で攻勢失敗"
 war_stuff.20.d: "[SCOPE.sFront('war_stuff_front').GetName]で約束された突破は訪れなかった。軍はわずかな荒れ果てた畑のために高い代償を払い、国民は今、この犠牲を命じたのは誰かと問い始めている。"
 war_stuff.20.f: "参謀たちは圧力、勢い、決意を語った。兵士たちは泥を語った。"
 war_stuff.20.a: "将軍たちに責任を取らせよ。"
 war_stuff.20.b: "もう一押しだ。"
 war_stuff.21.t: "[SCOPE.sFront('war_stuff_front').GetName]での解放"
 war_stuff.21.d: "我が軍は[SCOPE.sFront('war_stuff_front').GetName]の占領地を解放し、敵が戦利品と見なした土地から追い返した。帰還する兵士たちを歓呼する群衆は、この戦争がまだ勝てる証と見なしている。"
 war_stuff.21.f: "最初に掲げられた旗は小さく、破れていたが、それで十分だった。"
 war_stuff.21.a: "鐘を鳴らせ。"
 war_stuff.22.t: "[SCOPE.sFront('war_stuff_front').GetName]で解放が頓挫"
 war_stuff.22.d: "[SCOPE.sFront('war_stuff_front').GetName]で占領地を解放しようとする試みは失敗した。なお敵の支配下にある人々はむなしく待ち続け、国の残りはまた一つ失敗した努力の代償を数えている。"
 war_stuff.22.f: "彼らは我々の砲声を聞けと言われていた。冬には、戸口の軍靴の音だけを聞くようになった。"
 war_stuff.22.a: "耐えねばならない。"
 war_stuff.23.t: "[SCOPE.sFront('war_stuff_front').GetName]のための小銃"
 war_stuff.23.d: "小銃と予備部品に対する軍の需要が市場を圧迫している。[SCOPE.sCharacter('war_stuff_general').GetFullName]は、[SCOPE.sFront('war_stuff_front').GetName]の部隊が古い武器、欠けた部品、あるいは何もない状態で戦線に着くかもしれないと警告している。"
 war_stuff.23.f: "兵士は空腹でも行軍できる。だが素手で戦線を守ることはできない。"
 war_stuff.23.a: "備蓄を接収せよ。"
 war_stuff.23.b: "残った物資を配給せよ。"
 war_stuff.24.t: "[SCOPE.sFront('war_stuff_front').GetName]への砲兵"
 war_stuff.24.d: "砲兵不足により、軍は砲撃を慎重に選ばざるを得なくなった。[SCOPE.sFront('war_stuff_front').GetName]の指揮官たちは、工場と補給廠が供給できる以上の砲弾を求めている。"
 war_stuff.24.f: "兵士たちは演説を求めなかった。我らの砲がいつ応えるのかを尋ねたのだ。"
 war_stuff.24.a: "砲に食わせろ。"
 war_stuff.24.b: "砲弾を温存せよ。"
 war_stuff.25.t: "爆薬不足"
 war_stuff.25.d: "爆薬不足はいまや砲弾、地雷、軍需生産を脅かしている。軍は化学工場に対する非常権限を要求し、実業家たちは破滅的な混乱を警告している。"
 war_stuff.25.f: "すべての請求書が、命にかかわる重みを帯びた。"
 war_stuff.25.a: "工場を徴発せよ。"
 war_stuff.25.b: "決定的な時のために火薬を温存せよ。"
 war_stuff.26.t: "[SCOPE.sCountry('war_stuff_enemy').GetName]からの捕虜"
 war_stuff.26.d: "[SCOPE.sFront('war_stuff_front').GetName]で[SCOPE.sCountry('war_stuff_enemy').GetName]に対して最近得た成功により、我々は敵捕虜の隊列を抱えることになった。彼らの扱いは、我が兵士、敵、そしてこの戦争の性格をなお見極めている諸政府に注視されるだろう。"
 war_stuff.26.f: "勝利は戦場で終わらなかった。監視の列の中でなお歩き続けた。"
 war_stuff.26.a: "名誉をもって扱え。"
 war_stuff.26.b: "労働に就かせよ。"
 war_stuff.26.c: "交換を手配せよ。"
 waddle_modifier_forced_conscription: "強制徴兵"
 waddle_modifier_forced_conscription_desc: "徴兵割当は、増大する地域抵抗にもかかわらず執行されている。"
 waddle_modifier_conscription_exemptions: "徴兵免除"
 waddle_modifier_conscription_exemptions_desc: "限定的な免除は、軍の即応性を犠牲にして騒乱を和らげた。"
 waddle_modifier_refugee_relief: "難民救援"
 waddle_modifier_refugee_relief_desc: "国家は前線に追われた民間人への支援を組織している。"
 waddle_modifier_wartime_censorship: "戦時検閲"
 waddle_modifier_wartime_censorship_desc: "秩序の名の下に、戦争の報告は抑え込まれている。"
 waddle_modifier_frontline_fraternization: "前線での敵兵との私的交流"
 waddle_modifier_frontline_fraternization_desc: "敵兵との非公式な私的交流が、前線の軍紀を緩めた。"
 waddle_modifier_breakthrough_momentum: "突破の勢い"
 waddle_modifier_breakthrough_momentum_desc: "成功した攻勢が軍への信頼を回復した。"
 waddle_modifier_offensive_exhaustion: "攻勢疲弊"
 waddle_modifier_offensive_exhaustion_desc: "失敗した攻撃は軍を動揺させ、国民を不安にした。"
 waddle_modifier_victorious_liberation: "勝利の解放"
 waddle_modifier_victorious_liberation_desc: "占領地が解放され、国中の士気が高まった。"
 waddle_modifier_shattered_liberation_drive: "砕かれた解放運動"
 waddle_modifier_shattered_liberation_drive_desc: "失敗した解放の試みが、占領地の絶望を深めた。"
 waddle_modifier_small_arms_seizure: "接収された小火器"
 waddle_modifier_small_arms_seizure_desc: "民間および商業用の武器備蓄が軍用に接収された。"
 waddle_modifier_small_arms_rationing: "配給制の小銃"
 waddle_modifier_small_arms_rationing_desc: "小銃と予備部品が軍全体で配給制になっている。"
 waddle_modifier_artillery_priority: "砲兵優先"
 waddle_modifier_artillery_priority_desc: "産業と輸送は砲兵の需要に合わせて再編されている。"
 waddle_modifier_artillery_conservation: "砲弾温存"
 waddle_modifier_artillery_conservation_desc: "砲兵弾薬は最も必要な行動のために温存されている。"
 waddle_modifier_explosives_seizure: "化学工場の接収"
 waddle_modifier_explosives_seizure_desc: "爆薬生産は戦時統制下に置かれた。"
 waddle_modifier_powder_conservation: "火薬温存"
 waddle_modifier_powder_conservation_desc: "爆薬は決定的作戦のために備蓄されている。"
 waddle_modifier_pow_labor: "捕虜労働"
 waddle_modifier_pow_labor_desc: "敵捕虜は戦時経済を支えるために用いられている。"
