l_japanese:
  RADICALS_TOOLTIP:1 "#tooltip_header $RADICALS$#!\n[Country.GetName]の総人口#v [Country.GetTotalPopulation|D]#!のうち、#v [Country.GetNumRadicals|D]#!人が$RADICALS$です（[Country.MakeScope.ScriptValue('larp_radicals_percent')|%v1]）\n$TOOLTIP_DELIMITER$\n[Country.GetRadicalsLoyalistsChangeStartDate|v]以降、$RADICALS$の数は#v #tooltippable #tooltip:[Country.GetTooltipTag],RADICALS_CHANGE_TOOLTIP [Country.GetTotalNumRadicalsChange|D=-]#!#!#!変化しました。\n主な要因は[Country.GetRadicalsChangeSummary]です\n\n[Country.GetRadicalsSummaryDesc][ConcatIfNeitherEmpty('\n\n',SelectLocalization( GreaterThan_int32(Country.CalcNumStatesInTurmoil, '(int32)0'), 'STATES_IN_TURMOIL', '' ))][ConcatIfNeitherEmpty('\n\n',SelectLocalization( Country.HasIGApprovalFromRadicals, 'RADICALS_IG_APPROVAL', '' ))]"
  LOYALISTS_TOOLTIP:1 "#tooltip_header $LOYALISTS$#!\n[Country.GetName]の総人口#v [Country.GetTotalPopulation|D]#!のうち、#v [Country.GetNumLoyalists|D]#!人が$LOYALISTS$です（[Country.MakeScope.ScriptValue('larp_loyalists_percent')|%v1]）\n$TOOLTIP_DELIMITER$\n[Country.GetRadicalsLoyalistsChangeStartDate|v]以降、$LOYALISTS$の数は#v #tooltippable #tooltip:[Country.GetTooltipTag],LOYALISTS_CHANGE_TOOLTIP [Country.GetTotalNumLoyalistsChange|D=+]#!#!#!変化しました\n主な要因は[Country.GetLoyalistsChangeSummary]です\n\n[Country.GetLoyalistsSummaryDesc][ConcatIfNeitherEmpty('\n\n',SelectLocalization( Country.HasIGApprovalFromLoyalists, 'LOYALISTS_IG_APPROVAL', '' ))]"
  NEUTRALS_TOOLTIP:1 "#tooltip_header $NEUTRALS$#!\n[Country.GetName]の総人口#v [Country.GetTotalPopulation|*2]#!のうち、#v [Country.GetNumNeutrals|*2]#!人が$NEUTRALS$です（[Country.MakeScope.ScriptValue('larp_neutrals_percent')|%v1]）"
  POP_TOOLTIP:2 "#tooltip_header [Concept('concept_pop','$concept_population$')]#!\n現在: [Country.GetTotalPopulation|*2v] ([Country.GetPopulationRanking])\n[Country.GetPopGrowthDesc]$POP_TOOLTIP_DELAYED$\n$TOOLTIP_DELIMITER$\n[Country.GetAdjective]の人口は世界人口の[Country.MakeScope.ScriptValue('larp_global_pop_percent')|%v1]です\n世界人口: [Country.MakeScope.ScriptValue('larp_global_pop')|*2v]"
  GDP_TOOLTIP:1 "#header [Country.GetAdjective][concept_gdp]#! \n@money![Country.GetGDP|Dv] (#u #tooltippable #tooltip:[Country.GetTooltipTag],COUNTRY_GDP_OWNERSHIP_TOOLTIP [Country.GetDomesticallyOwnedGDPFraction|%1b]#!#!#!) 国内所有の$concept_gdp_short$ ([Country.GetGDPRanking])\n@money![Country.GetGDPPerCapita|2*v] [Concept('concept_gdp_per_capita', '$concept_gdp_per_capita_short$')] ([Country.GetGDPPerCapitaRanking])\n$GDPGR_growth_text$\n$TOOLTIP_DELIMITER$\n[Country.GetAdjective]$concept_gdp_short$は世界GDPの[Country.MakeScope.ScriptValue('larp_global_gdp_percent')|%v2]です\n世界GDP：@money![Country.MakeScope.ScriptValue('larp_global_gdp')|Dv]"
  CURRENT_GDP_STATE:2 "#header [State.GetOwner.GetAdjectiveNoFormatting]の[State.GetName]からの[concept_gdp]#!\n$TOOLTIP_DELIMITER$\n現在の年間GDP寄与: #variable @money![State.GetGDPContribution|K]#!\n[State.GetName]の一人当たりGDP: #variable @money![State.MakeScope.ScriptValue('get_state_gdp_per')|Dv]#!\n[State.GetName]と[State.GetOwner.GetAdjectiveNoFormatting]の一人当たりGDP差: #variable @money![State.MakeScope.ScriptValue('get_country_state_relative_value')|D2+=]#!\n[State.GetName]と世界平均の一人当たりGDP差: #variable @money![State.MakeScope.ScriptValue('get_global_state_relative_value')|D2+=]#!\n[State.GetName]は[State.GetOwner.GetAdjectiveNoFormatting]の$GDP_SHORT$の#variable [State.GetGDPContributionPercentage|%1]#!を担っています\n\n[State.GetGDPGoodsContributionBreakdown]"
