l_korean:
 war_stuff.1.t:0 "[SCOPE.sCountry('war_stuff_enemy').GetCapital.GetCityHubName] 점령"
 war_stuff.1.d:1 "승리한 우리 군대는 이제 [SCOPE.sCountry('war_stuff_enemy').GetName]의 심장부를 점령했다. 정복한 수도를 어떻게 다루느냐는 역사에 남아 우리의 정통성과 적의 저항 의지를 좌우할 것이다."
 war_stuff.1.f:1 "\"이 사람들은 자신들의 운명이 우리의 자비에 달렸다는 것을 알고 있다.\""
 war_stuff.1.a:0 "질서를 유지하고 제도를 존중하라."
 war_stuff.1.b:0 "병사들이 마땅한 몫을 가져가게 하라."

 war_stuff.2.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] 점령"
 war_stuff.2.d:1 "놀랍게도 점령 중인 [SCOPE.sCountry('war_stuff_enemy').GetAdjective] 군대는 승리했음에도 질서를 유지하고 우리의 제도를 존중했다."
 war_stuff.2.f:1 "\"침략자들이 약탈하지 않고 시장을 순찰했소. 심지어 떨어진 지갑을 돌려주는 자도 봤지! 누가 이렇게... 문명적으로 정복한단 말인가?\""
 war_stuff.2.a:0 "그들의 절제는 기억해 두자."
 war_stuff.3.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] 약탈"
 war_stuff.3.d:1 "[SCOPE.sCountry('war_stuff_enemy').GetAdjective] 병사들이 [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]을 연기 나는 폐허로 만들고, 우리의 국보를 약탈하며 유산을 더럽혔다."
 war_stuff.3.f:1 "\"수백 년의 지식이 재가 되었다. 놈들은 조각상까지 녹여 고철로 만들었다!\""
 war_stuff.3.a:0 "그 야만의 대가를 치르게 하라!"

 war_stuff.4.t:0 "[SCOPE.sState('war_stuff_state').GetName]의 소요"
 war_stuff.4.d:1 "점령된 인구가 우리의 권위에 저항하면서 [SCOPE.sState('war_stuff_state').GetName] 전역에서 폭력 사태가 일어났다. 거리는 반항의 피로 붉어지고 있으며, 즉시 대응을 선택해야 한다."
 war_stuff.4.f:1 "\"우리가 포장한 바로 그 거리에서 뜯어낸 돌을 던지고 있습니다! 중위가 반격해야 하느냐고 묻습니다. 뭐라고 전하라 하시겠습니까?\""
 war_stuff.4.a:0 "최대의 힘으로 이 반란을 진압하라."
 war_stuff.4.b:0 "순찰대를 철수시키고 긴장을 식혀라."

 war_stuff.5.t:0 "전쟁의 북소리"
 war_stuff.5.d:1 "조직적인 선전 운동이 [SCOPE.sCountry('war_stuff_home').GetName] 전역에 퍼져 애국의 열기를 돋우고 싸움을 계속하려는 민심을 다잡았다."
 war_stuff.5.f:1 "\"모든 벽에 징병 포스터가 붙었습니다! 아이들조차 줄넘기를 하며 행진곡을 부릅니다. 온 나라가 오직 승리만을 향해 뛰고 있습니다.\""
 war_stuff.5.a:0 "우리 국민은 대의 뒤에 단결했다!"

 war_stuff.6.t:0 "[SCOPE.sState('war_stuff_state').GetName]의 인종주의"
 war_stuff.6.d:1 "[SCOPE.sState('war_stuff_state').GetName]의 [SCOPE.sCountry('war_stuff_home').GetName] 시민들이 진행 중인 전쟁의 책임을 돌리며 [SCOPE.sCulture('war_stuff_culture').GetName] 혈통의 이웃들을 폭력적으로 공격하고 있다."
 war_stuff.6.f:1 "\"'집으로 돌아가!' 그들은 그렇게 외쳤다...\""
 war_stuff.6.a:0 "사람들이 의로운 분노를 토해내게 하라."
 war_stuff.6.b:0 "출신과 관계없이 모든 시민을 보호하라."

 war_stuff.7.t:0 "통합의 부름"
 war_stuff.7.d:1 "[SCOPE.sCountry('war_stuff_enemy').GetName]의 대표단이 공통 문화와 역사적 유대를 들어 [SCOPE.sCountry('war_stuff_home').GetName]으로의 자발적 합병을 제안하며 도착했다."
 war_stuff.7.f:1 "\"제 할아버지는 우리를 갈라놓기 위해 싸웠지만, 제 학생들은 이제 당신들의 찬가를 부르며 행진합니다. 역사의 수레바퀴가 도는군요...\""
 war_stuff.7.a:0 "형제들을 [SCOPE.sCountry('war_stuff_home').GetNameNoFlag]에 맞이하라!"
 war_stuff.7.b:0 "우리는 [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] 독립을 존중한다."

 war_stuff.8.t:0 "합병의 파문"
 war_stuff.8.d:1 "[SCOPE.sCountry('war_stuff_home').GetName]이 외교적 합병으로 [SCOPE.sCountry('war_stuff_enemy').GetName]을 흡수해 유럽의 세력 균형을 뒤흔들었다는 소식이 [SCOPE.GetRootScope.GetCountry.GetName]에 전해졌다."
 war_stuff.8.f:1 "\"처음에는 오스트리아인들을 찾아왔다...\""
 war_stuff.8.a:0 "우리가 인정해야 할 기정사실이다."

 war_stuff.9.t:0 "현상 유지 평화 제안: [SCOPE.sCountry('war_stuff_enemy').GetName]"
 war_stuff.9.d:1 "[SCOPE.sWar('war_stuff_war').GetName]에 활성화된 육상 전선이 없으므로, 군사 고문들은 [SCOPE.sCountry('war_stuff_enemy').GetName] 측과 현상 유지 평화를 모색할 것을 권고한다. 이는 영토 변경 없이 분쟁을 끝내고, 교착된 전쟁에서 우리 군과 국고의 추가 소모를 막을 것이다."
 war_stuff.9.f:1 ""
 war_stuff.9.a:0 "평화 조건을 담은 사절을 파견하라."
 war_stuff.9.b:0 "교착에도 불구하고 전쟁을 계속하라."

 war_stuff.10.t:0 "[SCOPE.sCountry('war_stuff_home').GetName]의 평화 타진"
 war_stuff.10.d:1 "[SCOPE.sCountry('war_stuff_home').GetAdjective] 사령부에서 온 외교 전령이 [SCOPE.sWar('war_stuff_war').GetName]을 전쟁 전 국경으로 되돌려 끝내자는 공식 제안을 가져왔다. 그들의 메시지는 전략적 교착을 인정하고 모든 적대 행위 중단을 제안한다."
 war_stuff.10.f:1 ""
 war_stuff.10.a:0 "그들의 제안을 받아들여라."
 war_stuff.10.b:0 "그들의 타진을 거부하라."

 war_stuff.11.t:0 "지친 자들의 반란"
 war_stuff.11.d:1 "참호는 공동묘지가 되었고 병사들은 한계에 이르렀다. [SCOPE.sFront('war_stuff_front').GetName]의 보고에 따르면 전 연대가 착검을 거부하고 있다. 그들은 적의 진격에는 전선을 지키겠지만, 자신들의 생명의 가치를 잊은 듯한 정부를 위해 더 이상 '자살적' 공세에는 참여하지 않겠다고 한다."
 war_stuff.11.f:1 "\"우리는 조국을 향해 공격하지 않을 것이다. 하지만 거짓을 위해 죽지도 않을 것이다. 장군들이 그 언덕을 원한다면 직접 가져가라.\""
 war_stuff.11.a:0 "총살대로 질서를 회복하라."
 war_stuff.11.b:0 "그들의 불만을 듣고 배급을 개선하라."

 war_stuff.12.t:0 "군수품 스캔들"
 war_stuff.12.d:1 "국가적 수치가 드러났다. 전선의 병사들에게 불량 포탄이 지급되고 있으며, 더 나쁘게는 아무것도 지급되지 않는 경우도 있다. 용감한 병사들이 적의 포화를 마주하는 동안, 국내 공장들은 비효율과 치솟는 비용에 빠져 있다. 언론은 가장 필요한 때에 왜 '[SCOPE.GetRootScope.GetCountry.GetName]의 병기창'이 침묵하는지 묻고 있다."
 war_stuff.12.f:1 "\"총알 없는 병사는 표적일 뿐이다. 소총이 빈 방아쇠 소리만 내는 사이 산업이 이익을 챙긴다면 중대한 죄다.\""
 war_stuff.12.a:0 "그래도 생산을 강제하라."
 war_stuff.12.b:0 "품질과 보급선의 건전성을 우선하라."

 war_stuff.13.t:0 "[SCOPE.sCharacter('war_stuff_general_offensive').GetLastName] 계획"
 war_stuff.13.d:1 "총사령부의 지도는 몇 달째 변하지 않았다. [SCOPE.sFront('war_stuff_front').GetName]에서는 아침에 얻은 땅이 밤이면 되돌아간다. [SCOPE.sCharacter('war_stuff_general_offensive').GetFullName]은 작전 지도 더미와 음울한 결의를 들고 전선에서 돌아왔다. 충분한 결의와 '마지막 대공세'만 있다면 [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] 전선을 깨고 전쟁을 다시 움직일 수 있다고 그는 주장한다."
 war_stuff.13.f:1 "\"병사들은 지쳤습니다. 그렇지만 진흙 속에서 죽기를 기다리는 것에는 더 지쳤습니다. 포탄만 주십시오. [SCOPE.sCountry('war_stuff_enemy').GetNameNoFormatting]을 단번에 무너뜨리겠습니다.\""
 war_stuff.13.a:0 "[SCOPE.sCharacter('war_stuff_general_offensive').GetLastName] 공세를 시작하라."
 war_stuff.13.b:0 "계획을 거부하고 방어를 유지하라."

 war_stuff.14.t:0 "해방 구상"
 war_stuff.14.d:1 "[SCOPE.sFront('war_stuff_front').GetName]의 전선은 정체되었고, 우리 동포들은 [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] 점령 아래 고통받고 있다. [SCOPE.sCharacter('war_stuff_general_liberation').GetFullName]은 전쟁부에 대담한 작전 계획을 제출했다. 병력을 집중하고 고향을 되찾고자 하는 병사들의 열망에 호소하면 [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] 전선을 깰 수 있다고 그는 주장한다."
 war_stuff.14.f:1 "\"우리가 하루를 미룰 때마다 [SCOPE.sState('war_stuff_liberation_state').GetNameNoFormatting]의 형제들은 하루 더 고통받습니다. 명령만 내려주십시오. [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFormatting] 위협을 국경 밖으로 몰아내겠습니다.\""
 war_stuff.14.a:0 "[SCOPE.sCharacter('war_stuff_general_liberation').GetLastName] 공세를 승인하라."
 war_stuff.14.b:0 "방어 태세를 유지하라."

 waddle_modifier_brutal_discipline:0 "잔혹한 규율"
 
 waddle_modifier_war_concessions:0 "전선 양보"
 
 waddle_modifier_industrial_seizure:0 "불량 군수품 생산"
 
 waddle_modifier_careful_supply:0 "품질 보급 감독"

 waddle_modifier_desperate_offensive:0 "대공세"
 
 waddle_modifier_trench_attrition:0 "참호 교착"

 waddle_modifier_liberation_drive:0 "해방 추진"

 war_stuff.15.t: "징병 위기"
 war_stuff.15.d: "전쟁이 길어지면서 새로운 징집은 공개적 저항에 부딪히고 있다. 지방 관리들은 탈영, 숨겨진 아들들, 또 한 차례 남자를 내놓기 거부하는 마을들을 보고한다."
 war_stuff.15.f: "\"국가가 아직 배고프다면 다른 식탁에서 먹게 하라.\""
 war_stuff.15.a: "할당량은 채워져야 한다."
 war_stuff.15.b: "제한적 면제를 허용하라."
 war_stuff.16.t: "[SCOPE.sState('war_stuff_refugee_state').GetName]의 피난민"
 war_stuff.16.d: "[SCOPE.sState('war_stuff_refugee_state').GetName]의 전투로 민간인들이 집을 떠났다. [SCOPE.sFront('war_stuff_front').GetName] 뒤편의 도로, 역, 교회는 포화를 피해 도망친 사람들로 붐빈다."
 war_stuff.16.f: "그들은 들 수 있는 것을 가져왔다. 나머지는 연기에 남겨졌다."
 war_stuff.16.a: "피신처를 마련하라."
 war_stuff.16.b: "군대가 우선권을 가진다."
 war_stuff.17.t: "잔혹 행위 보고"
 war_stuff.17.d: "우리 군의 약탈, 보복, 살해에 대한 보고가 해외에 퍼지기 시작했다. 관리들은 이야기가 과장되었다고 주장하지만, [SCOPE.sCountry('war_stuff_enemy').GetName]의 적대적 신문들은 이미 머리기사를 찾았다."
 war_stuff.17.f: "전쟁에서 진실은 늦게, 초라한 차림으로, 적들과 함께 도착한다."
 war_stuff.17.a: "이 중상을 부인하라."
 war_stuff.17.b: "죄인들을 본보기로 삼아라."
 war_stuff.18.t: "[SCOPE.sFront('war_stuff_front').GetName]의 사적 교류"
 war_stuff.18.d: "[SCOPE.sFront('war_stuff_front').GetName]에서 몇 달째 이어진 교착은 마주한 참호 사이에 이상한 친숙함을 낳았다. 장교들은 교환되는 담배, 외쳐지는 농담, 명령 없이는 쏘려 하지 않는 우려스러운 태도를 보고한다."
 war_stuff.18.f: "\"저쪽에 있는 것은 악마가 아니다,\" 한 사병이 썼다. \"우리 같은 불쌍한 사람들일 뿐이다.\""
 war_stuff.18.a: "병사들에게 그 잠깐의 평온을 허락하라."
 war_stuff.18.b: "규율을 회복해야 한다."
 war_stuff.19.t: "[SCOPE.sFront('war_stuff_front').GetName] 돌파"
 war_stuff.19.d: "[SCOPE.sFront('war_stuff_front').GetName]의 공세가 돌파에 성공했다. [SCOPE.sCharacter('war_stuff_general').GetFullName]의 전문은 버려진 적 진지, 이동 중인 예비대, 포화 너머 열리는 길을 말한다."
 war_stuff.19.f: "이번만큼은 지도가 사상자 명단보다 빨리 움직였다."
 war_stuff.19.a: "우위를 밀어붙여라."
 war_stuff.20.t: "[SCOPE.sFront('war_stuff_front').GetName] 공세 실패"
 war_stuff.20.d: "[SCOPE.sFront('war_stuff_front').GetName]에서 약속된 돌파는 오지 않았다. 군대는 몇 개의 폐허가 된 들판을 위해 값비싼 대가를 치렀고, 대중은 이제 누가 이런 희생을 명령했는지 묻고 있다."
 war_stuff.20.f: "참모들은 압박, 기세, 결의를 말했다. 병사들은 진흙을 말했다."
 war_stuff.20.a: "장군들이 이에 답해야 한다."
 war_stuff.20.b: "한 번 더 밀어붙여라."
 war_stuff.21.t: "[SCOPE.sFront('war_stuff_front').GetName] 해방"
 war_stuff.21.d: "우리 군은 [SCOPE.sFront('war_stuff_front').GetName]의 점령지를 구원하여 적이 전리품으로 삼은 땅에서 밀어냈다. 군중은 귀환한 병사들을 환호하며 전쟁이 아직 승리할 수 있다는 증거로 삼는다."
 war_stuff.21.f: "처음 올라간 깃발은 작고 찢어졌지만 충분했다."
 war_stuff.21.a: "종을 울려라."
 war_stuff.22.t: "[SCOPE.sFront('war_stuff_front').GetName] 해방 좌절"
 war_stuff.22.d: "[SCOPE.sFront('war_stuff_front').GetName]의 점령지를 해방하려던 시도는 실패했다. 여전히 적의 지배 아래 있는 이들은 헛되이 기다리고, 나머지 국가는 또 다른 실패의 비용을 헤아린다."
 war_stuff.22.f: "그들은 우리의 포성을 들으라고 들었다. 겨울이 되자 그들이 들은 것은 문 앞의 군홧소리뿐이었다."
 war_stuff.22.a: "우리는 견뎌야 한다."
 war_stuff.23.t: "[SCOPE.sFront('war_stuff_front').GetName]을 위한 소총"
 war_stuff.23.d: "군대의 소총과 예비 부품 수요가 시장을 압박했다. [SCOPE.sCharacter('war_stuff_general').GetFullName]은 [SCOPE.sFront('war_stuff_front').GetName]의 부대가 오래된 무기, 빠진 부품, 또는 아무것도 없이 전선에 도착할 수 있다고 경고한다."
 war_stuff.23.f: "병사는 굶주린 채 행군할 수 있다. 그러나 빈손으로 전선을 지킬 수는 없다."
 war_stuff.23.a: "비축분을 압수하라."
 war_stuff.23.b: "남은 것을 배급하라."
 war_stuff.24.t: "[SCOPE.sFront('war_stuff_front').GetName]을 위한 포병"
 war_stuff.24.d: "포병 부족으로 군은 포격을 신중히 골라야 한다. [SCOPE.sFront('war_stuff_front').GetName]의 지휘관들은 공장과 창고가 제공할 수 있는 것보다 더 많은 포탄을 요구한다."
 war_stuff.24.f: "병사들은 연설을 요구하지 않았다. 그들은 우리 포가 언제 응답하느냐고 물었다."
 war_stuff.24.a: "포에 탄약을 대라."
 war_stuff.24.b: "포탄을 아껴라."
 war_stuff.25.t: "폭약 부족"
 war_stuff.25.d: "폭약 부족이 이제 포탄, 지뢰, 군수 생산을 위협한다. 군은 화학 공장에 대한 비상 권한을 요구하고, 산업가들은 심각한 혼란을 경고한다."
 war_stuff.25.f: "모든 청구서가 이제 생사의 무게를 띠었다."
 war_stuff.25.a: "공장을 징발하라."
 war_stuff.25.b: "결정적 순간을 위해 화약을 아껴라."
 war_stuff.26.t: "[SCOPE.sCountry('war_stuff_enemy').GetName]의 포로들"
 war_stuff.26.d: "[SCOPE.sFront('war_stuff_front').GetName]에서 [SCOPE.sCountry('war_stuff_enemy').GetName]을 상대로 거둔 최근 성공은 우리에게 적 포로의 행렬을 남겼다. 그들의 처우는 우리 병사, 적, 그리고 이 전쟁의 성격을 아직 저울질하는 정부들이 지켜볼 것이다."
 war_stuff.26.f: "승리는 전장에서 끝나지 않았다. 감시 속에서도 계속 걸어갔다."
 war_stuff.26.a: "명예롭게 대우하라."
 war_stuff.26.b: "일하게 하라."
 war_stuff.26.c: "교환을 마련하라."
 waddle_modifier_forced_conscription: "강제 징병"
 waddle_modifier_forced_conscription_desc: "징병 할당량은 커지는 지역 저항에도 집행되고 있다."
 waddle_modifier_conscription_exemptions: "징병 면제"
 waddle_modifier_conscription_exemptions_desc: "제한적 면제는 군사 준비 태세를 희생하여 소요를 완화했다."
 waddle_modifier_refugee_relief: "피난민 구호"
 waddle_modifier_refugee_relief_desc: "국가는 전선으로 쫓겨난 민간인을 위한 구호를 조직하고 있다."
 waddle_modifier_wartime_censorship: "전시 검열"
 waddle_modifier_wartime_censorship_desc: "전쟁에 대한 보고가 질서의 이름으로 억압되고 있다."
 waddle_modifier_frontline_fraternization: "전선의 사적 교류"
 waddle_modifier_frontline_fraternization_desc: "적과의 비공식 접촉이 전선의 규율을 느슨하게 했다."
 waddle_modifier_breakthrough_momentum: "돌파의 기세"
 waddle_modifier_breakthrough_momentum_desc: "성공적인 공세가 군에 대한 신뢰를 회복했다."
 waddle_modifier_offensive_exhaustion: "공세 피로"
 waddle_modifier_offensive_exhaustion_desc: "실패한 공격은 군을 흔들고 대중을 불안하게 했다."
 waddle_modifier_victorious_liberation: "승리의 해방"
 waddle_modifier_victorious_liberation_desc: "점령지가 구원되어 전국의 사기가 올랐다."
 waddle_modifier_shattered_liberation_drive: "꺾인 해방 추진"
 waddle_modifier_shattered_liberation_drive_desc: "실패한 해방 시도는 점령지의 절망을 깊게 했다."
 waddle_modifier_small_arms_seizure: "압수된 소화기"
 waddle_modifier_small_arms_seizure_desc: "민간 및 상업 무기 비축분이 군사 용도로 압수되었다."
 waddle_modifier_small_arms_rationing: "배급 소총"
 waddle_modifier_small_arms_rationing_desc: "소총과 예비 부품이 군 전반에 배급되고 있다."
 waddle_modifier_artillery_priority: "포병 우선"
 waddle_modifier_artillery_priority_desc: "산업과 운송이 포의 필요에 맞춰지고 있다."
 waddle_modifier_artillery_conservation: "포탄 절약"
 waddle_modifier_artillery_conservation_desc: "포병 탄약이 가장 필요한 행동을 위해 보존되고 있다."
 waddle_modifier_explosives_seizure: "압수된 화학 공장"
 waddle_modifier_explosives_seizure_desc: "폭약 생산이 전시 통제 아래 놓였다."
 waddle_modifier_powder_conservation: "화약 절약"
 waddle_modifier_powder_conservation_desc: "폭약은 결정적 작전을 위해 비축되고 있다."
 waddle_modifier_pow_labor: "포로 노동"
 waddle_modifier_pow_labor_desc: "적 포로들이 전쟁 경제를 지원하는 데 사용되고 있다."
