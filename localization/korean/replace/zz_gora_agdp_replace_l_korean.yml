l_korean:
  RADICALS_TOOLTIP:1 "#tooltip_header $RADICALS$#!\n[Country.GetName]의 총인구 #v [Country.GetTotalPopulation|D]#! 중 #v [Country.GetNumRadicals|D]#!명이 $RADICALS$입니다 ([Country.MakeScope.ScriptValue('larp_radicals_percent')|%v1])\n$TOOLTIP_DELIMITER$\n[Country.GetRadicalsLoyalistsChangeStartDate|v] 이후 $RADICALS$ 수는 #v #tooltippable #tooltip:[Country.GetTooltipTag],RADICALS_CHANGE_TOOLTIP [Country.GetTotalNumRadicalsChange|D=-]#!#!#! 만큼 변했습니다.\n가장 큰 영향을 준 요인은 [Country.GetRadicalsChangeSummary]입니다\n\n[Country.GetRadicalsSummaryDesc][ConcatIfNeitherEmpty('\n\n',SelectLocalization( GreaterThan_int32(Country.CalcNumStatesInTurmoil, '(int32)0'), 'STATES_IN_TURMOIL', '' ))][ConcatIfNeitherEmpty('\n\n',SelectLocalization( Country.HasIGApprovalFromRadicals, 'RADICALS_IG_APPROVAL', '' ))]"
  LOYALISTS_TOOLTIP:1 "#tooltip_header $LOYALISTS$#!\n[Country.GetName]의 총인구 #v [Country.GetTotalPopulation|D]#! 중 #v [Country.GetNumLoyalists|D]#!명이 $LOYALISTS$입니다 ([Country.MakeScope.ScriptValue('larp_loyalists_percent')|%v1])\n$TOOLTIP_DELIMITER$\n[Country.GetRadicalsLoyalistsChangeStartDate|v] 이후 $LOYALISTS$ 수는 #v #tooltippable #tooltip:[Country.GetTooltipTag],LOYALISTS_CHANGE_TOOLTIP [Country.GetTotalNumLoyalistsChange|D=+]#!#!#! 만큼 변했습니다\n가장 큰 영향을 준 요인은 [Country.GetLoyalistsChangeSummary]입니다\n\n[Country.GetLoyalistsSummaryDesc][ConcatIfNeitherEmpty('\n\n',SelectLocalization( Country.HasIGApprovalFromLoyalists, 'LOYALISTS_IG_APPROVAL', '' ))]"
  NEUTRALS_TOOLTIP:1 "#tooltip_header $NEUTRALS$#!\n[Country.GetName]의 총인구 #v [Country.GetTotalPopulation|*2]#! 중 #v [Country.GetNumNeutrals|*2]#!명이 $NEUTRALS$입니다 ([Country.MakeScope.ScriptValue('larp_neutrals_percent')|%v1])"
  POP_TOOLTIP:2 "#tooltip_header [Concept('concept_pop','$concept_population$')]#!\n현재: [Country.GetTotalPopulation|*2v] ([Country.GetPopulationRanking])\n[Country.GetPopGrowthDesc]$POP_TOOLTIP_DELAYED$\n$TOOLTIP_DELIMITER$\n[Country.GetAdjective] 인구는 세계 인구의 [Country.MakeScope.ScriptValue('larp_global_pop_percent')|%v1]입니다\n세계 인구: [Country.MakeScope.ScriptValue('larp_global_pop')|*2v]"
  GDP_TOOLTIP:1 "#header [Country.GetAdjective] [concept_gdp]#! \n@money![Country.GetGDP|Dv] (#u #tooltippable #tooltip:[Country.GetTooltipTag],COUNTRY_GDP_OWNERSHIP_TOOLTIP [Country.GetDomesticallyOwnedGDPFraction|%1b]#!#!#!) 국내 소유 $concept_gdp_short$ ([Country.GetGDPRanking])\n@money![Country.GetGDPPerCapita|2*v] [Concept('concept_gdp_per_capita', '$concept_gdp_per_capita_short$')] ([Country.GetGDPPerCapitaRanking])\n$GDPGR_growth_text$\n$TOOLTIP_DELIMITER$\n[Country.GetAdjective] $concept_gdp_short$는 전 세계 GDP의 [Country.MakeScope.ScriptValue('larp_global_gdp_percent')|%v2]를 차지합니다\n전 세계 GDP: @money![Country.MakeScope.ScriptValue('larp_global_gdp')|Dv]"
  CURRENT_GDP_STATE:2 "#header [State.GetOwner.GetAdjectiveNoFormatting]의 [State.GetName] [concept_gdp]#!\n$TOOLTIP_DELIMITER$\n현재 연간 GDP 기여도: #variable @money![State.GetGDPContribution|K]#!\n[State.GetName]의 1인당 GDP: #variable @money![State.MakeScope.ScriptValue('get_state_gdp_per')|Dv]#!\n[State.GetName]과 [State.GetOwner.GetAdjectiveNoFormatting]의 1인당 GDP 격차: #variable @money![State.MakeScope.ScriptValue('get_country_state_relative_value')|D2+=]#!\n[State.GetName]과 세계 평균의 1인당 GDP 격차: #variable @money![State.MakeScope.ScriptValue('get_global_state_relative_value')|D2+=]#!\n[State.GetName]은 [State.GetOwner.GetAdjectiveNoFormatting] $GDP_SHORT$의 #variable [State.GetGDPContributionPercentage|%1]#!를 기여합니다\n\n[State.GetGDPGoodsContributionBreakdown]"
