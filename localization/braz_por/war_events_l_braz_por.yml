l_braz_por:
 war_stuff.1.t:0 "Ocupação de [SCOPE.sCountry('war_stuff_enemy').GetCapital.GetCityHubName]"
 war_stuff.1.d:1 "Nossos exércitos vitoriosos ocupam agora o próprio coração de [SCOPE.sCountry('war_stuff_enemy').GetName]. O trato dado à capital conquistada ecoará pela história e pesará sobre nossa legitimidade e sobre a vontade inimiga de resistir."
 war_stuff.1.f:1 "\"Essas pessoas sabem que seu destino depende da nossa misericórdia.\""
 war_stuff.1.a:0 "Manter a ordem e respeitar as instituições."
 war_stuff.1.b:0 "Deixar as tropas tomarem o que lhes é devido."

 war_stuff.2.t:0 "Ocupação de [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]"
 war_stuff.2.d:1 "Para nosso espanto, as forças ocupantes [SCOPE.sCountry('war_stuff_enemy').GetAdjective] mantiveram a ordem e respeitaram nossas instituições apesar de sua vitória."
 war_stuff.2.f:1 "\"Os invasores patrulhavam os mercados sem saquear; eu até vi um deles devolver uma bolsa caída no chão! Quem conquista com tanta... civilidade?\""
 war_stuff.2.a:0 "Tomamos nota dessa contenção."
 war_stuff.3.t:0 "Saque de [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]"
 war_stuff.3.d:1 "As tropas [SCOPE.sCountry('war_stuff_enemy').GetAdjective] reduziram [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] a ruínas fumegantes, saqueando nossos tesouros nacionais e profanando nossa herança."
 war_stuff.3.f:1 "\"Séculos de conhecimento viraram cinzas. Eles até derreteram as estátuas para vender o metal!\""
 war_stuff.3.a:0 "Eles pagarão por essa barbárie!"

 war_stuff.4.t:0 "Agitação em [SCOPE.sState('war_stuff_state').GetName]"
 war_stuff.4.d:1 "Surtos de violência eclodiram por toda [SCOPE.sState('war_stuff_state').GetName] enquanto as populações ocupadas resistem à nossa autoridade. As ruas correm vermelhas de desafio; devemos escolher nossa resposta imediatamente."
 war_stuff.4.f:1 "\"Eles estão arremessando paralelepípedos arrancados das próprias ruas que pavimentamos! Meu tenente perguntou se deveríamos atirar de volta. O que quer que eu diga a ele?\""
 war_stuff.4.a:0 "Esmagar esta rebelião com força máxima."
 war_stuff.4.b:0 "Retirar as patrulhas e deixar as tensões esfriarem."

 war_stuff.5.t:0 "Os Tambores da Guerra"
 war_stuff.5.d:1 "Uma campanha coordenada de propaganda se espalhou por [SCOPE.sCountry('war_stuff_home').GetName], atiçando o fervor patriótico e firmando a disposição pública de continuar a luta."
 war_stuff.5.f:1 "\"Cada parede agora ostenta cartazes de recrutamento! Até as crianças cantam marchas enquanto pulam corda. O coração da nação bate apenas pela vitória.\""
 war_stuff.5.a:0 "Nosso povo está unido por trás da causa!"

 war_stuff.6.t:0 "Racismo em [SCOPE.sState('war_stuff_state').GetName]"
 war_stuff.6.d:1 "Cidadãos de [SCOPE.sCountry('war_stuff_home').GetName] em [SCOPE.sState('war_stuff_state').GetName] estão atacando violentamente vizinhos de origem [SCOPE.sCulture('war_stuff_culture').GetName], culpando-os pela guerra em curso."
 war_stuff.6.f:1 "\"'Voltem para casa!', eles gritavam...\""
 war_stuff.6.a:0 "Deixar o povo descarregar sua justa ira."
 war_stuff.6.b:0 "Proteger todos os cidadãos, independentemente da origem."

 war_stuff.7.t:0 "O Chamado da Unidade"
 war_stuff.7.d:1 "Delegações de [SCOPE.sCountry('war_stuff_enemy').GetName] chegaram propondo anexação voluntária a [SCOPE.sCountry('war_stuff_home').GetName], citando cultura comum e laços históricos."
 war_stuff.7.f:1 "\"Meu avô lutou para nos separar, mas meus alunos agora marcham cantando seus hinos. A roda da história gira...\""
 war_stuff.7.a:0 "Receber nossos irmãos em [SCOPE.sCountry('war_stuff_home').GetNameNoFlag]!"
 war_stuff.7.b:0 "Respeitamos a independência [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]."

 war_stuff.8.t:0 "Ondas da Anexação"
 war_stuff.8.d:1 "Chega a [SCOPE.GetRootScope.GetCountry.GetName] a notícia de que [SCOPE.sCountry('war_stuff_home').GetName] absorveu [SCOPE.sCountry('war_stuff_enemy').GetName] por anexação diplomática, abalando o equilíbrio de poder europeu."
 war_stuff.8.f:1 "\"Primeiro vieram pelos austríacos...\""
 war_stuff.8.a:0 "Um fato consumado que devemos reconhecer."

 war_stuff.9.t:0 "Propor Paz Branca a [SCOPE.sCountry('war_stuff_enemy').GetName]"
 war_stuff.9.d:1 "Sem frentes terrestres ativas na [SCOPE.sWar('war_stuff_war').GetName], nossos conselheiros militares recomendam buscar uma paz branca com [SCOPE.sCountry('war_stuff_enemy').GetName]. Isso encerraria o conflito sem mudanças territoriais, preservando nossas forças e nosso tesouro de maior desgaste em uma guerra estagnada."
 war_stuff.9.f:1 ""
 war_stuff.9.a:0 "Enviar emissários com termos de paz."
 war_stuff.9.b:0 "Continuar a guerra apesar do impasse."

 war_stuff.10.t:0 "Proposta de Paz de [SCOPE.sCountry('war_stuff_home').GetName]"
 war_stuff.10.d:1 "Mensageiros diplomáticos chegam do quartel-general [SCOPE.sCountry('war_stuff_home').GetAdjective] trazendo uma proposta formal para encerrar a [SCOPE.sWar('war_stuff_war').GetName] com retorno às fronteiras de antes da guerra. A mensagem reconhece o impasse estratégico e oferece a cessação de todas as hostilidades."
 war_stuff.10.f:1 ""
 war_stuff.10.a:0 "Aceitar a proposta."
 war_stuff.10.b:0 "Rejeitar a abertura."

 war_stuff.11.t:0 "O Motim dos Exaustos"
 war_stuff.11.d:1 "As trincheiras se tornaram um cemitério, e os homens chegaram ao limite. Relatórios da [SCOPE.sFront('war_stuff_front').GetName] descrevem regimentos inteiros recusando-se a calar baionetas. Dizem que manterão a linha contra um avanço inimigo, mas não participarão mais de ofensivas 'suicidas' por um governo que parece ter esquecido o valor de suas vidas."
 war_stuff.11.f:1 "\"Não atacaremos a pátria, mas não morreremos por uma mentira. Se os generais querem aquela colina, que a tomem eles mesmos.\""
 war_stuff.11.a:0 "Restaurar a ordem com o pelotão de fuzilamento."
 war_stuff.11.b:0 "Atender às queixas e melhorar as rações."

 war_stuff.12.t:0 "O Escândalo das Munições"
 war_stuff.12.d:1 "Uma vergonha nacional veio à tona: nossos soldados na frente recebem projéteis defeituosos; ou pior, nenhum. Enquanto nossos bravos homens enfrentam o fogo inimigo, as fábricas em casa atolam em ineficiência e custos crescentes. A imprensa exige saber por que o 'Arsenal de [SCOPE.GetRootScope.GetCountry.GetName]' silencia em nossa hora de necessidade."
 war_stuff.12.f:1 "\"Um soldado sem bala não passa de alvo. É crime grave que nossa indústria lucre enquanto nossos rifles estalam vazios.\""
 war_stuff.12.a:0 "Forçar a produção mesmo assim."
 war_stuff.12.b:0 "Priorizar qualidade e integridade das linhas de suprimento."

 war_stuff.13.t:0 "O Plano [SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]"
 war_stuff.13.d:1 "Os mapas no Estado-Maior não mudam há meses. Na [SCOPE.sFront('war_stuff_front').GetName], cada palmo de terra ganho pela manhã é retomado ao anoitecer. [SCOPE.sCharacter('war_stuff_general_offensive').GetFullName] chegou da frente com uma pilha de mapas operacionais e sombria determinação. Ele insiste que, com coragem suficiente e 'uma última grande ofensiva', pode romper as linhas [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] e devolver movimento à guerra."
 war_stuff.13.f:1 "\"Os homens estão cansados, sim, mas estão ainda mais cansados de esperar a morte na lama. Dê-me os projéteis, e eu quebrarei [SCOPE.sCountry('war_stuff_enemy').GetNameNoFormatting] de uma vez por todas.\""
 war_stuff.13.a:0 "Iniciar a Ofensiva [SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]."
 war_stuff.13.b:0 "Rejeitar o plano e manter nossas defesas."

 war_stuff.14.t:0 "A Iniciativa de Libertação"
 war_stuff.14.d:1 "As linhas na [SCOPE.sFront('war_stuff_front').GetName] estagnaram, deixando nossos próprios compatriotas padecer sob ocupação [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]. [SCOPE.sCharacter('war_stuff_general_liberation').GetFullName] apresentou ao Ministério da Guerra um ousado plano operacional. Ele argumenta que, concentrando nossas tropas e apelando ao desejo dos homens de recuperar seus lares, podemos romper as linhas [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag]."
 war_stuff.14.f:1 "\"Cada dia de atraso é mais um dia de sofrimento para nossos irmãos em [SCOPE.sState('war_stuff_liberation_state').GetNameNoFormatting]. Dê a ordem, e empurraremos a ameaça [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFormatting] de volta para além da fronteira.\""
 war_stuff.14.a:0 "Autorizar a Ofensiva [SCOPE.sCharacter('war_stuff_general_liberation').GetLastName]."
 war_stuff.14.b:0 "Manter uma postura defensiva."

 waddle_modifier_brutal_discipline:0 "Disciplina Brutal"
 
 waddle_modifier_war_concessions:0 "Concessões na Frente"
 
 waddle_modifier_industrial_seizure:0 "Produção de Munições Defeituosas"
 
 waddle_modifier_careful_supply:0 "Supervisão de Suprimento de Qualidade"

 waddle_modifier_desperate_offensive:0 "A Grande Ofensiva"
 
 waddle_modifier_trench_attrition:0 "Impasse nas Trincheiras"

 waddle_modifier_liberation_drive:0 "Ímpeto de Libertação"

 war_stuff.15.t: "Crise de Conscrição"
 war_stuff.15.d: "À medida que a guerra se arrasta, novos recrutamentos encontram resistência aberta. Autoridades locais relatam deserções, filhos escondidos e aldeias que se recusam a fornecer mais uma leva de homens."
 war_stuff.15.f: "\"Se o Estado ainda tem fome, que coma em outra mesa.\""
 war_stuff.15.a: "As cotas devem ser cumpridas."
 war_stuff.15.b: "Conceder isenções limitadas."
 war_stuff.16.t: "Refugiados de [SCOPE.sState('war_stuff_refugee_state').GetName]"
 war_stuff.16.d: "Os combates em [SCOPE.sState('war_stuff_refugee_state').GetName] expulsaram civis de suas casas. Estradas, estações e igrejas atrás da [SCOPE.sFront('war_stuff_front').GetName] estão lotadas de pessoas fugindo dos canhões."
 war_stuff.16.f: "Trouxeram o que podiam carregar. O resto ficou para a fumaça."
 war_stuff.16.a: "Providenciem abrigo para eles."
 war_stuff.16.b: "O exército tem prioridade."
 war_stuff.17.t: "Relatos de Atrocidades"
 war_stuff.17.d: "Relatos de saques, represálias e assassinatos cometidos por nossas tropas começaram a circular no exterior. Autoridades insistem que as histórias são exageradas, mas jornais hostis em [SCOPE.sCountry('war_stuff_enemy').GetName] já encontraram sua manchete."
 war_stuff.17.f: "Na guerra, a verdade chega tarde, malvestida e acompanhada de inimigos."
 war_stuff.17.a: "Negar essas calúnias."
 war_stuff.17.b: "Fazer dos culpados um exemplo."
 war_stuff.18.t: "Confraternização na [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.18.d: "Meses de impasse na [SCOPE.sFront('war_stuff_front').GetName] criaram uma estranha familiaridade entre trincheiras opostas. Oficiais relatam cigarros trocados, piadas gritadas e uma relutância preocupante em atirar sem ordens."
 war_stuff.18.f: "\"Eles não são demônios lá do outro lado\", escreveu um soldado, \"são apenas pobres diabos como nós.\""
 war_stuff.18.a: "Concedam aos homens essa trégua."
 war_stuff.18.b: "A disciplina deve ser restaurada."
 war_stuff.19.t: "Ruptura na [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.19.d: "A ofensiva na [SCOPE.sFront('war_stuff_front').GetName] rompeu as linhas. Despachos de [SCOPE.sCharacter('war_stuff_general').GetFullName] falam de posições inimigas abandonadas, reservas em movimento e estradas se abrindo além dos canhões."
 war_stuff.19.f: "Pela primeira vez, o mapa avançou mais rápido que as listas de baixas."
 war_stuff.19.a: "Aproveitar a vantagem."
 war_stuff.20.t: "Ofensiva Falha na [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.20.d: "A ruptura prometida na [SCOPE.sFront('war_stuff_front').GetName] não veio. O exército pagou caro por alguns campos arruinados, e o público agora pergunta quem ordenou tal sacrifício."
 war_stuff.20.f: "O estado-maior falava de pressão, impulso e determinação. Os soldados falavam de lama."
 war_stuff.20.a: "Os generais devem responder por isso."
 war_stuff.20.b: "Mais um ataque."
 war_stuff.21.t: "Libertação na [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.21.d: "Nossas forças libertaram território ocupado na [SCOPE.sFront('war_stuff_front').GetName], empurrando o inimigo para longe de terras que reivindicava como prêmio. Multidões aclamam os soldados que retornam como prova de que a guerra ainda pode ser vencida."
 war_stuff.21.f: "A primeira bandeira erguida era pequena e rasgada. Bastou."
 war_stuff.21.a: "Que os sinos toquem."
 war_stuff.22.t: "A Libertação Vacila na [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.22.d: "A tentativa de libertar território ocupado na [SCOPE.sFront('war_stuff_front').GetName] fracassou. Aqueles que ainda estão sob controle inimigo esperam em vão, enquanto o resto do país conta o custo de mais um esforço malogrado."
 war_stuff.22.f: "Disseram-lhes para escutar nossos canhões. No inverno, escutavam apenas botas à porta."
 war_stuff.22.a: "Devemos resistir."
 war_stuff.23.t: "Rifles para a [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.23.d: "A demanda do exército por rifles e peças sobressalentes tensionou o mercado. [SCOPE.sCharacter('war_stuff_general').GetFullName] alerta que formações na [SCOPE.sFront('war_stuff_front').GetName] podem chegar à linha com armas antigas, peças faltando ou sem arma alguma."
 war_stuff.23.f: "Um soldado pode marchar com fome. Não pode manter uma linha de mãos vazias."
 war_stuff.23.a: "Confiscar os estoques."
 war_stuff.23.b: "Racionar o que resta."
 war_stuff.24.t: "Artilharia para a [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.24.d: "A escassez de artilharia forçou o exército a escolher seus bombardeios com cuidado. Comandantes na [SCOPE.sFront('war_stuff_front').GetName] pedem mais projéteis do que as fábricas e depósitos podem fornecer."
 war_stuff.24.f: "Os homens não pediram discursos. Perguntaram quando nossos canhões responderiam."
 war_stuff.24.a: "Municiar os canhões."
 war_stuff.24.b: "Conservar os projéteis."
 war_stuff.25.t: "Escassez de Explosivos"
 war_stuff.25.d: "Uma escassez de explosivos agora ameaça projéteis, minas e a produção militar. O exército exige poderes emergenciais sobre as fábricas químicas, enquanto industriais alertam para uma paralisação ruinosa."
 war_stuff.25.f: "Cada fatura passou a pesar como vida ou morte."
 war_stuff.25.a: "Requisitar as fábricas."
 war_stuff.25.b: "Guardar pólvora para a hora decisiva."
 war_stuff.26.t: "Prisioneiros de [SCOPE.sCountry('war_stuff_enemy').GetName]"
 war_stuff.26.d: "Sucessos recentes na [SCOPE.sFront('war_stuff_front').GetName] contra [SCOPE.sCountry('war_stuff_enemy').GetName] nos deixaram com colunas de prisioneiros inimigos. Seu tratamento será observado por nossos soldados, nossos inimigos e os governos que ainda ponderam o caráter desta guerra."
 war_stuff.26.f: "A vitória não terminou no campo de batalha. Seguiu adiante sob guarda."
 war_stuff.26.a: "Tratá-los com honra."
 war_stuff.26.b: "Pô-los para trabalhar."
 war_stuff.26.c: "Organizar uma troca."
 waddle_modifier_forced_conscription: "Conscrição Forçada"
 waddle_modifier_forced_conscription_desc: "As cotas de recrutamento estão sendo aplicadas apesar da crescente resistência local."
 waddle_modifier_conscription_exemptions: "Isenções de Conscrição"
 waddle_modifier_conscription_exemptions_desc: "Isenções limitadas aliviaram a agitação, ao custo da prontidão militar."
 waddle_modifier_refugee_relief: "Assistência a Refugiados"
 waddle_modifier_refugee_relief_desc: "O Estado está organizando ajuda para civis deslocados pela frente."
 waddle_modifier_wartime_censorship: "Censura em Tempo de Guerra"
 waddle_modifier_wartime_censorship_desc: "Relatos da guerra estão sendo suprimidos em nome da ordem."
 waddle_modifier_frontline_fraternization: "Confraternização na Frente"
 waddle_modifier_frontline_fraternization_desc: "O contato informal com o inimigo abrandou a disciplina na frente."
 waddle_modifier_breakthrough_momentum: "Impulso de Ruptura"
 waddle_modifier_breakthrough_momentum_desc: "Uma ofensiva bem-sucedida restaurou a confiança no exército."
 waddle_modifier_offensive_exhaustion: "Exaustão Ofensiva"
 waddle_modifier_offensive_exhaustion_desc: "Um ataque fracassado deixou o exército abalado e o público inquieto."
 waddle_modifier_victorious_liberation: "Libertação Vitoriosa"
 waddle_modifier_victorious_liberation_desc: "Território ocupado foi libertado, elevando o moral em todo o país."
 waddle_modifier_shattered_liberation_drive: "Impulso de Libertação Despedaçado"
 waddle_modifier_shattered_liberation_drive_desc: "Uma tentativa fracassada de libertação aprofundou o desespero em território ocupado."
 waddle_modifier_small_arms_seizure: "Armas Leves Confiscadas"
 waddle_modifier_small_arms_seizure_desc: "Estoques privados e comerciais de armas foram tomados para uso militar."
 waddle_modifier_small_arms_rationing: "Rifles Racionados"
 waddle_modifier_small_arms_rationing_desc: "Rifles e peças sobressalentes estão sendo racionados em todo o exército."
 waddle_modifier_artillery_priority: "Prioridade à Artilharia"
 waddle_modifier_artillery_priority_desc: "A indústria e o transporte estão sendo direcionados para as necessidades da artilharia."
 waddle_modifier_artillery_conservation: "Conservação de Projéteis"
 waddle_modifier_artillery_conservation_desc: "Munição de artilharia está sendo conservada para as ações mais necessárias."
 waddle_modifier_explosives_seizure: "Fábricas Químicas Confiscadas"
 waddle_modifier_explosives_seizure_desc: "A produção de explosivos foi colocada sob controle de guerra."
 waddle_modifier_powder_conservation: "Conservação de Pólvora"
 waddle_modifier_powder_conservation_desc: "Explosivos estão sendo reservados para operações decisivas."
 waddle_modifier_pow_labor: "Trabalho de Prisioneiros"
 waddle_modifier_pow_labor_desc: "Prisioneiros inimigos estão sendo usados para sustentar a economia de guerra."
