 # Martial Law Control - Modifiers
 WADDLE_MARTIAL_LAW_BASE: "#Bold Lei Marcial#! Declarada"
 WADDLE_MARTIAL_LAW_MILITARY_PRESENCE: "Presença de [concept_military_formation] Militar"
 WADDLE_MARTIAL_LAW_BUREAUCRACY: "[Concept('concept_institution', '$concept_institutions$')]"
 WADDLE_MARTIAL_LAW_LOYALISTS: "População [concept_loyalist]"
 WADDLE_MARTIAL_LAW_GOVERNMENT_CLOUT: "[concept_clout] do [concept_government]"
 WADDLE_MARTIAL_LAW_REPRESSIVE_LAWS: "[Concept('concept_law','$concept_laws$')] Repressivas"
 WADDLE_MARTIAL_LAW_TURMOIL: "[concept_turmoil] civil"
 WADDLE_MARTIAL_LAW_RADICALS: "[Concept('concept_pop', '$concept_population$')] [concept_radical]"
 WADDLE_MARTIAL_LAW_LENGTH: "Duração da #Bold Lei Marcial#!"
 WADDLE_MARTIAL_LAW_LITERACY: "[Concept('concept_pop', '$concept_population$')] [Concept('concept_literacy','$concept_literate$')]"
