l_braz_por:
  RADICALS_TOOLTIP:1 "#tooltip_header $RADICALS$#!\nHa #v [Country.GetNumRadicals|D]#! $RADICALS$ na populacao total de #v [Country.GetTotalPopulation|D]#! ([Country.MakeScope.ScriptValue('larp_radicals_percent')|%v1]) em [Country.GetName]\n$TOOLTIP_DELIMITER$\nO numero de $RADICALS$ mudou em #v #tooltippable #tooltip:[Country.GetTooltipTag],RADICALS_CHANGE_TOOLTIP [Country.GetTotalNumRadicalsChange|D=-]#!#!#! desde [Country.GetRadicalsLoyalistsChangeStartDate|v].\nOs fatores mais impactantes sao [Country.GetRadicalsChangeSummary]\n\n[Country.GetRadicalsSummaryDesc][ConcatIfNeitherEmpty('\n\n',SelectLocalization( GreaterThan_int32(Country.CalcNumStatesInTurmoil, '(int32)0'), 'STATES_IN_TURMOIL', '' ))][ConcatIfNeitherEmpty('\n\n',SelectLocalization( Country.HasIGApprovalFromRadicals, 'RADICALS_IG_APPROVAL', '' ))]"
  LOYALISTS_TOOLTIP:1 "#tooltip_header $LOYALISTS$#!\nHa #v [Country.GetNumLoyalists|D]#! $LOYALISTS$ na populacao total de #v [Country.GetTotalPopulation|D]#! ([Country.MakeScope.ScriptValue('larp_loyalists_percent')|%v1]) em [Country.GetName]\n$TOOLTIP_DELIMITER$\nO numero de $LOYALISTS$ mudou em #v #tooltippable #tooltip:[Country.GetTooltipTag],LOYALISTS_CHANGE_TOOLTIP [Country.GetTotalNumLoyalistsChange|D=+]#!#!#! desde [Country.GetRadicalsLoyalistsChangeStartDate|v]\nOs fatores mais impactantes sao [Country.GetLoyalistsChangeSummary]\n\n[Country.GetLoyalistsSummaryDesc][ConcatIfNeitherEmpty('\n\n',SelectLocalization( Country.HasIGApprovalFromLoyalists, 'LOYALISTS_IG_APPROVAL', '' ))]"
  NEUTRALS_TOOLTIP:1 "#tooltip_header $NEUTRALS$#!\nHa #v [Country.GetNumNeutrals|*2]#! $NEUTRALS$ na populacao total de #v [Country.GetTotalPopulation|*2]#! ([Country.MakeScope.ScriptValue('larp_neutrals_percent')|%v1]) em [Country.GetName]"
  POP_TOOLTIP:2 "#tooltip_header [Concept('concept_pop','$concept_population$')]#!\nAtual: [Country.GetTotalPopulation|*2v] ([Country.GetPopulationRanking])\n[Country.GetPopGrowthDesc]$POP_TOOLTIP_DELAYED$\n$TOOLTIP_DELIMITER$\nA populacao [Country.GetAdjective] representa [Country.MakeScope.ScriptValue('larp_global_pop_percent')|%v1] da populacao mundial\nPopulacao mundial: [Country.MakeScope.ScriptValue('larp_global_pop')|*2v]"
  GDP_TOOLTIP:1 "#header [concept_gdp] [Country.GetAdjective]#! \n@money![Country.GetGDP|Dv] (#u #tooltippable #tooltip:[Country.GetTooltipTag],COUNTRY_GDP_OWNERSHIP_TOOLTIP [Country.GetDomesticallyOwnedGDPFraction|%1b]#!#!#!) $concept_gdp_short$ de propriedade nacional ([Country.GetGDPRanking])\n@money![Country.GetGDPPerCapita|2*v] [Concept('concept_gdp_per_capita', '$concept_gdp_per_capita_short$')] ([Country.GetGDPPerCapitaRanking])\n$GDPGR_growth_text$\n$TOOLTIP_DELIMITER$\nO $concept_gdp_short$ [Country.GetAdjective] é [Country.MakeScope.ScriptValue('larp_global_gdp_percent')|%v2] do PIB Global\nPIB Global: @money![Country.MakeScope.ScriptValue('larp_global_gdp')|Dv]"
  CURRENT_GDP_STATE:2 "#header [State.GetOwner.GetAdjectiveNoFormatting] [concept_gdp] de [State.GetName]#!\n$TOOLTIP_DELIMITER$\nContribuicao anual atual para o PIB: #variable @money![State.GetGDPContribution|K]#!\nO PIB per capita de [State.GetName] e: #variable @money![State.MakeScope.ScriptValue('get_state_gdp_per')|Dv]#!\nDiferenca do PIB per capita de [State.GetName] em relacao a [State.GetOwner.GetAdjectiveNoFormatting]: #variable @money![State.MakeScope.ScriptValue('get_country_state_relative_value')|D2+=]#!\nDiferenca do PIB per capita de [State.GetName] em relacao ao valor global: #variable @money![State.MakeScope.ScriptValue('get_global_state_relative_value')|D2+=]#!\n[State.GetName] contribui com #variable [State.GetGDPContributionPercentage|%1]#! do $GDP_SHORT$ de [State.GetOwner.GetAdjectiveNoFormatting]\n\n[State.GetGDPGoodsContributionBreakdown]"
