 # Journal Entry
 je_waddle_martial_law: "#Bold Martial Law#!"
 je_waddle_martial_law_reason: "With the nation against a formidable enemy, the government has suspended ordinary civil administration in favour of direct military authority. The enforcement of $je_waddle_martial_law$ demands constant attention. Left unchecked, the apparatus fractures, radicalises the population it suppresses, and undermines the very war effort it was meant to protect."

 # Button
 waddle_end_martial_law_button: "Lift $je_waddle_martial_law$"
 waddle_end_martial_law_button_desc: "Restore civil administration and dissolve the $je_waddle_martial_law$ apparatus. The manner in which order was maintained will shape the public's memory of this period."
 waddle_martial_law_cooldown: "It has been more than #Bold One Month#! since $je_waddle_martial_law$ was declared"

 # Tooltips
 waddle_martial_law_end_tt_desc: "$je_waddle_martial_law$ will be lifted. Depending on the level of Control maintained during its duration, the transition back to civil rule may be smooth or may leave lasting resentment among the population."
 waddle_martial_law_ended_tt: "$je_waddle_martial_law$ has been lifted."

 # Actual modifiers
