l_english:

  law_early_industrialization: "Early Industrialization"
  law_early_industrialization_desc: "The state encourages the gradual mechanization of production and the expansion of basic industry. While still limited in scale, early factories, workshops, and infrastructure projects begin to transform the economy from agrarian traditions toward industrial development."

  #amendments

  amendment_reform_act_1832:"Reform Act of 1832"
  amendment_reform_act_1832_desc:"The Representation of the People Act 1832, also known as the Reform Act 1832, Great Reform Act or First Reform Act, was an act of the Parliament of the United Kingdom to reform the electoral system in England and Wales and to expand the franchise. "

