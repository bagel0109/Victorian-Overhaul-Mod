l_english:
 war_stuff.1.t:0 "[SCOPE.sCountry('war_stuff_enemy').GetCapital.GetCityHubName] Occupied"
 war_stuff.1.d:1 "Our victorious armies now occupy the very heart of [SCOPE.sCountry('war_stuff_enemy').GetName]. How we treat the conquered capital will echo through history, shaping our legitimacy and the enemy's will to resist."
 war_stuff.1.f:1 "\"These people know their fate rests on our mercy.\""
 war_stuff.1.a:0 "Maintain order and respect institutions."
 war_stuff.1.b:0 "Let the troops take their due."

 war_stuff.2.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] Occupied"
 war_stuff.2.d:1 "To our astonishment, the occupying [SCOPE.sCountry('war_stuff_enemy').GetAdjective] forces have maintained order and respected our institutions despite their victory."
 war_stuff.2.f:1 "\"The invaders patrolled the markets without looting; I even saw one return a dropped purse! Who conquers with such... civility?\""
 war_stuff.2.a:0 "Their restraint is noted."

 war_stuff.3.t:0 "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] Sacked"
 war_stuff.3.d:1 "[SCOPE.sCountry('war_stuff_enemy').GetAdjective] troops have reduced [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] to smoldering ruins, pillaging our national treasures and desecrating our heritage."
 war_stuff.3.f:1 "\"Centuries of knowledge turned to ash. They even melted the statues for scrap metal!\""
 war_stuff.3.a:0 "They will pay for this barbarity!"

 war_stuff.4.t:0 "Unrest in [SCOPE.sState('war_stuff_state').GetName]"
 war_stuff.4.d:1 "Violent outbreaks have erupted across [SCOPE.sState('war_stuff_state').GetName] as occupied populations resist our authority. The streets run red with defiance; we must choose our response immediately."
 war_stuff.4.f:1 "\"They are throwing cobblestones torn from the very streets we paved! My lieutenant asked if we should shoot back. What would you have me tell him?\""
 war_stuff.4.a:0 "Crush this rebellion with maximum force."
 war_stuff.4.b:0 "Withdraw patrols and let tensions cool."

 war_stuff.5.t:0 "The Drumbeats of War"
 war_stuff.5.d:1 "A coordinated propaganda campaign has swept across [SCOPE.sCountry('war_stuff_home').GetName], stirring patriotic fervor and bolstering public resolve to continue the struggle."
 war_stuff.5.f:1 "\"Every wall now bears recruitment posters! Even children sing marching songs while skipping rope. The nation's heart beats only for victory.\""
 war_stuff.5.a:0 "Our people stand united behind the cause!"

 war_stuff.6.t:0 "Racism in [SCOPE.sState('war_stuff_state').GetName]"
 war_stuff.6.d:1 "Citizens of [SCOPE.sCountry('war_stuff_home').GetName] in [SCOPE.sState('war_stuff_state').GetName] are violently targeting neighbors of [SCOPE.sCulture('war_stuff_culture').GetName] heritage, blaming them for the ongoing war."
 war_stuff.6.f:1 "\"'Go home!' they shouted...\""
 war_stuff.6.a:0 "Let the people vent their righteous anger."
 war_stuff.6.b:0 "Protect all citizens regardless of origin."

 war_stuff.7.t:0 "The Call of Unity"
 war_stuff.7.d:1 "Delegations from [SCOPE.sCountry('war_stuff_enemy').GetName] have arrived proposing voluntary annexation into [SCOPE.sCountry('war_stuff_home').GetName], citing shared culture and historical ties."
 war_stuff.7.f:1 "\"My grandfather fought to divide us, but my students now march singing your anthems. The wheel of history turns...\""
 war_stuff.7.a:0 "Welcome our brothers into the [SCOPE.sCountry('war_stuff_home').GetNameNoFlag]!"
 war_stuff.7.b:0 "We respect [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] independence."

 war_stuff.8.t:0 "Ripples of Annexation"
 war_stuff.8.d:1 "News reaches [SCOPE.GetRootScope.GetCountry.GetName] that [SCOPE.sCountry('war_stuff_home').GetName] has absorbed [SCOPE.sCountry('war_stuff_enemy').GetName] through diplomatic annexation, shifting the European balance of power."
 war_stuff.8.f:1 "\"First they came for the Austrians...\""
 war_stuff.8.a:0 "A fait accompli we must acknowledge."

 war_stuff.9.t:0 "Propose White Peace with [SCOPE.sCountry('war_stuff_enemy').GetName]"
 war_stuff.9.d:1 "With no active land fronts in the [SCOPE.sWar('war_stuff_war').GetName], our military advisors recommend seeking a white peace with [SCOPE.sCountry('war_stuff_enemy').GetName]. This would end the conflict without territorial changes, preserving our forces and treasury from further depletion in a stalemated war."
 war_stuff.9.f:1 ""
 war_stuff.9.a:0 "Dispatch envoys with peace terms."
 war_stuff.9.b:0 "Continue the war despite the impasse."

 war_stuff.10.t:0 "Peace Overture from [SCOPE.sCountry('war_stuff_home').GetName]"
 war_stuff.10.d:1 "Diplomatic couriers arrive from [SCOPE.sCountry('war_stuff_home').GetAdjective] headquarters bearing a formal proposal to end the [SCOPE.sWar('war_stuff_war').GetName] with a return to pre-war borders. Their message acknowledges the strategic deadlock and offers cessation of all hostilities."
 war_stuff.10.f:1 ""
 war_stuff.10.a:0 "Accept their proposal."
 war_stuff.10.b:0 "Reject their overture."

 war_stuff.11.t:0 "The Mutiny of the Exhausted"
 war_stuff.11.d:1 "The trenches have become a graveyard, and the men have reached their breaking point. Reports from the [SCOPE.sFront('war_stuff_front').GetName] describe entire regiments refusing to fix bayonets. They claim they will hold the line against an enemy advance, but they will no longer participate in 'suicidal' offensives for a government that seems to have forgotten the value of their lives."
 war_stuff.11.f:1 "\"We will not strike against the motherland, but we will not die for a lie. If the generals want that hill, let them take it themselves.\""
 war_stuff.11.a:0 "Restore order with the firing squad."
 war_stuff.11.b:0 "Address their grievances and improve rations."

 war_stuff.12.t:0 "The Munitions Scandal"
 war_stuff.12.d:1 "A national embarrassment has come to light: our soldiers at the front are being issued faulty shells; or worse, none at all. While our brave men face enemy fire, the factories at home are mired in inefficiency and soaring costs. The press is demanding to know why the 'Arsenal of [SCOPE.GetRootScope.GetCountry.GetName]' is falling silent in our hour of need."
 war_stuff.12.f:1 "\"A soldier without a bullet is but a target. It is a grave crime that our industry profits while our rifles click empty.\""
 war_stuff.12.a:0 "Force production anyway."
 war_stuff.12.b:0 "Prioritise quality and supply-line integrity."

 war_stuff.13.t:0 "The [SCOPE.sCharacter('war_stuff_general_offensive').GetLastName] Plan"
 war_stuff.13.d:1 "The maps at General Headquarters haven't changed in months. On the [SCOPE.sFront('war_stuff_front').GetName], every yard of earth gained in the morning is taken back by nightfall. [SCOPE.sCharacter('war_stuff_general_offensive').GetFullName] has arrived from the front with a stack of operational maps and a grim determination. He insists that with enough grit and 'one last grand push,' he can shatter the [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] lines and restore movement to the war."
 war_stuff.13.f:1 "\"The men are tired, yes, but they are more tired of waiting to die in the mud. Give me the shells, and I will break [SCOPE.sCountry('war_stuff_enemy').GetNameNoFormatting] once and for all.\""
 war_stuff.13.a:0 "Begin the [SCOPE.sCharacter('war_stuff_general_offensive').GetLastName] Offensive."
 war_stuff.13.b:0 "Reject the plan and maintain our defences."

 war_stuff.14.t:0 "The Liberation Initiative"
 war_stuff.14.d:1 "The lines on the [SCOPE.sFront('war_stuff_front').GetName] have stagnated, leaving our own countrymen to languish under [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] occupation. [SCOPE.sCharacter('war_stuff_general_liberation').GetFullName] has submitted a daring operational plan to the War Office. He argues that by concentrating our troops and appealing to the men's desire to reclaim their own hearths, we can shatter the [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] lines."
 war_stuff.14.f:1 "\"Every day we delay is another day of suffering for our brothers in [SCOPE.sState('war_stuff_liberation_state').GetNameNoFormatting]. Give the order, and we shall drive the [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFormatting] menace back across the border.\""
 war_stuff.14.a:0 "Authorise the [SCOPE.sCharacter('war_stuff_general_liberation').GetLastName] Offensive."
 war_stuff.14.b:0 "Maintain a defensive posture."

 waddle_modifier_brutal_discipline:0 "Brutal Discipline"
 
 waddle_modifier_war_concessions:0 "Frontline Concessions"
 
 waddle_modifier_industrial_seizure:0 "Faulty Munitions Production"
 
 waddle_modifier_careful_supply:0 "Quality Supply Oversight"

 waddle_modifier_desperate_offensive:0 "The Grand Offensive"
 
 waddle_modifier_trench_attrition:0 "Trench Deadlock"

 waddle_modifier_liberation_drive:0 "Liberation Drive"

 war_stuff.15.t: "Conscription Crisis"
 war_stuff.15.d: "As the war drags on, fresh levies are met with open resistance. Local officials report desertions, hidden sons, and villages unwilling to provide another round of men."
 war_stuff.15.f: "\"If the state still hungers, let it eat from another table.\""
 war_stuff.15.a: "The quotas must be met."
 war_stuff.15.b: "Grant limited exemptions."
 war_stuff.16.t: "Refugees from [SCOPE.sState('war_stuff_refugee_state').GetName]"
 war_stuff.16.d: "Fighting in [SCOPE.sState('war_stuff_refugee_state').GetName] has driven civilians from their homes. Roads, stations, and churches behind the [SCOPE.sFront('war_stuff_front').GetName] are crowded with those fleeing the guns."
 war_stuff.16.f: "They brought what they could carry. The rest was left to the smoke."
 war_stuff.16.a: "See that they are sheltered."
 war_stuff.16.b: "The army has first claim."
 war_stuff.17.t: "Reports of Atrocities"
 war_stuff.17.d: "Reports of looting, reprisals, and killings by our troops have begun to circulate abroad. Officials insist the tales are exaggerated, but hostile newspapers in [SCOPE.sCountry('war_stuff_enemy').GetName] have already found their headline."
 war_stuff.17.f: "In war, the truth arrives late, poorly dressed, and accompanied by enemies."
 war_stuff.17.a: "Deny these slanders."
 war_stuff.17.b: "Make an example of the guilty."
 war_stuff.18.t: "Fraternization on the [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.18.d: "Months of stalemate on the [SCOPE.sFront('war_stuff_front').GetName] have bred a strange familiarity between opposing trenches. Officers report traded cigarettes, shouted jokes, and a troubling reluctance to fire without orders."
 war_stuff.18.f: "\"They are not devils over there,\" wrote one private, \"only poor devils like us.\""
 war_stuff.18.a: "Let the men have their peace."
 war_stuff.18.b: "Discipline must be restored."
 war_stuff.19.t: "Breakthrough on the [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.19.d: "The offensive on the [SCOPE.sFront('war_stuff_front').GetName] has broken through. Dispatches from [SCOPE.sCharacter('war_stuff_general').GetFullName] speak of enemy positions abandoned, reserves in motion, and roads opening beyond the guns."
 war_stuff.19.f: "For once, the map moved faster than the casualty lists."
 war_stuff.19.a: "Press the advantage."
 war_stuff.20.t: "Offensive Fails on the [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.20.d: "The promised breakthrough on the [SCOPE.sFront('war_stuff_front').GetName] has not come. The army has paid dearly for a few ruined fields, and the public now asks who ordered such a sacrifice."
 war_stuff.20.f: "The staff spoke of pressure, momentum, and resolve. The soldiers spoke of mud."
 war_stuff.20.a: "The generals must answer for this."
 war_stuff.20.b: "One more push."
 war_stuff.21.t: "Liberation on the [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.21.d: "Our forces have relieved occupied territory on the [SCOPE.sFront('war_stuff_front').GetName], sending the enemy back from land they had claimed as their prize. Crowds cheer the returning soldiers as proof that the war can still be won."
 war_stuff.21.f: "The first flag raised was small, torn, and enough."
 war_stuff.21.a: "Let the bells ring."
 war_stuff.22.t: "Liberation Falters on the [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.22.d: "The attempt to liberate occupied territory on the [SCOPE.sFront('war_stuff_front').GetName] has failed. Those still under enemy control wait in vain, while the rest of the country counts the cost of another failed effort."
 war_stuff.22.f: "They had been told to listen for our guns. By winter, they listened only for boots at the door."
 war_stuff.22.a: "We must endure."
 war_stuff.23.t: "Rifles for the [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.23.d: "The army's demand for rifles and spare parts has strained the market. [SCOPE.sCharacter('war_stuff_general').GetFullName] warns that formations on the [SCOPE.sFront('war_stuff_front').GetName] may reach the line with old weapons, missing parts, or none at all."
 war_stuff.23.f: "A soldier may march hungry. He cannot hold a line empty-handed."
 war_stuff.23.a: "Seize the stockpiles."
 war_stuff.23.b: "Ration what remains."
 war_stuff.24.t: "Artillery for the [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.24.d: "Artillery shortages have forced the army to choose its barrages carefully. Commanders on the [SCOPE.sFront('war_stuff_front').GetName] ask for more shells than the factories and depots can provide."
 war_stuff.24.f: "The men did not ask for speeches. They asked when our guns would answer."
 war_stuff.24.a: "Feed the guns."
 war_stuff.24.b: "Conserve the shells."
 war_stuff.25.t: "Explosives Shortage"
 war_stuff.25.d: "A shortage of explosives now threatens shells, mines, and military production. The army demands emergency powers over the chemical works, while industrialists warn of ruinous disruption."
 war_stuff.25.f: "Every invoice was now a question of life and death."
 war_stuff.25.a: "Commandeer the works."
 war_stuff.25.b: "Save powder for the decisive hour."
 war_stuff.26.t: "Prisoners from [SCOPE.sCountry('war_stuff_enemy').GetName]"
 war_stuff.26.d: "Recent success on the [SCOPE.sFront('war_stuff_front').GetName] against [SCOPE.sCountry('war_stuff_enemy').GetName] has left us with columns of enemy prisoners. Their treatment will be watched by our soldiers, our enemies, and the governments still weighing the character of this war."
 war_stuff.26.f: "Victory did not end at the field. It marched on under guard."
 war_stuff.26.a: "Treat them honorably."
 war_stuff.26.b: "Put them to work."
 war_stuff.26.c: "Arrange an exchange."
 waddle_modifier_forced_conscription: "Forced Conscription"
 waddle_modifier_forced_conscription_desc: "Draft quotas are being enforced despite growing local resistance."
 waddle_modifier_conscription_exemptions: "Conscription Exemptions"
 waddle_modifier_conscription_exemptions_desc: "Limited exemptions have eased unrest, at the cost of military readiness."
 waddle_modifier_refugee_relief: "Refugee Relief"
 waddle_modifier_refugee_relief_desc: "The state is organizing aid for civilians displaced by the front."
 waddle_modifier_wartime_censorship: "Wartime Censorship"
 waddle_modifier_wartime_censorship_desc: "Reports from the war are being suppressed in the name of order."
 waddle_modifier_frontline_fraternization: "Frontline Fraternization"
 waddle_modifier_frontline_fraternization_desc: "Informal contact with the enemy has softened discipline at the front."
 waddle_modifier_breakthrough_momentum: "Breakthrough Momentum"
 waddle_modifier_breakthrough_momentum_desc: "A successful offensive has restored confidence in the army."
 waddle_modifier_offensive_exhaustion: "Offensive Exhaustion"
 waddle_modifier_offensive_exhaustion_desc: "A failed attack has left the army shaken and the public restless."
 waddle_modifier_victorious_liberation: "Victorious Liberation"
 waddle_modifier_victorious_liberation_desc: "Occupied territory has been relieved, lifting morale across the country."
 waddle_modifier_shattered_liberation_drive: "Shattered Liberation Drive"
 waddle_modifier_shattered_liberation_drive_desc: "A failed liberation attempt has deepened despair in occupied territory."
 waddle_modifier_small_arms_seizure: "Seized Small Arms"
 waddle_modifier_small_arms_seizure_desc: "Private and commercial arms stocks have been taken for military use."
 waddle_modifier_small_arms_rationing: "Rationed Rifles"
 waddle_modifier_small_arms_rationing_desc: "Rifles and spare parts are being rationed across the army."
 waddle_modifier_artillery_priority: "Artillery Priority"
 waddle_modifier_artillery_priority_desc: "Industry and transport are being bent toward the needs of the guns."
 waddle_modifier_artillery_conservation: "Shell Conservation"
 waddle_modifier_artillery_conservation_desc: "Artillery ammunition is being conserved for the most necessary actions."
 waddle_modifier_explosives_seizure: "Seized Chemical Works"
 waddle_modifier_explosives_seizure_desc: "Explosives production has been brought under wartime control."
 waddle_modifier_powder_conservation: "Powder Conservation"
 waddle_modifier_powder_conservation_desc: "Explosives are being reserved for decisive operations."
 waddle_modifier_pow_labor: "Prisoner Labor"
 waddle_modifier_pow_labor_desc: "Enemy prisoners are being used to support the war economy."
