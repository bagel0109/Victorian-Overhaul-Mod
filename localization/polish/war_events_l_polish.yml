l_polish:
 war_stuff.1.t:0 "Okupacja [SCOPE.sCountry('war_stuff_enemy').GetCapital.GetCityHubName]"
 war_stuff.1.d:1 "Nasze zwycięskie armie zajmują teraz samo serce [SCOPE.sCountry('war_stuff_enemy').GetName]. To, jak potraktujemy zdobytą stolicę, zapisze się w historii i zaważy na naszej prawomocności oraz na woli oporu wroga."
 war_stuff.1.f:1 "„Ci ludzie wiedzą, że ich los zależy od naszej łaski.”"
 war_stuff.1.a:0 "Utrzymać porządek i szanować instytucje."
 war_stuff.1.b:0 "Pozwolić żołnierzom wziąć to, co im należne."

 war_stuff.2.t:0 "Okupacja [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]"
 war_stuff.2.d:1 "Ku naszemu zdumieniu okupacyjne siły [SCOPE.sCountry('war_stuff_enemy').GetAdjective], mimo zwycięstwa, utrzymały porządek i uszanowały nasze instytucje."
 war_stuff.2.f:1 "„Najeźdźcy patrolowali targi bez grabieży. Widziałem nawet, jak jeden zwrócił zgubioną sakiewkę! Kto podbija z taką... ogładą?”"
 war_stuff.2.a:0 "Zapamiętamy ich powściągliwość."
 war_stuff.3.t:0 "Splądrowanie [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]"
 war_stuff.3.d:1 "Wojska [SCOPE.sCountry('war_stuff_enemy').GetAdjective] obróciły [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] w dymiące ruiny, grabiąc nasze narodowe skarby i bezczeszcząc dziedzictwo."
 war_stuff.3.f:1 "„Wieki wiedzy obróciły się w popiół. Nawet posągi przetopili na złom!”"
 war_stuff.3.a:0 "Zapłacą za to barbarzyństwo!"

 war_stuff.4.t:0 "Niepokoje w [SCOPE.sState('war_stuff_state').GetName]"
 war_stuff.4.d:1 "W całym [SCOPE.sState('war_stuff_state').GetName] wybuchły gwałtowne wystąpienia, gdy okupowana ludność opiera się naszej władzy. Ulice czerwienieją od buntu; musimy natychmiast wybrać odpowiedź."
 war_stuff.4.f:1 "„Rzucają kostką brukową wyrwaną z ulic, które sami wybrukowaliśmy! Porucznik pyta, czy mamy strzelać. Co mam mu powiedzieć?”"
 war_stuff.4.a:0 "Zmiażdżyć ten bunt maksymalną siłą."
 war_stuff.4.b:0 "Wycofać patrole i pozwolić napięciom opaść."

 war_stuff.5.t:0 "Bębny wojny"
 war_stuff.5.d:1 "Skoordynowana kampania propagandowa rozeszła się po [SCOPE.sCountry('war_stuff_home').GetName], rozpalając patriotyczny zapał i utwierdzając społeczeństwo w dalszej walce."
 war_stuff.5.f:1 "„Na każdej ścianie wiszą teraz plakaty rekrutacyjne! Nawet dzieci śpiewają marsze, skacząc przez skakankę. Serce narodu bije tylko dla zwycięstwa.”"
 war_stuff.5.a:0 "Nasz lud stoi zjednoczony za sprawą!"

 war_stuff.6.t:0 "Rasizm w [SCOPE.sState('war_stuff_state').GetName]"
 war_stuff.6.d:1 "Obywatele [SCOPE.sCountry('war_stuff_home').GetName] w [SCOPE.sState('war_stuff_state').GetName] brutalnie atakują sąsiadów pochodzenia [SCOPE.sCulture('war_stuff_culture').GetName], obwiniając ich za trwającą wojnę."
 war_stuff.6.f:1 "„«Wracajcie do domu!», krzyczeli...”"
 war_stuff.6.a:0 "Pozwolić ludziom dać upust słusznemu gniewowi."
 war_stuff.6.b:0 "Chronić wszystkich obywateli bez względu na pochodzenie."

 war_stuff.7.t:0 "Wezwanie jedności"
 war_stuff.7.d:1 "Delegacje z [SCOPE.sCountry('war_stuff_enemy').GetName] przybyły z propozycją dobrowolnej aneksji do [SCOPE.sCountry('war_stuff_home').GetName], wskazując na wspólną kulturę i więzi historyczne."
 war_stuff.7.f:1 "„Mój dziad walczył, by nas podzielić, a moi uczniowie maszerują dziś, śpiewając wasze hymny. Koło historii się obraca...”"
 war_stuff.7.a:0 "Powitajmy naszych braci w [SCOPE.sCountry('war_stuff_home').GetNameNoFlag]!"
 war_stuff.7.b:0 "Szanujemy [SCOPE.sCountry('war_stuff_enemy').GetAdjectiveNoFlag] niepodległość."

 war_stuff.8.t:0 "Fale aneksji"
 war_stuff.8.d:1 "Do [SCOPE.GetRootScope.GetCountry.GetName] dociera wieść, że [SCOPE.sCountry('war_stuff_home').GetName] wchłonęło [SCOPE.sCountry('war_stuff_enemy').GetName] przez aneksję dyplomatyczną, wywracając europejską równowagę sił."
 war_stuff.8.f:1 "„Najpierw przyszli po Austriaków...”"
 war_stuff.8.a:0 "Fakt dokonany, który musimy uznać."

 war_stuff.9.t:0 "Zaproponuj pokój status quo z [SCOPE.sCountry('war_stuff_enemy').GetName]"
 war_stuff.9.d:1 "Ponieważ w [SCOPE.sWar('war_stuff_war').GetName] nie ma aktywnych frontów lądowych, nasi doradcy wojskowi zalecają dążenie do pokoju status quo z [SCOPE.sCountry('war_stuff_enemy').GetName]. Zakończyłoby to konflikt bez zmian terytorialnych, chroniąc nasze siły i skarb przed dalszym wyczerpaniem w wojnie bez rozstrzygnięcia."
 war_stuff.9.f:1 ""
 war_stuff.9.a:0 "Wysłać posłów z warunkami pokoju."
 war_stuff.9.b:0 "Kontynuować wojnę mimo impasu."

 war_stuff.10.t:0 "Pokojowe otwarcie od [SCOPE.sCountry('war_stuff_home').GetName]"
 war_stuff.10.d:1 "Kurierzy dyplomatyczni przybywają z kwatery głównej [SCOPE.sCountry('war_stuff_home').GetName] z formalną propozycją zakończenia [SCOPE.sWar('war_stuff_war').GetName] przez powrót do granic sprzed wojny. Ich wiadomość uznaje strategiczny impas i oferuje zakończenie wszelkich działań wojennych."
 war_stuff.10.f:1 ""
 war_stuff.10.a:0 "Przyjąć ich propozycję."
 war_stuff.10.b:0 "Odrzucić ich ofertę."

 war_stuff.11.t:0 "Bunt wyczerpanych"
 war_stuff.11.d:1 "Okopy stały się cmentarzem, a ludzie osiągnęli granicę wytrzymałości. Raporty z [SCOPE.sFront('war_stuff_front').GetName] opisują całe pułki odmawiające nasadzenia bagnetów. Twierdzą, że utrzymają linię przeciw natarciu wroga, ale nie będą już uczestniczyć w „samobójczych” ofensywach dla rządu, który zdaje się zapomnieć o wartości ich życia."
 war_stuff.11.f:1 "„Nie uderzymy przeciw ojczyźnie, ale nie umrzemy za kłamstwo. Jeśli generałowie chcą tego wzgórza, niech wezmą je sami.”"
 war_stuff.11.a:0 "Przywrócić porządek plutonem egzekucyjnym."
 war_stuff.11.b:0 "Wysłuchać ich skarg i poprawić racje."

 war_stuff.12.t:0 "Skandal amunicyjny"
 war_stuff.12.d:1 "Wyszła na jaw narodowa hańba: nasi żołnierze na froncie otrzymują wadliwe pociski; albo gorzej, nie otrzymują ich wcale. Gdy nasi dzielni ludzie mierzą się z ogniem wroga, fabryki w kraju grzęzną w nieefektywności i rosnących kosztach. Prasa żąda wyjaśnień, dlaczego „Arsenał [SCOPE.GetRootScope.GetCountry.GetName]” milknie w godzinie potrzeby."
 war_stuff.12.f:1 "„Żołnierz bez naboju jest tylko celem. To ciężka zbrodnia, gdy przemysł czerpie zyski, a spusty naszych karabinów klikają na pusto.”"
 war_stuff.12.a:0 "Wymusić produkcję mimo wszystko."
 war_stuff.12.b:0 "Nadać priorytet jakości i integralności linii zaopatrzenia."

 war_stuff.13.t:0 "Plan [SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]"
 war_stuff.13.d:1 "Mapy w Kwaterze Głównej nie zmieniły się od miesięcy. Na [SCOPE.sFront('war_stuff_front').GetName] każda piędź ziemi zdobyta rano jest odbierana nocą. [SCOPE.sCharacter('war_stuff_general_offensive').GetFullName] przybył z frontu ze stosem map operacyjnych i ponurą determinacją. Twierdzi, że przy dostatecznej determinacji i „ostatnim wielkim natarciu” może przełamać linie [SCOPE.sCountry('war_stuff_enemy').GetNameNoFlag] i przywrócić wojnie ruch."
 war_stuff.13.f:1 "„Ludzie są zmęczeni, tak, ale jeszcze bardziej zmęczeni czekaniem na śmierć w błocie. Dajcie mi pociski, a złamię [SCOPE.sCountry('war_stuff_enemy').GetNameNoFormatting] raz na zawsze.”"
 war_stuff.13.a:0 "Rozpocząć ofensywę [SCOPE.sCharacter('war_stuff_general_offensive').GetLastName]."
 war_stuff.13.b:0 "Odrzucić plan i utrzymać obronę."

 war_stuff.14.t:0 "Inicjatywa wyzwolenia"
 war_stuff.14.d:1 "Linie na [SCOPE.sFront('war_stuff_front').GetName] ugrzęzły, pozostawiając naszych rodaków w cierpieniu pod okupacją [SCOPE.sCountry('war_stuff_enemy').GetName]. [SCOPE.sCharacter('war_stuff_general_liberation').GetFullName] przedłożył Ministerstwu Wojny śmiały plan operacyjny. Dowodzi, że koncentrując wojska i odwołując się do pragnienia odzyskania własnych domostw, możemy przełamać linie [SCOPE.sCountry('war_stuff_enemy').GetNameNoFlag]."
 war_stuff.14.f:1 "„Każdy dzień zwłoki to kolejny dzień cierpienia dla naszych braci w [SCOPE.sState('war_stuff_liberation_state').GetNameNoFormatting]. Wydajcie rozkaz, a zepchniemy zagrożenie ze strony [SCOPE.sCountry('war_stuff_enemy').GetNameNoFormatting] za granicę.”"
 war_stuff.14.a:0 "Zatwierdzić ofensywę [SCOPE.sCharacter('war_stuff_general_liberation').GetLastName]."
 war_stuff.14.b:0 "Utrzymać postawę obronną."

 waddle_modifier_brutal_discipline:0 "Brutalna dyscyplina"
 
 waddle_modifier_war_concessions:0 "Ustępstwa frontowe"
 
 waddle_modifier_industrial_seizure:0 "Produkcja wadliwej amunicji"
 
 waddle_modifier_careful_supply:0 "Nadzór jakości zaopatrzenia"

 waddle_modifier_desperate_offensive:0 "Wielka ofensywa"
 
 waddle_modifier_trench_attrition:0 "Okopowy impas"

 waddle_modifier_liberation_drive:0 "Pęd wyzwolenia"

 war_stuff.15.t: "Kryzys poboru"
 war_stuff.15.d: "Gdy wojna się przeciąga, nowe pobory spotykają się z otwartym oporem. Lokalni urzędnicy zgłaszają dezercje, ukrywanych synów i wsie niechętne oddaniu kolejnej tury mężczyzn."
 war_stuff.15.f: "„Jeśli państwo wciąż jest głodne, niech je przy innym stole.”"
 war_stuff.15.a: "Kwoty muszą zostać spełnione."
 war_stuff.15.b: "Przyznać ograniczone zwolnienia."
 war_stuff.16.t: "Uchodźcy z [SCOPE.sState('war_stuff_refugee_state').GetName]"
 war_stuff.16.d: "Walki w [SCOPE.sState('war_stuff_refugee_state').GetName] wygnały cywilów z domów. Drogi, stacje i kościoły za [SCOPE.sFront('war_stuff_front').GetName] są zatłoczone uciekającymi przed działami."
 war_stuff.16.f: "Zabrali to, co mogli unieść. Reszta została oddana dymowi."
 war_stuff.16.a: "Zapewnić im dach nad głową."
 war_stuff.16.b: "Armia ma pierwszeństwo."
 war_stuff.17.t: "Doniesienia o okrucieństwach"
 war_stuff.17.d: "Za granicą zaczęły krążyć doniesienia o grabieżach, odwetach i zabójstwach dokonywanych przez nasze wojska. Urzędnicy twierdzą, że opowieści są przesadzone, ale wrogie gazety w [SCOPE.sCountry('war_stuff_enemy').GetName] już znalazły nagłówek."
 war_stuff.17.f: "Na wojnie prawda przybywa późno, źle ubrana i w towarzystwie wrogów."
 war_stuff.17.a: "Zaprzeczyć tym oszczerstwom."
 war_stuff.17.b: "Ukarać winnych dla przykładu."
 war_stuff.18.t: "Bratanie na [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.18.d: "Miesiące impasu na [SCOPE.sFront('war_stuff_front').GetName] wytworzyły dziwną zażyłość między przeciwnymi okopami. Oficerowie donoszą o wymianie papierosów, wykrzykiwanych żartach i niepokojącej niechęci do strzelania bez rozkazu."
 war_stuff.18.f: "„Tam nie ma diabłów”, pisał jeden szeregowiec, „tylko biedni diabli tacy jak my.”"
 war_stuff.18.a: "Dać żołnierzom tę chwilę spokoju."
 war_stuff.18.b: "Dyscyplina musi zostać przywrócona."
 war_stuff.19.t: "Przełamanie na [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.19.d: "Ofensywa na [SCOPE.sFront('war_stuff_front').GetName] dokonała przełamania. Depesze od [SCOPE.sCharacter('war_stuff_general').GetFullName] mówią o opuszczonych pozycjach wroga, rezerwach w ruchu i drogach otwierających się za działami."
 war_stuff.19.f: "Tym razem mapa poruszała się szybciej niż listy strat."
 war_stuff.19.a: "Wykorzystać przewagę."
 war_stuff.20.t: "Ofensywa zawodzi na [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.20.d: "Obiecane przełamanie na [SCOPE.sFront('war_stuff_front').GetName] nie nadeszło. Armia drogo zapłaciła za kilka zrujnowanych pól, a społeczeństwo pyta teraz, kto nakazał taką ofiarę."
 war_stuff.20.f: "Sztab mówił o presji, impecie i determinacji. Żołnierze mówili o błocie."
 war_stuff.20.a: "Generałowie muszą za to odpowiedzieć."
 war_stuff.20.b: "Jeszcze jedno pchnięcie."
 war_stuff.21.t: "Wyzwolenie na [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.21.d: "Nasze siły wyzwoliły okupowane terytorium na [SCOPE.sFront('war_stuff_front').GetName], odrzucając wroga z ziemi, którą uważał za swoją zdobycz. Tłumy wiwatują na powracających żołnierzy jako dowód, że wojnę wciąż można wygrać."
 war_stuff.21.f: "Pierwsza podniesiona flaga była mała i podarta. To wystarczyło."
 war_stuff.21.a: "Niech biją dzwony."
 war_stuff.22.t: "Wyzwolenie słabnie na [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.22.d: "Próba wyzwolenia okupowanego terytorium na [SCOPE.sFront('war_stuff_front').GetName] nie powiodła się. Ci, którzy wciąż pozostają pod kontrolą wroga, czekają na próżno, a reszta kraju liczy koszt kolejnego nieudanego wysiłku."
 war_stuff.22.f: "Kazano im nasłuchiwać naszych dział. Zimą słuchali już tylko butów pod drzwiami."
 war_stuff.22.a: "Musimy wytrwać."
 war_stuff.23.t: "Karabiny dla [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.23.d: "Zapotrzebowanie armii na karabiny i części zamienne nadwyrężyło rynek. [SCOPE.sCharacter('war_stuff_general').GetFullName] ostrzega, że formacje na [SCOPE.sFront('war_stuff_front').GetName] mogą dotrzeć na linię ze starą bronią, brakującymi częściami albo bez niczego."
 war_stuff.23.f: "Żołnierz może maszerować głodny. Nie utrzyma linii z pustymi rękami."
 war_stuff.23.a: "Przejąć zapasy."
 war_stuff.23.b: "Racjonować to, co zostało."
 war_stuff.24.t: "Artyleria dla [SCOPE.sFront('war_stuff_front').GetName]"
 war_stuff.24.d: "Niedobory artylerii zmusiły armię do ostrożnego wybierania ostrzałów. Dowódcy na [SCOPE.sFront('war_stuff_front').GetName] proszą o więcej pocisków, niż mogą dostarczyć fabryki i składy."
 war_stuff.24.f: "Ludzie nie prosili o przemówienia. Pytali, kiedy odpowiedzą nasze działa."
 war_stuff.24.a: "Dostarczyć amunicję do dział."
 war_stuff.24.b: "Oszczędzać pociski."
 war_stuff.25.t: "Niedobór materiałów wybuchowych"
 war_stuff.25.d: "Niedobór materiałów wybuchowych zagraża teraz pociskom, minom i produkcji wojskowej. Armia żąda nadzwyczajnych uprawnień nad zakładami chemicznymi, podczas gdy przemysłowcy ostrzegają przed rujnującymi zakłóceniami."
 war_stuff.25.f: "Każdy rachunek ważył teraz tyle, co życie i śmierć."
 war_stuff.25.a: "Zarekwirować zakłady."
 war_stuff.25.b: "Zachować proch na decydującą godzinę."
 war_stuff.26.t: "Jeńcy z [SCOPE.sCountry('war_stuff_enemy').GetName]"
 war_stuff.26.d: "Niedawny sukces na [SCOPE.sFront('war_stuff_front').GetName] przeciw [SCOPE.sCountry('war_stuff_enemy').GetName] pozostawił nam kolumny wrogich jeńców. Ich traktowanie będą obserwować nasi żołnierze, nasi wrogowie i rządy wciąż ważące charakter tej wojny."
 war_stuff.26.f: "Zwycięstwo nie skończyło się na polu bitwy. Maszerowało dalej pod strażą."
 war_stuff.26.a: "Traktować ich honorowo."
 war_stuff.26.b: "Skierować ich do pracy."
 war_stuff.26.c: "Zorganizować wymianę."
 waddle_modifier_forced_conscription: "Przymusowy pobór"
 waddle_modifier_forced_conscription_desc: "Kwoty poborowe są egzekwowane mimo rosnącego lokalnego oporu."
 waddle_modifier_conscription_exemptions: "Zwolnienia z poboru"
 waddle_modifier_conscription_exemptions_desc: "Ograniczone zwolnienia złagodziły niepokoje kosztem gotowości wojskowej."
 waddle_modifier_refugee_relief: "Pomoc uchodźcom"
 waddle_modifier_refugee_relief_desc: "Państwo organizuje pomoc dla cywilów wysiedlonych przez front."
 waddle_modifier_wartime_censorship: "Cenzura wojenna"
 waddle_modifier_wartime_censorship_desc: "Doniesienia z wojny są tłumione w imię porządku."
 waddle_modifier_frontline_fraternization: "Bratanie frontowe"
 waddle_modifier_frontline_fraternization_desc: "Nieformalny kontakt z wrogiem osłabił dyscyplinę na froncie."
 waddle_modifier_breakthrough_momentum: "Impet przełamania"
 waddle_modifier_breakthrough_momentum_desc: "Udana ofensywa przywróciła zaufanie do armii."
 waddle_modifier_offensive_exhaustion: "Wyczerpanie ofensywne"
 waddle_modifier_offensive_exhaustion_desc: "Nieudany atak wstrząsnął armią i zaniepokoił społeczeństwo."
 waddle_modifier_victorious_liberation: "Zwycięskie wyzwolenie"
 waddle_modifier_victorious_liberation_desc: "Okupowane terytorium zostało wyzwolone, podnosząc morale w całym kraju."
 waddle_modifier_shattered_liberation_drive: "Rozbity pęd wyzwolenia"
 waddle_modifier_shattered_liberation_drive_desc: "Nieudana próba wyzwolenia pogłębiła rozpacz na okupowanym terytorium."
 waddle_modifier_small_arms_seizure: "Przejęta broń strzelecka"
 waddle_modifier_small_arms_seizure_desc: "Prywatne i handlowe zapasy broni przejęto do użytku wojskowego."
 waddle_modifier_small_arms_rationing: "Racjonowane karabiny"
 waddle_modifier_small_arms_rationing_desc: "Karabiny i części zamienne są racjonowane w całej armii."
 waddle_modifier_artillery_priority: "Priorytet artylerii"
 waddle_modifier_artillery_priority_desc: "Przemysł i transport podporządkowano potrzebom dział."
 waddle_modifier_artillery_conservation: "Oszczędzanie pocisków"
 waddle_modifier_artillery_conservation_desc: "Amunicja artyleryjska jest oszczędzana na najpotrzebniejsze działania."
 waddle_modifier_explosives_seizure: "Przejęte zakłady chemiczne"
 waddle_modifier_explosives_seizure_desc: "Produkcję materiałów wybuchowych objęto kontrolą wojenną."
 waddle_modifier_powder_conservation: "Oszczędzanie prochu"
 waddle_modifier_powder_conservation_desc: "Materiały wybuchowe są rezerwowane na decydujące operacje."
 waddle_modifier_pow_labor: "Praca jeńców"
 waddle_modifier_pow_labor_desc: "Wrodzy jeńcy są wykorzystywani do wsparcia gospodarki wojennej."
