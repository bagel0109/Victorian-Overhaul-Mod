l_polish:
  RADICALS_TOOLTIP:1 "#tooltip_header $RADICALS$#!\nW [Country.GetName] jest #v [Country.GetNumRadicals|D]#! $RADICALS$ w lacznej populacji wynoszacej #v [Country.GetTotalPopulation|D]#! ([Country.MakeScope.ScriptValue('larp_radicals_percent')|%v1])\n$TOOLTIP_DELIMITER$\nLiczba $RADICALS$ zmienila sie o #v #tooltippable #tooltip:[Country.GetTooltipTag],RADICALS_CHANGE_TOOLTIP [Country.GetTotalNumRadicalsChange|D=-]#!#!#! od [Country.GetRadicalsLoyalistsChangeStartDate|v].\nNajwazniejsze czynniki to [Country.GetRadicalsChangeSummary]\n\n[Country.GetRadicalsSummaryDesc][ConcatIfNeitherEmpty('\n\n',SelectLocalization( GreaterThan_int32(Country.CalcNumStatesInTurmoil, '(int32)0'), 'STATES_IN_TURMOIL', '' ))][ConcatIfNeitherEmpty('\n\n',SelectLocalization( Country.HasIGApprovalFromRadicals, 'RADICALS_IG_APPROVAL', '' ))]"
  LOYALISTS_TOOLTIP:1 "#tooltip_header $LOYALISTS$#!\nW [Country.GetName] jest #v [Country.GetNumLoyalists|D]#! $LOYALISTS$ w lacznej populacji wynoszacej #v [Country.GetTotalPopulation|D]#! ([Country.MakeScope.ScriptValue('larp_loyalists_percent')|%v1])\n$TOOLTIP_DELIMITER$\nLiczba $LOYALISTS$ zmienila sie o #v #tooltippable #tooltip:[Country.GetTooltipTag],LOYALISTS_CHANGE_TOOLTIP [Country.GetTotalNumLoyalistsChange|D=+]#!#!#! od [Country.GetRadicalsLoyalistsChangeStartDate|v]\nNajwazniejsze czynniki to [Country.GetLoyalistsChangeSummary]\n\n[Country.GetLoyalistsSummaryDesc][ConcatIfNeitherEmpty('\n\n',SelectLocalization( Country.HasIGApprovalFromLoyalists, 'LOYALISTS_IG_APPROVAL', '' ))]"
  NEUTRALS_TOOLTIP:1 "#tooltip_header $NEUTRALS$#!\nW [Country.GetName] jest #v [Country.GetNumNeutrals|*2]#! $NEUTRALS$ w lacznej populacji wynoszacej #v [Country.GetTotalPopulation|*2]#! ([Country.MakeScope.ScriptValue('larp_neutrals_percent')|%v1])"
  POP_TOOLTIP:2 "#tooltip_header [Concept('concept_pop','$concept_population$')]#!\nObecnie: [Country.GetTotalPopulation|*2v] ([Country.GetPopulationRanking])\n[Country.GetPopGrowthDesc]$POP_TOOLTIP_DELAYED$\n$TOOLTIP_DELIMITER$\nPopulacja [Country.GetAdjective] stanowi [Country.MakeScope.ScriptValue('larp_global_pop_percent')|%v1] populacji swiata\nPopulacja swiata: [Country.MakeScope.ScriptValue('larp_global_pop')|*2v]"
  GDP_TOOLTIP:1 "#header [concept_gdp] ([Country.GetAdjective])#! \n@money![Country.GetGDP|Dv] (#u #tooltippable #tooltip:[Country.GetTooltipTag],COUNTRY_GDP_OWNERSHIP_TOOLTIP [Country.GetDomesticallyOwnedGDPFraction|%1b]#!#!#!) w posiadaniu krajowym $concept_gdp_short$ ([Country.GetGDPRanking])\n@money![Country.GetGDPPerCapita|2*v] [Concept('concept_gdp_per_capita', '$concept_gdp_per_capita_short$')] ([Country.GetGDPPerCapitaRanking])\n$GDPGR_growth_text$\n$TOOLTIP_DELIMITER$\n[Country.GetAdjective] $concept_gdp_short$ stanowi [Country.MakeScope.ScriptValue('larp_global_gdp_percent')|%v2] globalnego PKB\nGlobalne PKB: @money![Country.MakeScope.ScriptValue('larp_global_gdp')|Dv]"
  CURRENT_GDP_STATE:2 "#header [State.GetOwner.GetAdjectiveNoFormatting] [concept_gdp] z [State.GetName]#!\n$TOOLTIP_DELIMITER$\nBiezacy roczny wklad do PKB: #variable @money![State.GetGDPContribution|K]#!\nPKB per capita w [State.GetName] wynosi: #variable @money![State.MakeScope.ScriptValue('get_state_gdp_per')|Dv]#!\nRoznica PKB per capita [State.GetName] wzgledem [State.GetOwner.GetAdjectiveNoFormatting]: #variable @money![State.MakeScope.ScriptValue('get_country_state_relative_value')|D2+=]#!\nRoznica PKB per capita [State.GetName] wzgledem sredniej swiatowej: #variable @money![State.MakeScope.ScriptValue('get_global_state_relative_value')|D2+=]#!\n[State.GetName] wnosi #variable [State.GetGDPContributionPercentage|%1]#! $GDP_SHORT$ [State.GetOwner.GetAdjectiveNoFormatting]\n\n[State.GetGDPGoodsContributionBreakdown]"
