 # Journal Entry
 je_waddle_martial_law: "#Bold Stan wojenny#!"
 je_waddle_martial_law_reason: "W obliczu groźnego wroga rząd zawiesił zwykłą administrację cywilną na rzecz bezpośredniej władzy wojskowej. Egzekwowanie $je_waddle_martial_law$ wymaga stałej uwagi. Pozostawiony bez nadzoru aparat pęka, radykalizuje ludność, którą tłumi, i podkopuje wysiłek wojenny, który miał chronić."

 # Button
 waddle_end_martial_law_button: "Znieś $je_waddle_martial_law$"
 waddle_end_martial_law_button_desc: "Przywraca administrację cywilną i rozwiązuje aparat $je_waddle_martial_law$. Sposób utrzymania porządku ukształtuje pamięć publiczną o tym okresie."
 waddle_martial_law_cooldown: "Od ogłoszenia $je_waddle_martial_law$ minął ponad #Bold jeden miesiąc#!"

 # Tooltips
 waddle_martial_law_end_tt_desc: "$je_waddle_martial_law$ zostanie zniesiony. Zależnie od poziomu Kontroli utrzymanego w czasie jego trwania, powrót do rządów cywilnych może być płynny albo pozostawić wśród ludności trwałą urazę."
 waddle_martial_law_ended_tt: "$je_waddle_martial_law$ został zniesiony."

 # Actual modifiers
 base_martial_law_modifier: "Skutki $je_waddle_martial_law$"
 base_martial_law_modifier_scaled_half: "Skutki tłumienia opozycji"
 base_martial_law_modifier_scaled_full: "Skutki $je_martial_law_progress_bar$"
 base_martial_law_modifier_scaled_time: "Skutki czasu"
